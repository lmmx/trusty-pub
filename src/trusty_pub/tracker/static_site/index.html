<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trusty Pub</title>
  <link href="https://unpkg.com/gridjs/dist/theme/mermaid.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700..900&family=Instrument+Serif&family=Space+Grotesk:wght@500;700&family=Inter+Tight:wght@400;500;600&family=Inconsolata:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <a class="gh-link" href="https://github.com/lmmx/trusty-pub" target="_blank">
      <svg height="20" width="20" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      lmmx/trusty-pub
    </a>
    <h1>🛡️ Trusty Pub</h1>
    <p class="subtitle">Trusted Publishing Tracker for Python Packages</p>
  </header>

  <nav>
    <button class="tab active" data-tab="tracker">Tracker</button>
    <button class="tab" data-tab="resources">Resources</button>
  </nav>

  <!-- TRACKER TAB -->
  <section id="tab-tracker">
    <div id="stats"></div>
    <div class="filters">
      <label><input type="checkbox" id="show-tp" checked> 🟢 Trusted</label>
      <label><input type="checkbox" id="show-notp" checked> 🔴 Missing</label>
      <label><input type="checkbox" id="tracked-only"> Tracked only</label>
    </div>
    <div id="table"></div>
    <div id="detail"></div>
  </section>

  <!-- RESOURCES TAB -->
  <section id="tab-resources" hidden>
    <div id="resources"></div>
  </section>

  <script src="https://unpkg.com/gridjs/dist/gridjs.umd.js"></script>
  <script src="app.js"></script>
  <footer>© 2026 Louis Maddox</footer>
</body>
</html>
