<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trusty Pub Tracker</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/htmx.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Inter+Tight:wght@400;500;600&family=Cabin+Condensed:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <h1>Trusty Pub Tracker</h1>
    <div id="status" hx-get="/status" hx-trigger="load, trackUpdate from:body"
         hx-swap="innerHTML">
      Loading…
    </div>
    {% if not gh_ok %}
    <div class="error">
      gh CLI not authenticated — run <code>gh auth login</code> in your terminal
    </div>
    {% endif %}
  </header>

  <main>
    <section class="search-section">
      <input type="text" id="search-input" name="q"
             placeholder="Search packages… (press / to focus)"
             hx-get="/search" hx-trigger="load, input changed delay:300ms"
             hx-target="#results" hx-swap="innerHTML"
             hx-include=".search-filter"
             autocomplete="off" autofocus>
      <div class="filters">
        <label class="filter-toggle">
          <input type="checkbox" name="hide_tp" class="search-filter"
                 checked
                 hx-get="/search" hx-trigger="change"
                 hx-target="#results" hx-swap="innerHTML"
                 hx-include="#search-input, .search-filter">
          Hide TP
        </label>
        <label class="filter-toggle">
          <input type="checkbox" name="tracked_only" class="search-filter"
                 hx-get="/search" hx-trigger="change"
                 hx-target="#results" hx-swap="innerHTML"
                 hx-include="#search-input, .search-filter">
          Tracked only
        </label>
      </div>
      <div id="results"></div>
    </section>

    <section class="paste-section">
      <form hx-post="/paste" hx-target="#detail" hx-swap="innerHTML">
        <input type="text" name="url"
               placeholder="Or paste a GitHub issue URL…">
        <button type="submit">Track URL</button>
      </form>
    </section>

    <section id="detail"></section>
  </main>

  <script>
  (function () {
    var input = document.getElementById("search-input");
    var resultsDiv = document.getElementById("results");
    var activeIndex = 0;

    document.addEventListener("keydown", function (e) {
      if (e.key === "/" && document.activeElement.tagName !== "INPUT" &&
          document.activeElement.tagName !== "TEXTAREA") {
        e.preventDefault();
        input.focus();
        input.select();
      }
    });

    function getItems() {
      return resultsDiv.querySelectorAll(".search-result:not(.disabled)");
    }

    function setActive(index) {
      var items = getItems();
      if (!items.length) return;
      items.forEach(function (el) { el.classList.remove("active"); });
      activeIndex = Math.max(0, Math.min(index, items.length - 1));
      items[activeIndex].classList.add("active");
      items[activeIndex].scrollIntoView({ block: "nearest" });
    }

    function selectActive() {
      var items = getItems();
      if (!items.length) return;
      var item = items[activeIndex];
      if (!item) return;
      var nameEl = item.querySelector(".name");
      if (nameEl) input.value = nameEl.textContent;
      item.click();
    }

    input.addEventListener("keydown", function (e) {
      var items = getItems();
      if (!items.length) return;

      if (e.key === "ArrowDown") {
        e.preventDefault();
        setActive(activeIndex + 1);
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        setActive(activeIndex - 1);
      } else if (e.key === "Enter") {
        e.preventDefault();
        selectActive();
      }
    });

    resultsDiv.addEventListener("htmx:afterSwap", function () {
      activeIndex = 0;
      var items = getItems();
      if (items.length) {
        items[0].classList.add("active");
      }
    });

    resultsDiv.addEventListener("mouseover", function (e) {
      var li = e.target.closest(".search-result:not(.disabled)");
      if (!li) return;
      var items = getItems();
      for (var i = 0; i < items.length; i++) {
        if (items[i] === li) {
          setActive(i);
          break;
        }
      }
    });
    // -- auto-search issues when selecting an untracked repo ----------------
    document.getElementById("detail").addEventListener("htmx:afterSwap", function () {
      var tracked = this.querySelector(".tracked-section");
      if (!tracked) {
        var form = this.querySelector(".issue-search form");
        if (form) {
          // Ensure htmx has bound the new content before triggering
          htmx.process(form);
          htmx.trigger(form, "submit");
        }
      }
    });
  })();
  </script>
</body>
</html>
