name: tests

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        uv-resolution: ["highest"]
        include:
          - python-version: "3.10"
            uv-resolution: "lowest-direct"
    steps:
      - uses: actions/checkout@v6
      - name: Setup uv
        uses: ./.github/actions/setup-uv
      - name: Unit tests
        run: >
          uv run --resolution=${{ matrix.uv-resolution }}
          --all-extras --no-extra cuda --group test coverage run --parallel
      - name: Upload coverage data
        uses: actions/upload-artifact@v5
        with:
          include-hidden-files: true
          name: coverage-data-${{ matrix.python-version }}-${{ matrix.uv-resolution }}
          path: .coverage.*
          if-no-files-found: ignore
  coverage:
    if: always()
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup uv
        uses: ./.github/actions/setup-uv
      - uses: actions/download-artifact@v6
        with:
          pattern: coverage-data-*
          merge-multiple: true
      - name: Combine coverage
        run: |
          uv python install
          uvx coverage combine
          uvx coverage html --skip-covered --skip-empty
          uvx coverage report --format=markdown >> $GITHUB_STEP_SUMMARY
