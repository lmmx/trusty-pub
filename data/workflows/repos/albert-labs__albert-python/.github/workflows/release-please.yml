name: release-please

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Branch to run release-please on (main or next)"
        required: true
        default: "main"
        type: choice
        options:
          - main
          - next
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_SECRET }}
          owner: ${{ github.repository_owner }}
          repositories: |
            ${{ github.event.repository.name }}
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          release-type: python
          package-name: albert
          target-branch: ${{ inputs.target_branch || github.ref_name }}
