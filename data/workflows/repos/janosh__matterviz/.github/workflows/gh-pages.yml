name: GitHub Pages

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    uses: janosh/workflows/.github/workflows/deno-gh-pages.yml@main
    with:
      deno-version: 2.3.7
      build-cmd: |
        set -eo pipefail

        # Copy site data to static
        rm -rf static/{molecules,structures,trajectories}
        cp -r src/site/{molecules,structures,trajectories} static/

        # Build the site
        deno task build
