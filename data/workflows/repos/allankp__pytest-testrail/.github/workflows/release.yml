name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency: release

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: |
          uv venv
          uv pip install python-semantic-release

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Semantic Release (version bump, tag, changelog)
        id: semrel
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          source .venv/bin/activate
          OUTPUT=$(semantic-release version 2>&1) || true
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "No release will be made"; then
            echo "released=false" >> $GITHUB_OUTPUT
            echo "No version bump needed"
          else
            VERSION=$(grep '^version = ' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "released=true" >> $GITHUB_OUTPUT
          fi

      - name: Build package
        if: steps.semrel.outputs.released == 'true'
        run: |
          uv sync
          uv build

      - name: Check if version exists on PyPI
        if: steps.semrel.outputs.released == 'true'
        id: check_pypi
        run: |
          VERSION=${{ steps.semrel.outputs.version }}
          if curl -sf "https://pypi.org/pypi/pytest-testrail/$VERSION/json" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Version $VERSION already exists on PyPI"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to PyPI
        if: steps.semrel.outputs.released == 'true' && steps.check_pypi.outputs.exists == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Create GitHub Release
        if: steps.semrel.outputs.released == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.semrel.outputs.version }}
          name: v${{ steps.semrel.outputs.version }}
          files: dist/*
          generate_release_notes: true

      - name: No release needed
        if: steps.semrel.outputs.released == 'false'
        run: echo "No conventional commits found that trigger a release"
