# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Python package

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install flake8 pytest
        python -m pip install -e .
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      run: |
        pytest
    - name: Build conformance corpus and diff report
      run: |
        python scripts/build_conformance_corpus.py
        python scripts/diff_legacy_v2.py --min-v2-legacy-ratio 1.0
    - name: Upload conformance reports
      uses: actions/upload-artifact@v4
      with:
        name: conformance-reports-py${{ matrix.python-version }}
        path: conformance/reports/

  benchmark_duckling:
    runs-on: ubuntu-latest
    services:
      duckling:
        image: rasa/duckling:latest
        ports:
          - 8000:8000
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Install benchmark dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install regex python-dateutil pytz maturin
        python -m pip install -e .
    - name: Wait for Duckling
      run: |
        for i in {1..30}; do
          if curl -s -o /dev/null http://localhost:8000/; then
            echo "Duckling is reachable"
            exit 0
          fi
          sleep 2
        done
        echo "Duckling service did not become reachable"
        exit 1
    - name: Benchmark gate (v2 faster than Duckling)
      run: |
        python bench/bench_gate.py \
          --dataset bench/corpus_core.txt \
          --duckling-url http://localhost:8000/parse \
          --iterations 10 \
          --required-ratio 0.95
