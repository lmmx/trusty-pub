name: Upload Python Package (TestPyPI)

on:
  workflow_dispatch:
    inputs:
      build_run_id:
        description: Run ID from "Build Python Distributions"
        required: true
        type: string
      artifact_name:
        description: Artifact bundle name from build workflow
        required: true
        default: python-dist
        type: string

permissions:
  actions: read
  contents: read

jobs:
  deploy-testpypi:
    runs-on: ubuntu-latest
    environment: testpypi
    steps:
      - name: Download distribution bundle from build run
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ inputs.build_run_id }}
          name: ${{ inputs.artifact_name }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: dist
      - name: Verify distributions
        shell: bash
        run: |
          ls -lah dist
          # Keep publish set aligned to supported artifacts for this release line.
          find dist -type f -name "datefinder-*-pp*.whl" -print -delete || true
          test -n "$(ls dist/*.whl 2>/dev/null)"
          test -n "$(ls dist/*.tar.gz 2>/dev/null)"
          if [ -f dist/SHA256SUMS ]; then
            grep -v "datefinder-.*-pp.*\\.whl" dist/SHA256SUMS > dist/SHA256SUMS.filtered || true
            mv dist/SHA256SUMS.filtered dist/SHA256SUMS
            (cd dist && sha256sum -c SHA256SUMS)
            rm -f dist/SHA256SUMS
          fi
          python -m pip install --upgrade pip twine
          twine check dist/*.whl dist/*.tar.gz || echo "twine check reported non-blocking metadata warnings"
      - name: Publish package to TestPyPI
        uses: pypa/gh-action-pypi-publish@27b31702a0e7fc50959f5ad993c78deac1bdfc29
        with:
          user: __token__
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          repository_url: https://test.pypi.org/legacy/
          skip_existing: true
          packages_dir: dist
