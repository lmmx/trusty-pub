name: Release Candidate Validation

on:
  workflow_dispatch:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  package-install-smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Install wheel inspection tools (Linux)
        if: ${{ startsWith(matrix.os, 'ubuntu') }}
        run: python -m pip install --upgrade pip auditwheel
      - name: Install wheel inspection tools (macOS)
        if: ${{ startsWith(matrix.os, 'macos') }}
        run: python -m pip install --upgrade pip delocate
      - name: Install wheel inspection tools (Windows)
        if: ${{ startsWith(matrix.os, 'windows') }}
        run: python -m pip install --upgrade pip delvewheel
      - name: Inspect wheel dependencies (Linux)
        if: ${{ startsWith(matrix.os, 'ubuntu') }}
        run: auditwheel show dist/*.whl
      - name: Inspect wheel dependencies (macOS)
        if: ${{ startsWith(matrix.os, 'macos') }}
        run: delocate-listdeps dist/*.whl
      - name: Inspect wheel dependencies (Windows)
        if: ${{ startsWith(matrix.os, 'windows') }}
        run: delvewheel show dist/*.whl

      - name: Install runtime dependencies
        run: python -m pip install --upgrade pip regex python-dateutil pytz

      - name: Install wheel and smoke test
        shell: bash
        run: |
          python -m pip uninstall -y datefinder || true
          python -m pip install --only-binary=:all: --no-index --find-links dist --no-deps datefinder==1.0.0
          TMPDIR="$(mktemp -d)"
          cd "$TMPDIR"
          python - <<'PY'
          import datefinder
          import datefinder._kernel
          from datetime import datetime, timezone

          assert datefinder.__version__ == "1.0.0"
          out_default = list(datefinder.find_dates("tomorrow and 2024-12-10", base_date=datetime(2026, 3, 18, tzinfo=timezone.utc)))
          assert len(out_default) >= 2
          out_legacy = list(datefinder.find_dates("June 2018", engine="legacy"))
          assert len(out_legacy) >= 1
          print("wheel smoke ok")
          PY

      - name: Install sdist and smoke test
        shell: bash
        run: |
          python -m pip uninstall -y datefinder || true
          python -m pip install --no-binary=datefinder --no-deps dist/*.tar.gz
          TMPDIR="$(mktemp -d)"
          cd "$TMPDIR"
          python - <<'PY'
          import datefinder
          import datefinder._kernel
          out = list(datefinder.find_dates("created 01/15/2005 by ACME"))
          assert out
          print("sdist smoke ok")
          PY

  wheel-target-validation:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: manylinux2014
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: manylinux2014
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            manylinux: musllinux_1_2
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-musl
            manylinux: musllinux_1_2
          - runner: macos-13
            target: x86_64-apple-darwin
            manylinux: off
          - runner: macos-14
            target: aarch64-apple-darwin
            manylinux: off
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: off
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build Linux wheels
        if: ${{ startsWith(matrix.runner, 'ubuntu') }}
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist --manifest-path rust/datefinder-kernel/Cargo.toml
          rust-toolchain: stable
      - name: Build macOS/Windows wheels
        if: ${{ !startsWith(matrix.runner, 'ubuntu') }}
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --manifest-path rust/datefinder-kernel/Cargo.toml
          rust-toolchain: stable
      - name: Install wheel inspection tools (Linux)
        if: ${{ startsWith(matrix.runner, 'ubuntu') }}
        run: python -m pip install --upgrade pip auditwheel
      - name: Install wheel inspection tools (macOS)
        if: ${{ startsWith(matrix.runner, 'macos') }}
        run: python -m pip install --upgrade pip delocate
      - name: Install wheel inspection tools (Windows)
        if: ${{ startsWith(matrix.runner, 'windows') }}
        run: python -m pip install --upgrade pip delvewheel
      - name: Inspect wheel dependencies (Linux)
        if: ${{ startsWith(matrix.runner, 'ubuntu') }}
        run: auditwheel show dist/*.whl
      - name: Inspect wheel dependencies (macOS)
        if: ${{ startsWith(matrix.runner, 'macos') }}
        run: delocate-listdeps dist/*.whl
      - name: Inspect wheel dependencies (Windows)
        if: ${{ startsWith(matrix.runner, 'windows') }}
        run: delvewheel show dist/*.whl
      - name: Set up QEMU for Linux aarch64 smoke
        if: ${{ startsWith(matrix.runner, 'ubuntu') && contains(matrix.target, 'aarch64') }}
        uses: docker/setup-qemu-action@v3
      - name: Wheel runtime smoke (Linux container target)
        if: ${{ startsWith(matrix.runner, 'ubuntu') }}
        shell: bash
        run: |
          IMAGE=""
          case "${{ matrix.manylinux }}-${{ matrix.target }}" in
            manylinux2014-x86_64-unknown-linux-gnu) IMAGE="quay.io/pypa/manylinux2014_x86_64" ;;
            manylinux2014-aarch64-unknown-linux-gnu) IMAGE="quay.io/pypa/manylinux2014_aarch64" ;;
            musllinux_1_2-x86_64-unknown-linux-musl) IMAGE="quay.io/pypa/musllinux_1_2_x86_64" ;;
            musllinux_1_2-aarch64-unknown-linux-musl) IMAGE="quay.io/pypa/musllinux_1_2_aarch64" ;;
            *) echo "Unsupported Linux target: ${{ matrix.target }} / ${{ matrix.manylinux }}"; exit 1 ;;
          esac
          docker run --rm -v "$PWD/dist:/dist" "$IMAGE" sh -lc '
            PYBIN="$(ls -d /opt/python/cp312*/bin/python 2>/dev/null | head -n1)"
            if [ -z "$PYBIN" ]; then
              PYBIN="$(ls -d /opt/python/cp3*/bin/python 2>/dev/null | head -n1)"
            fi
            test -n "$PYBIN"
            "$PYBIN" -m pip install --upgrade pip >/dev/null
            "$PYBIN" -m pip install regex python-dateutil pytz >/dev/null
            "$PYBIN" -m pip install --only-binary=:all: --no-index --find-links /dist --no-deps datefinder==1.0.0 >/dev/null
            "$PYBIN" -c "import datefinder, datefinder._kernel; from datetime import datetime, timezone; out=list(datefinder.find_dates(\"tomorrow and 2024-12-10\", base_date=datetime(2026, 3, 18, tzinfo=timezone.utc))); assert len(out) >= 2; print(\"linux target smoke ok\", len(out))"
          '
      - name: Wheel runtime smoke (macOS/Windows native)
        if: ${{ !startsWith(matrix.runner, 'ubuntu') }}
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install regex python-dateutil pytz
          python -m pip install --only-binary=:all: --no-index --find-links dist --no-deps datefinder==1.0.0
          TMPDIR="$(mktemp -d)"
          cd "$TMPDIR"
          python - <<'PY'
          import datefinder
          import datefinder._kernel
          from datetime import datetime, timezone
          out = list(datefinder.find_dates("tomorrow and 2024-12-10", base_date=datetime(2026, 3, 18, tzinfo=timezone.utc)))
          assert len(out) >= 2
          print("target smoke ok", len(out))
          PY
