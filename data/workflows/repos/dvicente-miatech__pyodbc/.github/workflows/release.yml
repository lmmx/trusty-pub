name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 5.3.1)'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  bump_version:
    runs-on: ubuntu-latest
    outputs:
      tag_name: v${{ inputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Update version
        run: |
          sed -i 's/^version = ".*"/version = "${{ inputs.version }}"/' pyproject.toml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "Bump version to ${{ inputs.version }}"
          git tag v${{ inputs.version }}
          git push origin v${{ inputs.version }}
          git push

  build_sdist:
    needs: bump_version
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}

      - name: Build sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist__${{ github.sha }}
          path: ./dist/*.gz

  build_windows_wheels:
    needs: bump_version
    name: Build wheels on Windows
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.2.1
        env:
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_BUILD: "cp312-win_amd64 cp313-win_amd64"
          CIBW_TEST_COMMAND: ""

      - uses: actions/upload-artifact@v4
        with:
          name: wheels_windows__${{ github.sha }}
          path: ./wheelhouse/*.whl

  build_linux_x86_64_manylinux:
    needs: bump_version
    name: Build manylinux x86_64 wheels
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.2.1
        env:
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_ARCHS_LINUX: x86_64
          CIBW_BEFORE_ALL_LINUX: yum -y install unixODBC-devel
          CIBW_BUILD: "cp312-manylinux_x86_64 cp313-manylinux_x86_64"
          CIBW_TEST_COMMAND: ""
          CIBW_REPAIR_WHEEL_COMMAND_LINUX:
            auditwheel repair
              --exclude "libodbc.so.*"
              --wheel-dir {dest_dir}
              {wheel}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels_manylinux_x86_64__${{ github.sha }}
          path: ./wheelhouse/*.whl

  build_linux_aarch64_manylinux:
    needs: bump_version
    name: Build manylinux aarch64 wheels
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.2.1
        env:
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_ARCHS_LINUX: aarch64
          CIBW_BEFORE_ALL_LINUX: yum -y install unixODBC-devel
          CIBW_BUILD: "cp312-manylinux_aarch64 cp313-manylinux_aarch64"
          CIBW_TEST_COMMAND: ""
          CIBW_REPAIR_WHEEL_COMMAND_LINUX:
            auditwheel repair
              --exclude "libodbc.so.*"
              --wheel-dir {dest_dir}
              {wheel}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels_manylinux_aarch64__${{ github.sha }}
          path: ./wheelhouse/*.whl

  build_linux_x86_64_musllinux:
    needs: bump_version
    name: Build musllinux x86_64 wheels
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.2.1
        env:
          CIBW_MUSLLINUX_X86_64_IMAGE: musllinux_1_2
          CIBW_ARCHS_LINUX: x86_64
          CIBW_BEFORE_ALL_LINUX: apk add unixodbc-dev
          CIBW_BUILD: "cp312-musllinux_x86_64 cp313-musllinux_x86_64"
          CIBW_TEST_COMMAND: ""
          CIBW_REPAIR_WHEEL_COMMAND_LINUX:
            auditwheel repair
              --exclude "libodbc.so.*"
              --wheel-dir {dest_dir}
              {wheel}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels_musllinux_x86_64__${{ github.sha }}
          path: ./wheelhouse/*.whl

  build_linux_aarch64_musllinux:
    needs: bump_version
    name: Build musllinux aarch64 wheels
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.2.1
        env:
          CIBW_MUSLLINUX_X86_64_IMAGE: musllinux_1_2
          CIBW_ARCHS_LINUX: aarch64
          CIBW_BEFORE_ALL_LINUX: apk add unixodbc-dev
          CIBW_BUILD: "cp312-musllinux_aarch64 cp313-musllinux_aarch64"
          CIBW_TEST_COMMAND: ""
          CIBW_REPAIR_WHEEL_COMMAND_LINUX:
            auditwheel repair
              --exclude "libodbc.so.*"
              --wheel-dir {dest_dir}
              {wheel}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels_musllinux_aarch64__${{ github.sha }}
          path: ./wheelhouse/*.whl

  create_release:
    needs:
      - build_sdist
      - build_windows_wheels
      - build_linux_x86_64_manylinux
      - build_linux_aarch64_manylinux
      - build_linux_x86_64_musllinux
      - build_linux_aarch64_musllinux
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: '*__${{ github.sha }}'
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ inputs.version }}
          files: dist/*
          generate_release_notes: true
