# Build all the artifacts for a release (i.e. the source distribution file and the various wheels)
# https://docs.github.com/en/actions/using-jobs/choosing-the-runner-for-a-job
# https://cibuildwheel.readthedocs.io/en/stable/options/#options-summary

name: Build the release artifacts

# include "workflow_dispatch" so this workflow can be run manually from the Actions portal
on: [workflow_dispatch]

jobs:
  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist__${{ github.sha }}
          path: ./dist/*.gz

  build_windows_wheels:
    name: Build wheels on Windows
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.2.1
        env:
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_BUILD: "cp312-win_amd64 cp313-win_amd64"
          CIBW_TEST_COMMAND: ""

      - uses: actions/upload-artifact@v4
        with:
          name: wheels_windows__${{ github.sha }}
          path: ./wheelhouse/*.whl

  build_linux_x86_64_manylinux:
    name: Build manylinux x86_64 wheels
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.2.1
        env:
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_ARCHS_LINUX: x86_64
          CIBW_BEFORE_ALL_LINUX: yum -y install unixODBC-devel
          CIBW_BUILD: "cp312-manylinux_x86_64 cp313-manylinux_x86_64"
          CIBW_TEST_COMMAND: ""
          CIBW_REPAIR_WHEEL_COMMAND_LINUX:
            auditwheel repair
              --exclude "libodbc.so.*"
              --wheel-dir {dest_dir}
              {wheel}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels_manylinux_x86_64__${{ github.sha }}
          path: ./wheelhouse/*.whl

  build_linux_aarch64_manylinux:
    name: Build manylinux aarch64 wheels
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.2.1
        env:
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_ARCHS_LINUX: aarch64
          CIBW_BEFORE_ALL_LINUX: yum -y install unixODBC-devel
          CIBW_BUILD: "cp312-manylinux_aarch64 cp313-manylinux_aarch64"
          CIBW_TEST_COMMAND: ""
          CIBW_REPAIR_WHEEL_COMMAND_LINUX:
            auditwheel repair
              --exclude "libodbc.so.*"
              --wheel-dir {dest_dir}
              {wheel}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels_manylinux_aarch64__${{ github.sha }}
          path: ./wheelhouse/*.whl

  build_linux_x86_64_musllinux:
    name: Build musllinux x86_64 wheels
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.2.1
        env:
          CIBW_MUSLLINUX_X86_64_IMAGE: musllinux_1_2
          CIBW_ARCHS_LINUX: x86_64
          CIBW_BEFORE_ALL_LINUX: apk add unixodbc-dev
          CIBW_BUILD: "cp312-musllinux_x86_64 cp313-musllinux_x86_64"
          CIBW_TEST_COMMAND: ""
          CIBW_REPAIR_WHEEL_COMMAND_LINUX:
            auditwheel repair
              --exclude "libodbc.so.*"
              --wheel-dir {dest_dir}
              {wheel}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels_musllinux_x86_64__${{ github.sha }}
          path: ./wheelhouse/*.whl

  build_linux_aarch64_musllinux:
    name: Build musllinux aarch64 wheels
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.2.1
        env:
          CIBW_MUSLLINUX_X86_64_IMAGE: musllinux_1_2
          CIBW_ARCHS_LINUX: aarch64
          CIBW_BEFORE_ALL_LINUX: apk add unixodbc-dev
          CIBW_BUILD: "cp312-musllinux_aarch64 cp313-musllinux_aarch64"
          CIBW_TEST_COMMAND: ""
          CIBW_REPAIR_WHEEL_COMMAND_LINUX:
            auditwheel repair
              --exclude "libodbc.so.*"
              --wheel-dir {dest_dir}
              {wheel}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels_musllinux_aarch64__${{ github.sha }}
          path: ./wheelhouse/*.whl
