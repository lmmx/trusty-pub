name: Run unit tests

on:
  push:
    branches: ['main', 'develop']
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Unittest
        run: 'python -m unittest'
