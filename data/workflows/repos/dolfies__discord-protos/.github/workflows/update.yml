name: Update protobuf definitions

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      # Give the default GITHUB_TOKEN write permission to commit and push the changed files back to the repository
      contents: write

    outputs:
      has_changes: ${{ steps.changes.outputs.has_changes }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref }}

    - name: Install Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install pnpm
      uses: pnpm/action-setup@v5

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 23
        cache: 'pnpm'
        registry-url: 'https://registry.npmjs.org/'

    - name: Install protoc
      uses: arduino/setup-protoc@v3
      with:
        version: '28.x'

    - name: Install dependencies
      run: |
        pnpm install --frozen-lockfile
        python -m pip install -U pip
        python -m pip install -r requirements.txt
        npx puppeteer browsers install chrome

    - name: Load protobuf definitions
      run: |
        # Fix puppeteer on Ubuntu 23.10+
        # See https://github.com/puppeteer/puppeteer/issues/12818
        echo 0 | sudo tee /proc/sys/kernel/apparmor_restrict_unprivileged_userns
        pnpm load
      shell: bash

    - name: Commit changes
      id: changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        if git diff --quiet; then
          echo "has_changes=false" >> "$GITHUB_OUTPUT"
        else
          echo "has_changes=true"  >> "$GITHUB_OUTPUT"
        fi
        git add .
        git commit -m "Update protobuf definitions" || exit 0
        git push
      env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: update
    if: needs.update.outputs.has_changes == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: ${{ github.ref_name }}

    - name: Install Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install pnpm
      uses: pnpm/action-setup@v5

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 23
        cache: 'pnpm'
        registry-url: 'https://registry.npmjs.org/'

    - name: Install dependencies
      run: |
        pnpm install --frozen-lockfile
        python -m pip install -U pip
        python -m pip install -r requirements.txt

    - name: Build Node.js package
      run: pnpm build

    - name: Build Python package
      run: |
        python -m pip install -U build
        python -m build --outdir pydist

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: pydist

    - name: Publish to NPM
      run: |
        # If we don't update npm, we fail with a 404
        npm install -g npm
        npm publish --provenance --access public --no-git-checks
