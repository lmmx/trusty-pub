name: Build Dashboard EXE

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip uninstall -y pyworxcloud || true
          python -m pip install --force-reinstall --no-cache-dir .
          python -m pip install pyinstaller

      - name: Verify local source import
        shell: bash
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          import pyworxcloud

          workspace = Path(os.environ["GITHUB_WORKSPACE"]).resolve()
          module_file = Path(pyworxcloud.__file__).resolve()
          print(f"Workspace: {workspace}")
          print(f"pyworxcloud imported from: {module_file}")
          if workspace not in module_file.parents:
              raise SystemExit(
                  "pyworxcloud is not imported from checked-out GitHub source."
              )
          PY

      - name: Build CLI EXE
        shell: bash
        run: |
          pyinstaller --noconfirm --clean --onefile --name pyworxcloud-dashboard test_dashboard.py

      - name: Build GUI EXE
        shell: bash
        run: |
          pyinstaller --noconfirm --clean --onefile --name pyworxcloud-dashboard-gui test_dashboard_gui.py

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: pyworxcloud-dashboards-windows-exe
          path: |
            dist/pyworxcloud-dashboard.exe
            dist/pyworxcloud-dashboard-gui.exe

      - name: Upload release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/pyworxcloud-dashboard.exe
            dist/pyworxcloud-dashboard-gui.exe
