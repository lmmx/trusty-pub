name: CI Ruby

on:
  push:
    branches: [main]
    paths:
      - "crates/ts-pack-ruby/**"
      - "crates/ts-pack-core/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".cargo/config.toml"
      - "rust-toolchain.toml"
      - ".task/ruby.yml"
      - "Taskfile.yml"
      - "e2e/ruby/**"
      - "fixtures/**"
      - "tools/e2e-generator/**"
      - "scripts/ci/ruby/**"
      - ".github/workflows/ci-ruby.yaml"
  pull_request:
    branches: [main]
    paths:
      - "crates/ts-pack-ruby/**"
      - "crates/ts-pack-core/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".cargo/config.toml"
      - "rust-toolchain.toml"
      - ".task/ruby.yml"
      - "Taskfile.yml"
      - "e2e/ruby/**"
      - "fixtures/**"
      - "tools/e2e-generator/**"
      - "scripts/ci/ruby/**"
      - ".github/workflows/ci-ruby.yaml"
  workflow_run:
    workflows: ["Publish Release"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: ci-ruby-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  RUST_BACKTRACE: short
  BUILD_PROFILE: ci

jobs:
  clone-vendors:
    name: Clone vendors
    if: github.repository == 'kreuzberg-dev/tree-sitter-language-pack' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --no-install-project

      - name: Cache parsers
        uses: actions/cache@v5
        with:
          path: parsers
          key: parsers-${{ hashFiles('sources/language_definitions.json') }}
          restore-keys: |
            parsers-

      - name: Clone vendors
        run: |
          mkdir -p parsers
          uv run --no-sync scripts/clone_vendors.py

      - name: Upload parsers
        uses: actions/upload-artifact@v7
        with:
          name: language-parsers
          path: parsers
          retention-days: 1

  build-ruby:
    name: Build Ruby (${{ matrix.ruby-version }})
    needs: clone-vendors
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: true
      matrix:
        ruby-version: ["3.4"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download parsers
        uses: actions/download-artifact@v8
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Clippy (ts-pack-ruby)
        if: matrix.ruby-version == '3.4'
        run: cargo clippy --manifest-path crates/ts-pack-ruby/Cargo.toml -- -D warnings
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          TSLP_LANGUAGES: "python,rust,javascript,typescript,go,html,css,json"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          working-directory: crates/ts-pack-ruby

      - name: Install Ruby dependencies
        working-directory: crates/ts-pack-ruby
        run: bundle install

      - name: Build native extension
        working-directory: crates/ts-pack-ruby
        run: bundle exec rake compile
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          CARGO_TARGET_DIR: ${{ github.workspace }}/crates/ts-pack-ruby/target
          TSLP_LANGUAGES: "python,rust,javascript,typescript,go,html,css,json"

      - name: Run RSpec tests
        working-directory: crates/ts-pack-ruby
        run: bundle exec rspec
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          TSLP_LANGUAGES: "python,rust,javascript,typescript,go,html,css,json"

  e2e-ruby:
    name: E2E Ruby
    needs: clone-vendors
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download parsers
        uses: actions/download-artifact@v8
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          working-directory: crates/ts-pack-ruby

      - name: Build native extension
        working-directory: crates/ts-pack-ruby
        run: |
          bundle install
          bundle exec rake compile
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          CARGO_TARGET_DIR: ${{ github.workspace }}/crates/ts-pack-ruby/target
          TSLP_LANGUAGES: "python,rust,javascript,typescript,go,html,css,json"

      - name: Generate E2E tests
        run: cargo run -p e2e-generator -- generate --lang ruby
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          TSLP_LANGUAGES: "python,rust,javascript,typescript,go,html,css,json"

      - name: Run E2E tests
        working-directory: e2e/ruby
        run: |
          bundle install
          bundle exec rspec
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          TSLP_LANGUAGES: "python,rust,javascript,typescript,go,html,css,json"
