name: Grammar Updates

on:
  schedule:
    # Every Sunday at 08:00 UTC
    - cron: "0 8 * * 0"
  workflow_dispatch:
    inputs:
      max_updates:
        description: "Maximum number of grammar revisions to update (0 = unlimited)"
        required: false
        default: "20"
        type: string
      languages:
        description: "Comma-separated list of languages to check (empty = all)"
        required: false
        default: ""
        type: string

concurrency:
  group: grammar-updates
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  check-and-update:
    name: Check grammar updates and open PR
    if: github.repository == 'kreuzberg-dev/tree-sitter-language-pack'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Python dependencies
        run: uv sync --no-install-project

      - name: Resolve inputs
        id: inputs
        run: |
          MAX_UPDATES="${{ github.event.inputs.max_updates || '20' }}"
          LANGUAGES="${{ github.event.inputs.languages || '' }}"

          # Build argument list
          ARGS="--write --report grammar-updates.json"
          if [[ "$MAX_UPDATES" != "0" && -n "$MAX_UPDATES" ]]; then
            ARGS="$ARGS --max-updates $MAX_UPDATES"
          fi
          if [[ -n "$LANGUAGES" ]]; then
            ARGS="$ARGS --languages $LANGUAGES"
          fi

          echo "args=$ARGS" >> "$GITHUB_OUTPUT"
          echo "max_updates=$MAX_UPDATES" >> "$GITHUB_OUTPUT"

      - name: Check and update grammar revisions
        id: update
        run: |
          uv run --no-sync scripts/check_grammar_updates.py ${{ steps.inputs.outputs.args }}

          # Capture whether any files changed
          if git diff --quiet sources/language_definitions.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No grammar updates available."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            STALE_COUNT=$(python3 -c "
          import json, sys
          data = json.loads(open('grammar-updates.json').read())
          print(data['stale_count'])
          ")
            echo "stale_count=$STALE_COUNT" >> "$GITHUB_OUTPUT"
            echo "Found $STALE_COUNT grammar update(s)."
          fi

      - name: Prepare branch and commit
        if: steps.update.outputs.changed == 'true'
        id: branch
        run: |
          BRANCH="chore/grammar-updates-$(date +%Y%m%d)"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add sources/language_definitions.json
          git commit -m "chore: update ${{ steps.update.outputs.stale_count }} grammar revision(s) [automated]"
          git push origin "$BRANCH"

      - name: Build PR body
        if: steps.update.outputs.changed == 'true'
        id: pr_body
        run: |
          python3 - <<'EOF'
          import json, os, textwrap

          data = json.loads(open("grammar-updates.json").read())
          stale = sorted(data["stale"], key=lambda s: s["language"])

          rows = "\n".join(
              f"| `{s['language']}` | `{s['current_rev'][:12]}` | `{s['latest_rev'][:12]}` | [{s['repo'].split('github.com/')[-1]}]({s['repo']}) |"
              for s in stale
          )

          body = textwrap.dedent(f"""\
          ## Summary

          Automated grammar revision update — {len(stale)} grammar(s) updated to latest upstream HEAD.

          | Language | Previous rev | New rev | Repository |
          |----------|-------------|---------|------------|
          {rows}

          ## Details

          - **Up to date**: {data['up_to_date']}
          - **Updated**: {data['stale_count']}
          - **Failed checks**: {len(data.get('failed', []))}

          ## Test plan

          - [ ] CI grammar compilation passes for all updated languages
          - [ ] No new parser errors introduced

          > Generated by the [grammar-updates](./.github/workflows/grammar-updates.yml) workflow.
          """)

          with open(os.environ["GITHUB_ENV"], "a") as f:
              # Write multi-line value using heredoc syntax
              delimiter = "PR_BODY_EOF"
              f.write(f"PR_BODY<<{delimiter}\n{body}\n{delimiter}\n")
          EOF

      - name: Open pull request
        if: steps.update.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Close any existing open grammar-update PRs to avoid accumulation
          EXISTING=$(gh pr list --base main --head "${{ steps.branch.outputs.branch }}" --json number --jq '.[].number')
          if [[ -n "$EXISTING" ]]; then
            echo "PR already exists: #$EXISTING — skipping creation."
            exit 0
          fi

          gh pr create \
            --base main \
            --head "${{ steps.branch.outputs.branch }}" \
            --title "chore: update ${{ steps.update.outputs.stale_count }} grammar revision(s)" \
            --body "$PR_BODY" \
            --label "dependencies,automated"

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grammar-updates-report
          path: grammar-updates.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          if [[ -f grammar-updates.json ]]; then
            python3 - <<'EOF'
          import json
          data = json.loads(open("grammar-updates.json").read())
          print(f"### Grammar Update Summary")
          print(f"- Stale: {data['stale_count']}")
          print(f"- Up to date: {data['up_to_date']}")
          print(f"- Failed: {len(data.get('failed', []))}")
          if data['stale']:
              print("\n**Updated grammars:**")
              for s in sorted(data['stale'], key=lambda x: x['language']):
                  print(f"  - `{s['language']}`: `{s['current_rev'][:12]}` → `{s['latest_rev'][:12]}`")
          EOF
          else
            echo "No report generated."
          fi
