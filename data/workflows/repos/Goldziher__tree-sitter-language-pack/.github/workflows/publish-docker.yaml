name: Publish Docker Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v1.0.0-rc.17)"
        required: true
        type: string
      dry_run:
        description: "Dry run without pushing"
        required: false
        type: boolean
        default: false
      force_republish:
        description: "Force re-publish even if image already exists"
        required: false
        type: boolean
        default: false
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: kreuzberg-dev/ts-pack

concurrency:
  group: publish-docker-${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.tag) || github.ref || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    name: Prepare metadata
    if: ${{ github.event_name != 'release' || !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      dry_run: ${{ steps.meta.outputs.dry_run }}
      force_republish: ${{ steps.meta.outputs.force_republish }}
    steps:
      - name: Extract version
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            tag="${{ github.event.release.tag_name }}"
          else
            tag="${{ inputs.tag }}"
          fi
          version="${tag#v}"
          dry_run="${{ inputs.dry_run || 'false' }}"
          force="${{ inputs.force_republish || 'false' }}"

          {
            echo "tag=$tag"
            echo "version=$version"
            echo "dry_run=$dry_run"
            echo "force_republish=$force"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Docker Publish Metadata"
            echo "- **Tag**: \`$tag\`"
            echo "- **Version**: \`$version\`"
            echo "- **Dry Run**: \`$dry_run\`"
            echo "- **Force Republish**: \`$force\`"
          } >> "$GITHUB_STEP_SUMMARY"

  check-docker:
    name: Check if image exists
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check GHCR for existing tag
        id: check
        run: |
          TAG="${{ needs.prepare.outputs.version }}"
          if docker manifest inspect "ghcr.io/${{ env.IMAGE_NAME }}:$TAG" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Image $TAG already exists" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Image $TAG does not exist — will build" >> "$GITHUB_STEP_SUMMARY"
          fi

  publish:
    name: Build & publish Docker image
    needs: [prepare, check-docker]
    if: |
      needs.prepare.outputs.force_republish == 'true' ||
      needs.check-docker.outputs.exists != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --no-install-project

      - name: Setup Node.js (for tree-sitter-cli)
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install tree-sitter-cli
        run: |
          npm install -g tree-sitter-cli
          echo "$(npm config get prefix)/bin" >> "$GITHUB_PATH"

      - name: Clone vendor parsers
        run: uv run --no-sync scripts/clone_vendors.py

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build AMD64 test image
        run: |
          docker build -f docker/Dockerfile \
            -t ts-pack-test:local \
            --load .

      - name: Run smoke tests on test image
        run: |
          echo "=== Docker Smoke Tests ==="
          PASS=0
          FAIL=0

          assert() {
            if eval "$2"; then
              PASS=$((PASS + 1))
              echo "  PASS: $1"
            else
              FAIL=$((FAIL + 1))
              echo "  FAIL: $1"
            fi
          }

          # Version
          VER=$(docker run --rm ts-pack-test:local --version)
          echo "  Version: $VER"
          assert "version output" "echo '$VER' | grep -q 'ts-pack'"

          # Help
          HELP=$(docker run --rm ts-pack-test:local --help)
          assert "help shows commands" "echo '$HELP' | grep -q 'parse'"

          # Parse Python
          OUT=$(echo "def hello(): pass" | docker run --rm -i ts-pack-test:local parse - --language python)
          assert "python parse" "echo '$OUT' | grep -q 'module'"

          # Parse JavaScript
          OUT=$(echo "function test() { return 1; }" | docker run --rm -i ts-pack-test:local parse - --language javascript)
          assert "javascript parse" "echo '$OUT' | grep -q 'program'"

          # Parse Rust
          OUT=$(echo "fn main() {}" | docker run --rm -i ts-pack-test:local parse - --language rust)
          assert "rust parse" "echo '$OUT' | grep -q 'source_file'"

          # Parse Go
          OUT=$(echo "package main" | docker run --rm -i ts-pack-test:local parse - --language go)
          assert "go parse" "echo '$OUT' | grep -q 'source_file'"

          # Parse JSON format
          OUT=$(echo "x = 1" | docker run --rm -i ts-pack-test:local parse - --language python --format json)
          assert "json format" "echo '$OUT' | grep -q 'language'"

          # Process with structure
          OUT=$(echo "import os; def main(): pass" | docker run --rm -i ts-pack-test:local process - --language python --structure --imports)
          assert "process language" "echo '$OUT' | grep -q '\"language\"'"
          assert "process structure" "echo '$OUT' | grep -q '\"structure\"'"
          assert "process imports" "echo '$OUT' | grep -q '\"imports\"'"

          # Chunking
          OUT=$(printf "def a():\n    pass\n\ndef b():\n    pass\n\ndef c():\n    pass\n" | docker run --rm -i ts-pack-test:local process - --language python --structure --chunk-size 30)
          assert "chunking" "echo '$OUT' | grep -q '\"chunks\"'"

          # Cache dir
          DIR=$(docker run --rm ts-pack-test:local cache-dir)
          assert "cache-dir" "test -n '$DIR'"

          # Image size check
          SIZE=$(docker image inspect ts-pack-test:local --format '{{.Size}}')
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "  Image size: ${SIZE_MB} MB"
          assert "image under 500MB" "test $SIZE_MB -lt 500"

          echo ""
          echo "=== Results: $PASS passed, $FAIL failed ==="
          test "$FAIL" -eq 0

      - name: Log in to GHCR
        if: ${{ needs.prepare.outputs.dry_run != 'true' }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.prepare.outputs.tag }}
            type=raw,value=latest,enable=${{ !contains(needs.prepare.outputs.tag, '-') }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.description=tree-sitter-language-pack CLI — 248 parsers statically linked
            org.opencontainers.image.licenses=MIT

      - name: Build and push multiplatform
        if: ${{ needs.prepare.outputs.dry_run != 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=publish-docker
          cache-to: type=gha,mode=max,scope=publish-docker

      - name: Dry-run summary
        if: ${{ needs.prepare.outputs.dry_run == 'true' }}
        run: |
          {
            echo "## Docker Dry Run"
            echo "- Would push: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.version }}\`"
            echo "- Platforms: linux/amd64, linux/arm64"
            echo "- Smoke tests: passed"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Clean up
        if: always()
        run: docker rmi ts-pack-test:local || true
