name: CI Validate

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "packages/**"
      - "tools/**"
      - "scripts/**"
      - "e2e/**"
      - "docs/snippets/**"
      - ".github/workflows/ci-validate.yaml"
      - ".github/actions/**"
      - ".pre-commit-config.yaml"
      - ".golangci.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Taskfile.yml"
      - ".task/**"
      - "pyproject.toml"
      - "biome.json"
      - ".clang-format"
  pull_request:
    branches: [main]
    paths:
      - "crates/**"
      - "packages/**"
      - "tools/**"
      - "scripts/**"
      - "e2e/**"
      - "docs/snippets/**"
      - ".github/workflows/ci-validate.yaml"
      - ".github/actions/**"
      - ".pre-commit-config.yaml"
      - ".golangci.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Taskfile.yml"
      - ".task/**"
      - "pyproject.toml"
      - "biome.json"
      - ".clang-format"
  workflow_run:
    workflows: ["Publish Release"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: ci-validate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  RUST_BACKTRACE: short
  BUILD_PROFILE: ci

jobs:
  validate:
    name: Validate (Lint & Format)
    if: github.repository == 'kreuzberg-dev/tree-sitter-language-pack' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # --- Rust ---
      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          use-sccache: "false"
          install-llvm-cov: "false"

      # --- Python ---
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Python dependencies
        run: uv sync --no-install-project

      # --- Node.js (for biome) ---
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install biome
        run: npm install -g @biomejs/biome

      # --- Ruby ---
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
          working-directory: crates/ts-pack-ruby

      # --- Go ---
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: packages/go/v1/go.sum

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b "$(go env GOPATH)/bin" v2.1.6
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      # --- Java ---
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "25.0.2+10"

      # --- Elixir ---
      - name: Setup Elixir
        uses: erlef/setup-elixir@v1
        with:
          elixir-version: "1.17"
          otp-version: "27.2"
          version-type: strict

      - name: Install Elixir dependencies
        run: cd crates/ts-pack-elixir && mix deps.get

      # --- C/C++ ---
      - name: Install C/C++ tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends cppcheck clang-format

      # --- Task runner ---
      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      # --- Prek ---
      - name: Run prek hooks
        uses: j178/prek-action@v1
        with:
          extra-args: --all-files

  readme-check:
    name: README validation
    if: github.repository == 'kreuzberg-dev/tree-sitter-language-pack'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Check README generation
        run: uv run scripts/generate_readme.py --validate

      - name: Build snippet-runner
        run: cargo build --release -p snippet-runner

      - name: Validate documentation snippets
        run: ./target/release/snippet-runner validate --snippets docs/snippets --level syntax --timeout 120
