name: CI C#

on:
  push:
    branches: [main]
    paths:
      - "packages/csharp/**"
      - "crates/ts-pack-ffi/**"
      - "crates/ts-pack-core/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "e2e/csharp/**"
      - "fixtures/**"
      - "tools/e2e-generator/**"
      - ".cargo/config.toml"
      - "rust-toolchain.toml"
      - ".task/csharp.yml"
      - "Taskfile.yml"
      - "scripts/**"
      - ".github/workflows/ci-csharp.yaml"
  pull_request:
    branches: [main]
    paths:
      - "packages/csharp/**"
      - "crates/ts-pack-ffi/**"
      - "crates/ts-pack-core/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "e2e/csharp/**"
      - "fixtures/**"
      - "tools/e2e-generator/**"
      - ".cargo/config.toml"
      - "rust-toolchain.toml"
      - ".task/csharp.yml"
      - "Taskfile.yml"
      - "scripts/**"
      - ".github/workflows/ci-csharp.yaml"
  workflow_run:
    workflows: ["Publish Release"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: ci-csharp-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  RUST_BACKTRACE: short
  BUILD_PROFILE: ci
  DOTNET_VERSION: "10.0.x"

jobs:
  clone-vendors:
    name: Clone vendors
    if: github.repository == 'kreuzberg-dev/tree-sitter-language-pack' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --no-install-project

      - name: Cache parsers
        uses: actions/cache@v5
        with:
          path: parsers
          key: parsers-${{ hashFiles('sources/language_definitions.json') }}
          restore-keys: |
            parsers-

      - name: Clone vendors
        run: |
          mkdir -p parsers
          uv run --no-sync scripts/clone_vendors.py

      - name: Upload parsers
        uses: actions/upload-artifact@v7
        with:
          name: language-parsers
          path: parsers
          retention-days: 1

  build-ffi:
    name: Build FFI library
    needs: clone-vendors
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download parsers
        uses: actions/download-artifact@v8
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          components: ""
          use-sccache: "true"
          cache-key-prefix: csharp-ubuntu-latest
          install-llvm-cov: "false"

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Build FFI library
        run: cargo build -p ts-pack-ffi --release
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          TSLP_LINK_MODE: static
          TSLP_LANGUAGES: "python,rust,javascript,typescript,go,html,css,json"

      - name: Upload FFI artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ffi-linux
          path: |
            target/release/libts_pack_ffi.so
            crates/ts-pack-ffi/include/
          retention-days: 1

      - name: Cleanup Rust cache
        if: always()
        uses: kreuzberg-dev/actions/cleanup-rust-cache@v1

  test-csharp:
    name: C# unit tests (${{ matrix.os }})
    needs: clone-vendors
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
          - os: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download parsers
        uses: actions/download-artifact@v8
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          components: ""
          use-sccache: "true"
          cache-key-prefix: csharp-${{ matrix.os }}
          install-llvm-cov: "false"

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Build FFI library
        run: cargo build -p ts-pack-ffi --release
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          TSLP_LANGUAGES: "python,rust,javascript,typescript,go,html,css,json"
          TSLP_LINK_MODE: static

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Set library paths for .NET
        shell: bash
        run: |
          echo "LD_LIBRARY_PATH=${{ github.workspace }}/target/release:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          echo "TSPACK_FFI_DIR=${{ github.workspace }}/target/release" >> "$GITHUB_ENV"

      - name: Build C# bindings
        working-directory: packages/csharp
        run: dotnet build TreeSitterLanguagePack.sln -c Release

      - name: Run C# tests
        working-directory: packages/csharp
        run: dotnet test TreeSitterLanguagePack.sln -c Release --no-build

      - name: Cleanup Rust cache
        if: always()
        uses: kreuzberg-dev/actions/cleanup-rust-cache@v1

  e2e-csharp:
    name: C# E2E tests
    needs: build-ffi
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download parsers
        uses: actions/download-artifact@v8
        with:
          name: language-parsers
          path: parsers

      - name: Download FFI artifacts
        uses: actions/download-artifact@v8
        with:
          name: ffi-linux
          path: ffi-artifacts

      - name: Restore FFI to expected path
        run: |
          mkdir -p target/release
          cp ffi-artifacts/target/release/libts_pack_ffi.* target/release/ 2>/dev/null || true

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          components: ""
          use-sccache: "true"
          cache-key-prefix: csharp-e2e-ubuntu-latest
          install-llvm-cov: "false"

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Generate E2E tests
        run: cargo run -p e2e-generator -- generate --lang csharp
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          TSLP_LANGUAGES: "python,rust,javascript,typescript,go,html,css,json"

      - name: Set library paths for .NET
        shell: bash
        run: |
          echo "LD_LIBRARY_PATH=${{ github.workspace }}/target/release:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          echo "TSPACK_FFI_DIR=${{ github.workspace }}/target/release" >> "$GITHUB_ENV"

      - name: Run E2E tests
        working-directory: e2e/csharp
        run: dotnet test -c Release

      - name: Cleanup Rust cache
        if: always()
        uses: kreuzberg-dev/actions/cleanup-rust-cache@v1
