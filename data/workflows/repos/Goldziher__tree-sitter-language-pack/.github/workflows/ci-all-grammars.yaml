name: CI All Grammars

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/ci-all-grammars.yaml'
      - 'sources/language_definitions.json'
      - 'crates/ts-pack-core/**'
      - 'e2e/rust/**'
      - 'tools/e2e-generator/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/ci-all-grammars.yaml'
      - 'sources/language_definitions.json'
      - 'crates/ts-pack-core/**'
      - 'e2e/rust/**'
      - 'tools/e2e-generator/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-all-grammars-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  RUST_BACKTRACE: short
  BUILD_PROFILE: ci

jobs:
  clone-vendors:
    name: Clone vendors
    if: github.repository == 'kreuzberg-dev/tree-sitter-language-pack' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --no-install-project

      - name: Cache parsers
        uses: actions/cache@v5
        with:
          path: parsers
          key: parsers-${{ hashFiles('sources/language_definitions.json') }}
          restore-keys: |
            parsers-

      - name: Clone vendors
        run: |
          mkdir -p parsers
          uv run --no-sync scripts/clone_vendors.py

      - name: Upload parsers
        uses: actions/upload-artifact@v7
        with:
          name: language-parsers
          path: parsers
          retention-days: 1

  all-grammars:
    name: All Grammars Integration Test
    if: github.repository == 'kreuzberg-dev/tree-sitter-language-pack' && github.actor != 'dependabot[bot]'
    needs: clone-vendors
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download parsers
        uses: actions/download-artifact@v8
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Run all-grammars E2E tests (static)
        run: task rust:e2e:all-grammars
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          TSLP_LINK_MODE: static

      - name: Run c_symbol override E2E tests (dynamic)
        run: task rust:e2e:test
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          TSLP_LINK_MODE: dynamic
          TSLP_LANGUAGES: "csharp,vb,embeddedtemplate,nushell,python"
