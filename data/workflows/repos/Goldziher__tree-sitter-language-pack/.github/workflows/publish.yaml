    needs: [prepare, validate-versions, clone-vendors]
    if: needs.prepare.outputs.release_csharp == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            rid: linux-x64
          - os: ubuntu-24.04-arm
            label: linux-aarch64
            rid: linux-arm64
          - os: macos-latest
            label: macos-arm64
            rid: osx-arm64
          - os: windows-latest
            label: windows-x86_64
            rid: win-x64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Download parsers
        uses: actions/download-artifact@v8
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Build FFI library
        run: cargo build -p ts-pack-ffi --release
        env:
