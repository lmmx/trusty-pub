name: Publish Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v1.0.0-rc.2)"
        required: true
        type: string
      dry_run:
        description: "Dry run without publishing"
        required: false
        type: boolean
        default: false
      force_republish:
        description: "Force republish even if version exists"
        required: false
        type: boolean
        default: false
      targets:
        description: "Comma-separated targets or 'all'"
        required: false
        type: string
        default: "all"
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.tag || github.event.release.tag_name || github.run_id }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: short

permissions:
  contents: read

jobs:
  # ─── Prepare ───────────────────────────────────────────────────────
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      npm_tag: ${{ steps.meta.outputs.npm_tag }}
      dry_run: ${{ steps.meta.outputs.dry_run }}
      force_republish: ${{ steps.meta.outputs.force_republish }}
      release_crates: ${{ steps.targets.outputs.crates }}
      release_python: ${{ steps.targets.outputs.python }}
      release_node: ${{ steps.targets.outputs.node }}
      release_wasm: ${{ steps.targets.outputs.wasm }}
      release_ruby: ${{ steps.targets.outputs.ruby }}
      release_go: ${{ steps.targets.outputs.go }}
      release_java: ${{ steps.targets.outputs.java }}
      release_elixir: ${{ steps.targets.outputs.elixir }}
      release_c_ffi: ${{ steps.targets.outputs.c_ffi }}
      release_php: ${{ steps.targets.outputs.php }}
      release_csharp: ${{ steps.targets.outputs.csharp }}
      release_homebrew: ${{ steps.targets.outputs.homebrew }}
    steps:
      - name: Extract version and flags
        id: meta
        run: |
          # Resolve tag from workflow_dispatch input or release event
          if [[ -n "${{ inputs.tag }}" ]]; then
            tag="${{ inputs.tag }}"
          elif [[ -n "${{ github.event.release.tag_name }}" ]]; then
            tag="${{ github.event.release.tag_name }}"
          else
            echo "::error::No tag provided"
            exit 1
          fi
          version="${tag#v}"
          if [[ "$version" == *-rc* ]] || [[ "$version" == *-alpha* ]] || [[ "$version" == *-beta* ]] || [[ "$version" == *-pre* ]]; then
            npm_tag="next"
          else
            npm_tag="latest"
          fi
          # For release events, default to non-dry-run with all targets
          dry_run="${{ inputs.dry_run || 'false' }}"
          force_republish="${{ inputs.force_republish || 'false' }}"
          {
            echo "tag=$tag"
            echo "version=$version"
            echo "npm_tag=$npm_tag"
            echo "dry_run=$dry_run"
            echo "force_republish=$force_republish"
          } >> "$GITHUB_OUTPUT"

      - name: Determine targets
        id: targets
        run: |
          targets="${{ inputs.targets || 'all' }}"
          for target in crates python node wasm ruby go java elixir c_ffi php csharp homebrew; do
            if [[ "$targets" == "all" || "$targets" == *"$target"* ]]; then
              echo "$target=true" >> "$GITHUB_OUTPUT"
            else
              echo "$target=false" >> "$GITHUB_OUTPUT"
            fi
          done

      - name: Release info
        run: |
          {
            echo "## Release Configuration"
            echo "- **Tag**: ${{ steps.meta.outputs.tag }}"
            echo "- **Version**: ${{ steps.meta.outputs.version }}"
            echo "- **Dry run**: ${{ inputs.dry_run }}"
            echo "- **Force republish**: ${{ inputs.force_republish }}"
            echo "- **Targets**: ${{ inputs.targets }}"
          } >> "$GITHUB_STEP_SUMMARY"

  # ─── Validate versions ──────────────────────────────────────────────
  validate-versions:
    name: Validate version consistency
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Verify Cargo.toml version matches tag
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          CARGO_VERSION=$(grep -A2 '\[workspace\.package\]' Cargo.toml | grep 'version' | sed 's/.*version = "\(.*\)"/\1/')
          if [[ "$CARGO_VERSION" != "$VERSION" ]]; then
            echo "::error::Cargo.toml version ($CARGO_VERSION) does not match tag version ($VERSION)"
            exit 1
          fi
          echo "Cargo.toml: $CARGO_VERSION"

      - name: Verify Node.js package version
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          if [ -f crates/ts-pack-node/package.json ]; then
            NODE_VERSION=$(python3 -c "import json; print(json.load(open('crates/ts-pack-node/package.json'))['version'])")
            if [[ "$NODE_VERSION" != "$VERSION" ]]; then
              echo "::error::Node.js package version ($NODE_VERSION) does not match tag version ($VERSION)"
              exit 1
            fi
            echo "Node.js: $NODE_VERSION"
          fi

      - name: Verify WASM package version
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          if [ -f crates/ts-pack-wasm/package.json ]; then
            WASM_VERSION=$(python3 -c "import json; print(json.load(open('crates/ts-pack-wasm/package.json'))['version'])")
            if [[ "$WASM_VERSION" != "$VERSION" ]]; then
              echo "::error::WASM package version ($WASM_VERSION) does not match tag version ($VERSION)"
              exit 1
            fi
            echo "WASM: $WASM_VERSION"
          fi

      - name: Verify Ruby gemspec version
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          RUBY_VERSION="${VERSION//-/.}"
          if [ -f crates/ts-pack-ruby/tree_sitter_language_pack.gemspec ]; then
            GEMSPEC_VERSION=$(grep "spec.version" crates/ts-pack-ruby/tree_sitter_language_pack.gemspec | sed "s/.*'\(.*\)'/\1/")
            if [[ "$GEMSPEC_VERSION" != "$RUBY_VERSION" ]]; then
              echo "::error::Gemspec version ($GEMSPEC_VERSION) does not match tag version ($RUBY_VERSION)"
              exit 1
            fi
            echo "Ruby: $GEMSPEC_VERSION"
          fi

      - name: Verify Maven pom.xml version
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          if [ -f crates/ts-pack-java/pom.xml ]; then
            POM_VERSION=$(grep -m1 '<version>' crates/ts-pack-java/pom.xml | sed 's/.*<version>\(.*\)<\/version>.*/\1/' | tr -d '[:space:]')
            if [[ "$POM_VERSION" != "$VERSION" ]]; then
              echo "::error::pom.xml version ($POM_VERSION) does not match tag version ($VERSION)"
              exit 1
            fi
            echo "Maven: $POM_VERSION"
          fi

      - name: Verify Elixir mix.exs version
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          if [ -f crates/ts-pack-elixir/mix.exs ]; then
            MIX_VERSION=$(grep '@version' crates/ts-pack-elixir/mix.exs | head -1 | sed 's/.*"\(.*\)".*/\1/')
            if [[ "$MIX_VERSION" != "$VERSION" ]]; then
              echo "::error::mix.exs version ($MIX_VERSION) does not match tag version ($VERSION)"
              exit 1
            fi
            echo "Elixir: $MIX_VERSION"
          fi

      - name: Version summary
        run: |
          {
            echo "## Version Validation"
            echo "All package manifests match version **${{ needs.prepare.outputs.version }}**"
          } >> "$GITHUB_STEP_SUMMARY"

  # ─── Registry checks ──────────────────────────────────────────────
  check-cratesio:
    name: Check crates.io
    needs: prepare
    if: needs.prepare.outputs.release_crates == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Check if version exists
        id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: cratesio
          package: tree-sitter-language-pack
          version: ${{ needs.prepare.outputs.version }}

  check-pypi:
    name: Check PyPI
    needs: prepare
    if: needs.prepare.outputs.release_python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Check if version exists
        id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: pypi
          package: tree-sitter-language-pack
          version: ${{ needs.prepare.outputs.version }}

  check-npm:
    name: Check npm
    needs: prepare
    if: needs.prepare.outputs.release_node == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Check if version exists
        id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: npm
          package: "@kreuzberg/tree-sitter-language-pack"
          version: ${{ needs.prepare.outputs.version }}

  check-npm-wasm:
    name: Check npm (WASM)
    needs: prepare
    if: needs.prepare.outputs.release_wasm == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Check if version exists
        id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: npm
          package: "@kreuzberg/tree-sitter-language-pack-wasm"
          version: ${{ needs.prepare.outputs.version }}

  check-rubygems:
    name: Check RubyGems
    needs: prepare
    if: needs.prepare.outputs.release_ruby == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Check if version exists
        id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: rubygems
          package: tree_sitter_language_pack
          version: ${{ needs.prepare.outputs.version }}

  check-maven:
    name: Check Maven Central
    needs: prepare
    if: needs.prepare.outputs.release_java == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Check if version exists
        id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: maven
          package: tree-sitter-language-pack
          group-id: dev.kreuzberg
          version: ${{ needs.prepare.outputs.version }}

  check-hex:
    name: Check Hex.pm
    needs: prepare
    if: needs.prepare.outputs.release_elixir == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Check if version exists
        id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: hex
          package: tree_sitter_language_pack
          version: ${{ needs.prepare.outputs.version }}

  check-packagist:
    name: Check Packagist
    needs: prepare
    if: needs.prepare.outputs.release_php == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Check if version exists
        id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: packagist
          package: kreuzberg/tree-sitter-language-pack
          version: ${{ needs.prepare.outputs.version }}

  check-nuget:
    name: Check NuGet
    needs: prepare
    if: needs.prepare.outputs.release_csharp == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Check if version exists
        id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: nuget
          package: TreeSitterLanguagePack
          version: ${{ needs.prepare.outputs.version }}

  # ─── Clone vendors ────────────────────────────────────────────────
  clone-vendors:
    name: Clone vendors
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v6

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --no-install-project

      - name: Cache parsers
        uses: actions/cache@v5
        with:
          path: parsers
          key: parsers-${{ hashFiles('sources/language_definitions.json') }}
          restore-keys: |
            parsers-

      - name: Clone vendors
        run: |
          mkdir -p parsers
          uv run --no-sync scripts/clone_vendors.py

      - name: Upload parsers
        uses: actions/upload-artifact@v7
        with:
          name: language-parsers
          path: parsers
          retention-days: 3

  # ─── Build parser binaries ─────────────────────────────────────────
  build-parser-binaries:
    name: Build parser binaries (${{ matrix.label }})
    needs: [prepare, validate-versions, clone-vendors]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
          - os: ubuntu-24.04-arm
            label: linux-aarch64
          - os: macos-latest
            label: macos-arm64
          - os: windows-latest
            label: windows-x86_64
          - os: windows-11-arm
            label: windows-aarch64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Download parsers
        uses: actions/download-artifact@v8
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Install zstd (if missing)
        shell: bash
        run: |
          if command -v zstd &>/dev/null; then
            echo "zstd already available: $(zstd --version)"
          elif [[ "$RUNNER_OS" == "Windows" ]]; then
            echo "Installing zstd for Windows..."
            curl -fsSL "https://github.com/facebook/zstd/releases/download/v1.5.7/zstd-v1.5.7-win64.zip" -o /tmp/zstd.zip
            unzip -q /tmp/zstd.zip -d /tmp/zstd
            cp /tmp/zstd/zstd-v1.5.7-win64/zstd.exe "$HOME/.cargo/bin/"
            echo "zstd installed: $(zstd --version)"
          else
            echo "Installing zstd via package manager..."
            if [[ "$RUNNER_OS" == "macOS" ]]; then
              brew install zstd
            else
              sudo apt-get update && sudo apt-get install -y zstd
            fi
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Get all language names
        id: langs
        shell: bash
        run: |
          LANGS=$(python3 -c "import json; d=json.load(open('sources/language_definitions.json')); print(','.join(sorted(d.keys())))")
          echo "names=$LANGS" >> "$GITHUB_OUTPUT"

      - name: Build all parsers
        run: cargo build -p tree-sitter-language-pack --release
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          TSLP_LINK_MODE: dynamic
          TSLP_LANGUAGES: ${{ steps.langs.outputs.names }}

      - name: Package parser binaries (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          # Dynamic parser libraries are built into the OUT_DIR/libs/ by build.rs
          find target/release/build -path '*/out/libs/*' \( -name 'libtree_sitter_*.so' -o -name 'libtree_sitter_*.dylib' \) -exec cp {} staging/ \;
          echo "Packaged $(find staging/ -maxdepth 1 -type f | wc -l) parser libraries"
          find staging/ -maxdepth 1 -type f | head -20
          cd staging && tar -cf - . | zstd -19 -o "../parsers-${{ matrix.label }}.tar.zst"

      - name: Package parser binaries (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p staging
          find target/release/build -path '*/out/libs/*' -name 'tree_sitter_*.dll' -exec cp {} staging/ \;
          echo "Packaged $(find staging/ -maxdepth 1 -type f | wc -l) parser libraries"
          cd staging && tar -cf - . | zstd -19 -o "../parsers-${{ matrix.label }}.tar.zst"

      - name: Upload parser binaries
        uses: actions/upload-artifact@v7
        with:
          name: parsers-${{ matrix.label }}
          path: parsers-${{ matrix.label }}.tar.zst
          retention-days: 14

  # ─── Build Python wheels ───────────────────────────────────────────
  build-python-wheels:
    name: Build Python wheel (${{ matrix.label }})
    needs: [prepare, validate-versions, clone-vendors]
    if: needs.prepare.outputs.release_python == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
          - os: ubuntu-24.04-arm
            label: linux-aarch64
          - os: macos-latest
            label: macos-arm64
          - os: windows-latest
            label: windows-x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Download parsers
        uses: actions/download-artifact@v8
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Install maturin
        run: pip install maturin

      - name: Build wheel
        run: maturin build --release --manifest-path crates/ts-pack-python/Cargo.toml --out dist
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Upload wheel
        uses: actions/upload-artifact@v7
        with:
          name: python-wheel-${{ matrix.label }}
          path: dist/*.whl
          retention-days: 14

  # ─── Build Node.js native modules ─────────────────────────────────
  build-node-native:
    name: Build Node.js (${{ matrix.label }})
    needs: [prepare, validate-versions, clone-vendors]
    if: needs.prepare.outputs.release_node == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64-gnu
            napi_target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            label: linux-arm64-gnu
            napi_target: aarch64-unknown-linux-gnu
          - os: macos-latest
            label: darwin-arm64
            napi_target: aarch64-apple-darwin
          - os: windows-latest
            label: win32-x64-msvc
            napi_target: x86_64-pc-windows-msvc
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Download parsers
        uses: actions/download-artifact@v8
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install NAPI-RS CLI
        run: npm install -g @napi-rs/cli

      - name: Build native module
        working-directory: crates/ts-pack-node
        run: napi build --release --platform --target ${{ matrix.napi_target }}
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Upload native module
        uses: actions/upload-artifact@v7
        with:
          name: node-native-${{ matrix.label }}
          path: crates/ts-pack-node/*.node
          retention-days: 14

  # ─── Build Ruby gems ──────────────────────────────────────────────
  build-ruby-gem:
    name: Build Ruby gem (${{ matrix.label }})
    needs: [prepare, validate-versions, clone-vendors]
    if: needs.prepare.outputs.release_ruby == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    env:
      RB_SYS_CARGO_PROFILE: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            ruby_platform: x86_64-linux
          - os: ubuntu-24.04-arm
            label: linux-aarch64
            ruby_platform: aarch64-linux
          - os: macos-latest
            label: macos-arm64
            ruby_platform: arm64-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Download parsers
        uses: actions/download-artifact@v8
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler: none
          bundler-cache: false

      - name: Install Bundler
        run: gem install bundler --no-document && bundler --version

      - name: Install Ruby dependencies
        working-directory: crates/ts-pack-ruby
        run: |
          bundle config set --local path vendor/bundle
          bundle check || bundle install

      - name: Compile native extension
        working-directory: crates/ts-pack-ruby
        timeout-minutes: 60
        run: |
          echo "Compiling native extension..."
          bundle exec rake compile
          echo "Native extension compiled successfully"
          echo "=== Native libraries ==="
          find lib -name '*.so' -o -name '*.bundle' -o -name '*.dylib' 2>/dev/null | head -20
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          CARGO_TARGET_DIR: ${{ github.workspace }}/crates/ts-pack-ruby/target

      - name: Build platform gem
        run: ruby scripts/publish/ruby/build-native-gem.rb "${{ matrix.ruby_platform }}"

      - name: Verify gem was built
        working-directory: crates/ts-pack-ruby
        run: |
          if ! ls ./*.gem 1>/dev/null 2>&1; then
            echo "ERROR: No gem file found" >&2
            exit 1
          fi
          echo "Gem built successfully:"
          ls -lh ./*.gem
          # Verify it's a platform gem, not a source gem
          gem spec ./*.gem | grep -i platform

      - name: Verify gem integrity
        working-directory: crates/ts-pack-ruby
        run: |
          for gem in ./*.gem; do
            echo "Validating: $gem"
            file "$gem"
            if ! gem spec "$gem" >/dev/null 2>&1; then
              echo "WARNING: gem spec check failed for $gem"
              if ! tar -tzf "$gem" >/dev/null 2>&1; then
                echo "ERROR: Corrupted gem file: $gem" >&2
                exit 1
              fi
            else
              echo "gem spec validation passed"
            fi
          done

      - name: Upload gem artifacts
        uses: actions/upload-artifact@v7
        with:
          name: rubygems-${{ matrix.label }}
          path: crates/ts-pack-ruby/*.gem
          retention-days: 14
          compression-level: 0

  # ─── Build WASM package (split into two jobs to avoid OOM) ─────────
  build-wasm:
    name: Build WASM package
    needs: [prepare, validate-versions, clone-vendors]
    if: needs.prepare.outputs.release_wasm == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Download parsers
        uses: actions/download-artifact@v8
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          target: wasm32-unknown-unknown
          components: ""
          use-sccache: "true"
          install-llvm-cov: "false"

      - name: Install WASI SDK
        uses: kreuzberg-dev/actions/install-wasi-sdk@v1

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM (web target)
        working-directory: crates/ts-pack-wasm
        run: wasm-pack build --target web --release
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          TSLP_LINK_MODE: static
          CARGO_PROFILE_RELEASE_LTO: "false"
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
          NUM_JOBS: "2"

      - name: Verify WASM build output
        working-directory: crates/ts-pack-wasm
        run: |
          if [ ! -d pkg ]; then
            echo "ERROR: pkg/ directory not created by wasm-pack" >&2
            exit 1
          fi
          echo "=== WASM build output (web) ==="
          ls -lh pkg/
          if [ ! -f pkg/ts_pack_wasm_bg.wasm ]; then
            echo "ERROR: WASM binary not found" >&2
            exit 1
          fi
          echo "WASM binary size: $(wc -c < pkg/ts_pack_wasm_bg.wasm) bytes"

      - name: Patch WASM package.json
        working-directory: crates/ts-pack-wasm
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          python3 -c "
          import json
          with open('pkg/package.json', 'r') as f:
              data = json.load(f)
          data['name'] = '@kreuzberg/tree-sitter-language-pack-wasm'
          data['version'] = '$VERSION'
          data['publishConfig'] = {'registry': 'https://registry.npmjs.org/', 'access': 'public'}
          data['repository'] = {'type': 'git', 'url': 'https://github.com/kreuzberg-dev/tree-sitter-language-pack'}
          data['license'] = 'MIT'
          with open('pkg/package.json', 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')
          print(f'Patched pkg/package.json: name={data[\"name\"]}, version={data[\"version\"]}')
          "

      - name: Upload WASM package
        uses: actions/upload-artifact@v7
        with:
          name: wasm-pkg
          path: crates/ts-pack-wasm/pkg/
          retention-days: 14

