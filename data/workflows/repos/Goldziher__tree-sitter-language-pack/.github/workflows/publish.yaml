        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p csharp-natives/${{ matrix.rid }}
          cp target/release/ts_pack_ffi.dll csharp-natives/${{ matrix.rid }}/ 2>/dev/null || true

      - name: Upload native artifact
        uses: actions/upload-artifact@v7
