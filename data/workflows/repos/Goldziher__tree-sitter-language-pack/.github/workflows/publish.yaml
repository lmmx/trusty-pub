  # ─── Build Elixir NIFs ────────────────────────────────────────────
  build-elixir-nifs:
    name: Build Elixir NIF (${{ matrix.label }})
    needs: [prepare, validate-versions, clone-vendors]
    if: needs.prepare.outputs.release_elixir == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            label: linux-aarch64
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            label: macos-arm64
            target: aarch64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Download parsers
        uses: actions/download-artifact@v8
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          target: ${{ matrix.target }}
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Build Elixir NIF
        working-directory: crates/ts-pack-elixir
        run: cargo build --release --target ${{ matrix.target }}
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          CARGO_BUILD_TARGET: ${{ matrix.target }}

      - name: Package NIF libraries (NIF 2.16)
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TARGET="${{ matrix.target }}"
          NIF_VERSION="2.16"

          if [[ "${{ runner.os }}" == "macOS" ]]; then
            ARCHIVE_EXT="so"
            LIB_NAME="libts_pack_elixir.dylib"
          else
            ARCHIVE_EXT="so"
            LIB_NAME="libts_pack_elixir.so"
          fi

          mkdir -p dist/elixir
          # Underscore name (matches Cargo output)
          ARTIFACT_UNDERSCORE="libts_pack_elixir-v${VERSION}-nif-${NIF_VERSION}-${TARGET}.${ARCHIVE_EXT}"
          # Hyphen name (matches what RustlerPrecompiled expects from crate: "ts-pack-elixir")
          ARTIFACT_HYPHEN="libts-pack-elixir-v${VERSION}-nif-${NIF_VERSION}-${TARGET}.${ARCHIVE_EXT}"

          # ts-pack-elixir is a standalone workspace, output is in crates/ts-pack-elixir/target/
          LIB_PATH="crates/ts-pack-elixir/target/${TARGET}/release/${LIB_NAME}"
          if [[ ! -f "$LIB_PATH" ]]; then
            LIB_PATH="crates/ts-pack-elixir/target/release/${LIB_NAME}"
          fi
          if [[ ! -f "$LIB_PATH" ]]; then
            LIB_PATH="target/${TARGET}/release/${LIB_NAME}"
          fi
          if [[ ! -f "$LIB_PATH" ]]; then
            LIB_PATH="target/release/${LIB_NAME}"
          fi

          if [[ ! -f "$LIB_PATH" ]]; then
            echo "ERROR: Library not found"
            find . -name "${LIB_NAME}" -type f 2>/dev/null || true
            exit 1
          fi

          # Create both underscore and hyphen tarballs
          cp "$LIB_PATH" "${ARTIFACT_UNDERSCORE}"
          tar -czf "dist/elixir/${ARTIFACT_UNDERSCORE}.tar.gz" "${ARTIFACT_UNDERSCORE}"
          echo "Created: dist/elixir/${ARTIFACT_UNDERSCORE}.tar.gz"

          cp "$LIB_PATH" "${ARTIFACT_HYPHEN}"
          tar -czf "dist/elixir/${ARTIFACT_HYPHEN}.tar.gz" "${ARTIFACT_HYPHEN}"
          echo "Created: dist/elixir/${ARTIFACT_HYPHEN}.tar.gz"

      - name: Package NIF libraries (NIF 2.17)
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TARGET="${{ matrix.target }}"
          NIF_VERSION="2.17"

          if [[ "${{ runner.os }}" == "macOS" ]]; then
            ARCHIVE_EXT="so"
            LIB_NAME="libts_pack_elixir.dylib"
          else
            ARCHIVE_EXT="so"
            LIB_NAME="libts_pack_elixir.so"
          fi

          ARTIFACT_UNDERSCORE="libts_pack_elixir-v${VERSION}-nif-${NIF_VERSION}-${TARGET}.${ARCHIVE_EXT}"
          ARTIFACT_HYPHEN="libts-pack-elixir-v${VERSION}-nif-${NIF_VERSION}-${TARGET}.${ARCHIVE_EXT}"

          # ts-pack-elixir is a standalone workspace, output is in crates/ts-pack-elixir/target/
          LIB_PATH="crates/ts-pack-elixir/target/${TARGET}/release/${LIB_NAME}"
          if [[ ! -f "$LIB_PATH" ]]; then
            LIB_PATH="crates/ts-pack-elixir/target/release/${LIB_NAME}"
          fi
          if [[ ! -f "$LIB_PATH" ]]; then
            LIB_PATH="target/${TARGET}/release/${LIB_NAME}"
          fi
          if [[ ! -f "$LIB_PATH" ]]; then
            LIB_PATH="target/release/${LIB_NAME}"
          fi

          if [[ ! -f "$LIB_PATH" ]]; then
            echo "ERROR: Library not found"
            find . -name "${LIB_NAME}" -type f 2>/dev/null || true
            exit 1
          fi

          cp "$LIB_PATH" "${ARTIFACT_UNDERSCORE}"
          tar -czf "dist/elixir/${ARTIFACT_UNDERSCORE}.tar.gz" "${ARTIFACT_UNDERSCORE}"
          echo "Created: dist/elixir/${ARTIFACT_UNDERSCORE}.tar.gz"

          cp "$LIB_PATH" "${ARTIFACT_HYPHEN}"
          tar -czf "dist/elixir/${ARTIFACT_HYPHEN}.tar.gz" "${ARTIFACT_HYPHEN}"
          echo "Created: dist/elixir/${ARTIFACT_HYPHEN}.tar.gz"

      - name: Upload NIF artifacts
        uses: actions/upload-artifact@v7
        with:
          name: elixir-${{ matrix.label }}
          path: dist/elixir/*.tar.gz
          if-no-files-found: error
          retention-days: 14

