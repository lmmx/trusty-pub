    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            platform: linux-x86_64
          - os: ubuntu-24.04-arm
            label: linux-aarch64
            platform: linux-aarch64
          - os: macos-latest
