          echo "RUSTFLAGS=${RUSTFLAGS:+$RUSTFLAGS }${EXTRA_FLAGS}" >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
