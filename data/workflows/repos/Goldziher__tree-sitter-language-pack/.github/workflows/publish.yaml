  # ─── Build C# NuGet package ─────────────────────────────────────────
  build-csharp-package:
    name: Build C# NuGet package
    needs: [prepare, validate-versions, build-csharp-native]
    if: needs.prepare.outputs.release_csharp == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0"

      - name: Download C# native artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: csharp-natives-*
          path: artifacts/csharp-natives
          merge-multiple: false

      - name: Stage native assets
        shell: bash
        run: |
          RUNTIMES_DIR="packages/csharp/TreeSitterLanguagePack/runtimes"
          mkdir -p "$RUNTIMES_DIR"
          for dir in artifacts/csharp-natives/*/; do
            rid=$(basename "$dir")
            mkdir -p "$RUNTIMES_DIR/$rid/native"
            cp "$dir"/* "$RUNTIMES_DIR/$rid/native/" 2>/dev/null || true
          done
          echo "=== Staged native runtimes ==="
          find "$RUNTIMES_DIR" -type f | head -20

      - name: Build and pack NuGet
        working-directory: packages/csharp/TreeSitterLanguagePack
        run: dotnet pack -c Release

      - name: Upload NuGet package
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: packages/csharp/TreeSitterLanguagePack/bin/Release/*.nupkg
          retention-days: 14

  # ─── Upload to GitHub Release: parser binaries ─────────────────────
  upload-parser-binaries:
    name: Upload parser binaries to GitHub Release
    needs: [prepare, validate-versions, build-parser-binaries]
    if: |
      always() &&
      needs.prepare.outputs.dry_run != 'true' &&
      needs.build-parser-binaries.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Download parser binary artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: parsers-*
          path: dist/parsers
          merge-multiple: true

      - name: Generate parsers.json manifest
        run: |
          python3 -c "
          import json, hashlib, os, subprocess

          version = '${{ needs.prepare.outputs.version }}'
          base_url = 'https://github.com/kreuzberg-dev/tree-sitter-language-pack/releases/download/v' + version
          defs = json.load(open('sources/language_definitions.json'))

          platforms = {}
          for f in sorted(os.listdir('dist/parsers')):
              if f.startswith('parsers-') and f.endswith('.tar.zst'):
                  path = os.path.join('dist/parsers', f)
                  label = f.replace('parsers-', '').replace('.tar.zst', '')
                  sha = hashlib.sha256(open(path, 'rb').read()).hexdigest()
                  size = os.path.getsize(path)
                  platforms[label] = {
                      'url': base_url + '/' + f,
                      'sha256': sha,
                      'size': size,
                  }

          languages = {}
          for name in sorted(defs.keys()):
              languages[name] = {'group': 'all', 'size': 0}

          manifest = {
              'version': version,
              'platforms': platforms,
              'languages': languages,
              'groups': {'all': sorted(defs.keys())},
          }

          with open('dist/parsers/parsers.json', 'w') as f:
              json.dump(manifest, f, indent=2)
          print(f'Generated parsers.json with {len(platforms)} platforms and {len(languages)} languages')
          "

      - name: Upload to GitHub Release
        uses: kreuzberg-dev/actions/publish-github-release@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          title: "Release ${{ needs.prepare.outputs.tag }}"
          artifacts: |
            dist/parsers/parsers-*.tar.zst
            dist/parsers/parsers.json
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}

  # ─── Upload to GitHub Release: Go FFI ──────────────────────────────
  upload-go-release:
    name: Upload Go FFI to GitHub Release
    needs: [prepare, validate-versions, build-go-ffi]
    if: |
      always() &&
      needs.prepare.outputs.dry_run != 'true' &&
      needs.prepare.outputs.release_go == 'true' &&
      needs.build-go-ffi.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Download Go FFI artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: go-ffi-*
          path: dist/go
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: kreuzberg-dev/actions/publish-github-release@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          title: "Release ${{ needs.prepare.outputs.tag }}"
          artifacts: "dist/go/go-ffi-*.tar.gz"
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}

  # ─── Upload to GitHub Release: C FFI ───────────────────────────────
  upload-c-ffi-release:
    name: Upload C FFI to GitHub Release
    needs: [prepare, validate-versions, build-c-ffi]
    if: |
      always() &&
      needs.prepare.outputs.dry_run != 'true' &&
      needs.prepare.outputs.release_c_ffi == 'true' &&
      needs.build-c-ffi.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Download C FFI artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: c-ffi-*
          path: dist/c-ffi
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: kreuzberg-dev/actions/publish-github-release@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          title: "Release ${{ needs.prepare.outputs.tag }}"
          artifacts: "dist/c-ffi/c-ffi-*.tar.gz"
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}

  # ─── Upload to GitHub Release: Elixir NIFs ────────────────────────
  upload-elixir-release:
    name: Upload Elixir NIFs to GitHub Release
    needs: [prepare, validate-versions, build-elixir-nifs]
    if: |
      always() &&
      needs.prepare.outputs.dry_run != 'true' &&
      needs.prepare.outputs.release_elixir == 'true' &&
      needs.build-elixir-nifs.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Download Elixir NIF artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: elixir-*
          path: dist/elixir
          merge-multiple: true

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          # Ensure release exists (draft)
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --draft --title "Release $TAG"
          for file in dist/elixir/*.tar.gz; do
            echo "Uploading $(basename "$file")..."
            gh release upload "$TAG" "$file" --clobber
          done

  # ─── Publish Rust crates ───────────────────────────────────────────
  publish-crates:
    name: Publish Rust crates
    needs: [prepare, validate-versions, clone-vendors, check-cratesio]
    if: |
      always() &&
      needs.prepare.outputs.release_crates == 'true' &&
      needs.validate-versions.result == 'success' &&
      needs.clone-vendors.result == 'success' &&
      (needs.check-cratesio.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Download parsers
        uses: actions/download-artifact@v8
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Dry run - verify crate packaging
        if: ${{ inputs.dry_run }}
        run: |
          cargo package -p tree-sitter-language-pack --allow-dirty 2>&1 | tail -5
          {
            echo "## Crates Dry Run"
            echo "- tree-sitter-language-pack: packaged successfully"
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Publish tree-sitter-language-pack
        if: ${{ !inputs.dry_run }}
        run: |
          output=$(cargo publish -p tree-sitter-language-pack 2>&1) || {
            if echo "$output" | grep -qiE "(already uploaded|already exists)"; then
              echo "::notice::tree-sitter-language-pack already published; skipping."
            else
              echo "$output"
              exit 1
            fi
          }
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          PROJECT_ROOT: ${{ github.workspace }}

  # ─── Publish Python to PyPI ────────────────────────────────────────
  publish-pypi:
    name: Publish Python to PyPI
    needs: [prepare, validate-versions, check-pypi, build-python-wheels]
    if: |
      always() &&
      needs.prepare.outputs.release_python == 'true' &&
      needs.build-python-wheels.result == 'success' &&
      (needs.check-pypi.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: python-wheel-*
          merge-multiple: true

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: |
          {
            echo "## PyPI Dry Run"
            echo "Wheels staged for PyPI:"
            echo '```'
            ls -1 dist/*.whl
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish to PyPI
        if: ${{ !inputs.dry_run }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true

  # ─── Publish Node.js to npm ────────────────────────────────────────
  publish-node:
    name: Publish Node.js to npm
    needs: [prepare, validate-versions, check-npm, build-node-native]
    if: |
      always() &&
      needs.prepare.outputs.release_node == 'true' &&
      needs.build-node-native.result == 'success' &&
      (needs.check-npm.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install NAPI-RS CLI
        run: npm install -g @napi-rs/cli

      - name: Download all native modules
        uses: actions/download-artifact@v8
        with:
          path: crates/ts-pack-node/artifacts
          pattern: node-native-*
          merge-multiple: true

      - name: Prepare platform packages
        working-directory: crates/ts-pack-node
        run: |
          echo "=== Downloaded artifacts ==="
          find artifacts -name '*.node' -type f
          echo ""
          napi artifacts --build-output-dir artifacts --npm-dir npm
          echo "=== Generated platform packages ==="
          find npm -name '*.node' -type f

      - name: Pack platform packages
        working-directory: crates/ts-pack-node/npm
        run: |
          for dir in ./*/; do
            if [ -f "$dir/package.json" ]; then
              (cd "$dir" && npm pack && mv ./*.tgz ..)
            fi
          done
          echo "=== Packed tarballs ==="
          ls -lh ./*.tgz

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        working-directory: crates/ts-pack-node
        run: |
          {
            echo "## npm Dry Run"
            echo "Platform packages staged:"
            echo '```'
            find npm -name '*.node' -type f
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Re-check npm before publish
        if: ${{ !inputs.dry_run }}
        id: recheck
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: npm
          package: "@kreuzberg/tree-sitter-language-pack"
          version: ${{ needs.prepare.outputs.version }}

      - name: Publish platform packages to npm
        if: ${{ !inputs.dry_run && steps.recheck.outputs.exists != 'true' }}
        uses: kreuzberg-dev/actions/publish-npm@v1
        with:
          packages-dir: crates/ts-pack-node/npm
          npm-tag: ${{ needs.prepare.outputs.npm_tag }}
          dry-run: ${{ inputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package to npm
        if: ${{ !inputs.dry_run && steps.recheck.outputs.exists != 'true' }}
        uses: kreuzberg-dev/actions/publish-npm@v1
        with:
          package-dir: crates/ts-pack-node
          npm-tag: ${{ needs.prepare.outputs.npm_tag }}
          dry-run: ${{ inputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─── Publish WASM to npm ───────────────────────────────────────────
  publish-wasm:
    name: Publish WASM to npm
    needs: [prepare, validate-versions, check-npm-wasm, build-wasm, publish-node]
    if: |
      always() &&
      needs.prepare.outputs.release_wasm == 'true' &&
      needs.build-wasm.result == 'success' &&
      (needs.check-npm-wasm.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Download WASM package
        uses: actions/download-artifact@v8
        with:
          name: wasm-pkg
          path: crates/ts-pack-wasm/pkg

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: |
          {
            echo "## npm WASM Dry Run"
            echo "WASM package staged for npm:"
            echo '```'
            ls -1 crates/ts-pack-wasm/pkg/
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Re-check npm before publish
        if: ${{ !inputs.dry_run }}
        id: recheck
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: npm
          package: "@kreuzberg/tree-sitter-language-pack-wasm"
          version: ${{ needs.prepare.outputs.version }}

      - name: Publish to npm
        if: ${{ !inputs.dry_run && steps.recheck.outputs.exists != 'true' }}
        uses: kreuzberg-dev/actions/publish-npm@v1
        with:
          package-dir: crates/ts-pack-wasm/pkg
          npm-tag: ${{ needs.prepare.outputs.npm_tag }}
          provenance: "true"
          dry-run: ${{ inputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Wait for npm indexing
        if: ${{ !inputs.dry_run && steps.recheck.outputs.exists != 'true' }}
        uses: kreuzberg-dev/actions/wait-for-package@v1
        with:
          registry: npm
          package: "@kreuzberg/tree-sitter-language-pack-wasm"
          version: ${{ needs.prepare.outputs.version }}
          max-attempts: "20"

  # ─── Publish Ruby gems ────────────────────────────────────────────
  publish-rubygems:
    name: Publish Ruby gems
    needs: [prepare, validate-versions, check-rubygems, build-ruby-gem]
    if: |
      always() &&
      needs.prepare.outputs.release_ruby == 'true' &&
      needs.build-ruby-gem.result == 'success' &&
      (needs.check-rubygems.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler: none
          bundler-cache: false

      - name: Download Ruby gem artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: rubygems-*
          path: dist
          merge-multiple: true

      - name: Set up Python (for vendor script)
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Vendor core for source gem
        run: python3 scripts/ci/ruby/vendor-core.py
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Build source gem (fallback for unsupported platforms)
        working-directory: crates/ts-pack-ruby
        run: |
          gem build ./*.gemspec
          cp ./*.gem ../../dist/ 2>/dev/null || true
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: List all gems for publishing
        working-directory: dist
        run: |
          echo "=== All gems to publish ==="
          ls -lh tree_sitter_language_pack-*.gem 2>/dev/null || echo "(no gems found)"
          gem_count=$(find . -maxdepth 1 -name 'tree_sitter_language_pack-*.gem' -print | wc -l)
          echo "Total gems: $gem_count"

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: |
          {
            echo "## RubyGems Dry Run"
            echo "Gems staged for RubyGems:"
            echo '```'
            ls -1 dist/tree_sitter_language_pack-*.gem 2>/dev/null || echo "(no gems)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Re-check RubyGems before publish
        if: ${{ !inputs.dry_run }}
        id: recheck
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: rubygems
          package: tree_sitter_language_pack
          version: ${{ needs.prepare.outputs.version }}

      - name: Configure trusted publishing credentials
        if: ${{ !inputs.dry_run && steps.recheck.outputs.exists != 'true' }}
        uses: rubygems/configure-rubygems-credentials@v1.0.0

      - name: Publish gems to RubyGems
        if: ${{ !inputs.dry_run && steps.recheck.outputs.exists != 'true' }}
        uses: kreuzberg-dev/actions/publish-rubygems@v1
        with:
          gems-dir: dist
          dry-run: ${{ inputs.dry_run }}

  # ─── Publish Maven package ────────────────────────────────────────
  publish-maven:
    name: Publish Maven package
    needs: [prepare, validate-versions, check-maven, build-java-package]
    if: |
      always() &&
      needs.prepare.outputs.release_java == 'true' &&
      needs.build-java-package.result == 'success' &&
      (needs.check-maven.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Re-check Maven Central before publish
        id: recheck
        if: ${{ !inputs.dry_run }}
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: maven
          package: tree-sitter-language-pack
          version: ${{ needs.prepare.outputs.version }}

      - name: Setup Java
        if: ${{ !inputs.dry_run && steps.recheck.outputs.exists != 'true' }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25.0.2+10'
          cache: maven
          server-id: ossrh
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Setup Maven
        if: ${{ !inputs.dry_run && steps.recheck.outputs.exists != 'true' }}
        uses: kreuzberg-dev/actions/setup-maven@v1

      - name: Download Java package artifacts
        if: ${{ !inputs.dry_run && steps.recheck.outputs.exists != 'true' }}
        uses: actions/download-artifact@v8
        with:
          name: maven-packages
          path: crates/ts-pack-java/target

      - name: Publish to Maven Central
        if: ${{ !inputs.dry_run && steps.recheck.outputs.exists != 'true' }}
        uses: kreuzberg-dev/actions/publish-maven@v1
        with:
          pom-file: crates/ts-pack-java/pom.xml
          maven-profile: publish
          extra-args: -DskipTests
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: echo "Dry run requested; Maven publish skipped." >> "$GITHUB_STEP_SUMMARY"

  # ─── Publish Elixir to Hex.pm ──────────────────────────────────────
  publish-hex:
    name: Publish Elixir to Hex.pm
    needs: [prepare, validate-versions, check-hex, publish-crates, upload-elixir-release]
    if: |
      always() &&
      needs.prepare.outputs.release_elixir == 'true' &&
      needs.upload-elixir-release.result == 'success' &&
      (needs.check-hex.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: hex
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          fetch-depth: 0

      - name: Setup Elixir
        uses: erlef/setup-elixir@v1
        with:
          elixir-version: "1.17"
          otp-version: "27.2"
          version-type: strict

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Generate checksums from GitHub release
        run: ./scripts/publish/elixir/generate_checksums.sh "${{ needs.prepare.outputs.version }}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install Elixir dependencies
        working-directory: crates/ts-pack-elixir
        run: mix deps.get

      - name: Verify checksum file exists before compile
        run: |
          CHECKSUM_FILE="crates/ts-pack-elixir/checksum-Elixir.TreeSitterLanguagePack.exs"
          if [[ ! -f "$CHECKSUM_FILE" ]]; then
            echo "ERROR: Checksum file not found: $CHECKSUM_FILE"
            echo "The generate_checksums.sh step must have failed silently."
            exit 1
          fi
          echo "Checksum file present: $CHECKSUM_FILE"
          echo "Contents:"
          cat "$CHECKSUM_FILE"

      - name: Patch Rustler --cfg flag placement
        working-directory: crates/ts-pack-elixir
        run: |
          sed -i 's/args ++ \["--cfg", "build_#{System.system_time(:millisecond)}"\]/args ++ ["--", "--cfg", "build_#{System.system_time(:millisecond)}"]/' deps/rustler/lib/rustler/compiler.ex

      - name: Compile project (precompiled mode — checksums already generated)
        working-directory: crates/ts-pack-elixir
        run: mix compile

      - name: Re-check Hex.pm before publish
        id: recheck
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: hex
          package: tree_sitter_language_pack
          version: ${{ needs.prepare.outputs.version }}

      - name: Publish to Hex.pm
        if: ${{ !inputs.dry_run && steps.recheck.outputs.exists != 'true' }}
        uses: kreuzberg-dev/actions/publish-hex@v1
        with:
          package-dir: crates/ts-pack-elixir
          skip-docs: "true"
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: echo "Dry run requested; Hex.pm publish skipped." >> "$GITHUB_STEP_SUMMARY"

  # ─── Publish PHP to Packagist ────────────────────────────────────
  publish-packagist:
    name: Publish PHP to Packagist
    needs: [prepare, validate-versions, check-packagist, build-php-extension]
    if: |
      always() &&
      needs.prepare.outputs.release_php == 'true' &&
      needs.build-php-extension.result == 'success' &&
      (needs.check-packagist.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Download PHP PIE package artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: php-pie-*
          path: dist/php
          merge-multiple: true

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: |
          {
            echo "## Packagist Dry Run"
            echo "PHP PIE package artifacts staged:"
            echo '```'
            ls -1 dist/php/ 2>/dev/null || echo "(no artifacts)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload PHP PIE packages to GitHub release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          echo "Uploading PHP PIE packages to GitHub release ${TAG}..."
          for file in dist/php/tree-sitter-language-pack-*.tar.gz*; do
            if [ -f "$file" ]; then
              echo "Uploading: $file"
              gh release upload "$TAG" "$file" --clobber
            fi
          done

      - name: Publish to Packagist
        if: ${{ !inputs.dry_run }}
        uses: kreuzberg-dev/actions/publish-packagist@v1
        with:
          packagist-username: Goldziher
          package-name: kreuzberg/tree-sitter-language-pack
          version: ${{ needs.prepare.outputs.version }}
          repository-url: https://github.com/kreuzberg-dev/tree-sitter-language-pack
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          PACKAGIST_API_TOKEN: ${{ secrets.PACKAGIST_API_TOKEN }}

  # ─── Publish C# to NuGet ─────────────────────────────────────────
  publish-nuget:
    name: Publish C# to NuGet
    needs: [prepare, validate-versions, check-nuget, build-csharp-package]
    if: |
      always() &&
      needs.prepare.outputs.release_csharp == 'true' &&
      needs.build-csharp-package.result == 'success' &&
      (needs.check-nuget.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0"

      - name: Download NuGet package
        uses: actions/download-artifact@v8
        with:
          name: nuget-packages
          path: dist/nuget

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: |
          {
            echo "## NuGet Dry Run"
            echo "NuGet packages staged:"
            echo '```'
            ls -1 dist/nuget/*.nupkg 2>/dev/null || echo "(no packages)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish to NuGet
        if: ${{ !inputs.dry_run }}
        uses: kreuzberg-dev/actions/publish-nuget@v1
        with:
          packages-dir: dist/nuget
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

  # ─── Check Homebrew ────────────────────────────────────────────────
  check-homebrew:
    name: Check Homebrew
    needs: prepare
    if: needs.prepare.outputs.release_homebrew == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Check if version exists
        id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: homebrew
          package: ts-pack
          version: ${{ needs.prepare.outputs.version }}
          tap-repo: kreuzberg-dev/homebrew-tap

  # ─── Build CLI binaries ───────────────────────────────────────────
  build-cli:
    name: Build CLI (${{ matrix.label }})
    needs: [prepare, validate-versions, clone-vendors]
    if: needs.prepare.outputs.release_homebrew == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            target: x86_64-unknown-linux-gnu
            artifact: ts-pack-linux-x86_64
          - os: ubuntu-24.04-arm
            label: linux-aarch64
            target: aarch64-unknown-linux-gnu
            artifact: ts-pack-linux-aarch64
          - os: macos-latest
            label: macos-arm64
            target: aarch64-apple-darwin
            artifact: ts-pack-macos-arm64
          - os: windows-latest
            label: windows-x86_64
            target: x86_64-pc-windows-msvc
            artifact: ts-pack-windows-x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Download parsers
        uses: actions/download-artifact@v8
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          target: ${{ matrix.target }}
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Get all language names
        id: langs
        shell: bash
        run: |
          LANGS=$(python3 -c "import json; d=json.load(open('sources/language_definitions.json')); print(','.join(sorted(d.keys())))")
          echo "names=$LANGS" >> "$GITHUB_OUTPUT"

      - name: Build CLI
        run: cargo build --release -p ts-pack-cli --target ${{ matrix.target }}
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          TSLP_LANGUAGES: ${{ steps.langs.outputs.names }}
          TSLP_LINK_MODE: static

      - name: Package CLI (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/ts-pack staging/
          cd staging && tar -czf "../${{ matrix.artifact }}.tar.gz" ts-pack

      - name: Package CLI (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/ts-pack.exe staging/
          cd staging && 7z a "../${{ matrix.artifact }}.zip" ts-pack.exe

      - name: Upload CLI binary
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
          retention-days: 14

  # ─── Upload CLI binaries to GitHub Release ──────────────────────────
  upload-cli-release:
    name: Upload CLI binaries to GitHub Release
    needs: [prepare, build-cli]
    if: |
      needs.prepare.outputs.dry_run != 'true' &&
      needs.build-cli.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Download CLI artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: ts-pack-*
          path: dist/cli
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: kreuzberg-dev/actions/publish-github-release@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          title: "Release ${{ needs.prepare.outputs.tag }}"
          artifacts: |
            dist/cli/ts-pack-*.tar.gz
            dist/cli/ts-pack-*.zip
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}

  # ─── Build Homebrew bottle ─────────────────────────────────────────
  homebrew-bottles:
    name: Build Homebrew bottle
    needs: [prepare, check-homebrew, clone-vendors]
    if: |
      needs.prepare.outputs.release_homebrew == 'true' &&
      (needs.check-homebrew.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true')
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Download parsers
        uses: actions/download-artifact@v8
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Get all language names
        id: langs
        shell: bash
        run: |
          LANGS=$(python3 -c "import json; d=json.load(open('sources/language_definitions.json')); print(','.join(sorted(d.keys())))")
          echo "names=$LANGS" >> "$GITHUB_OUTPUT"

      - name: Build CLI (with all parsers statically linked)
        run: cargo build --release -p ts-pack-cli
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          TSLP_LANGUAGES: ${{ steps.langs.outputs.names }}
          TSLP_LINK_MODE: static

      - name: Detect macOS bottle tag
        id: os-info
        run: |
          OS_VERSION=$(sw_vers -productVersion | cut -d. -f1)
          case "$OS_VERSION" in
            15) BOTTLE_TAG="arm64_sequoia" ;;
            14) BOTTLE_TAG="arm64_sonoma" ;;
            13) BOTTLE_TAG="arm64_ventura" ;;
            *) BOTTLE_TAG="arm64_macos${OS_VERSION}" ;;
          esac
          echo "bottle_tag=$BOTTLE_TAG" >> "$GITHUB_OUTPUT"

      - name: Create Homebrew bottle
        id: bottle
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          BOTTLE_TAG="${{ steps.os-info.outputs.bottle_tag }}"
          bottle_root="/tmp/ts-pack-bottle"
          bottle_dir="${bottle_root}/ts-pack/${VERSION}"
          mkdir -p "${bottle_dir}/bin"
          cp target/release/ts-pack "${bottle_dir}/bin/"
          cd "${bottle_root}"
          BOTTLE_FILE="ts-pack-${VERSION}.${BOTTLE_TAG}.bottle.tar.gz"
          tar -czf "${BOTTLE_FILE}" ts-pack/
          SHA256=$(shasum -a 256 "${BOTTLE_FILE}" | cut -d' ' -f1)
          {
            echo "bottle_file=${BOTTLE_FILE}"
            echo "bottle_sha=${SHA256}"
          } >> "$GITHUB_OUTPUT"
          cp "${BOTTLE_FILE}" "$GITHUB_WORKSPACE/"

      - name: Upload bottle artifact
        uses: actions/upload-artifact@v7
        with:
          name: homebrew-bottle
          path: ts-pack-*.bottle.tar.gz
          retention-days: 14

  # ─── Upload Homebrew bottles to Release ────────────────────────────
  upload-homebrew-bottles:
    name: Upload Homebrew bottles to Release
    needs: [prepare, homebrew-bottles]
    if: |
      needs.prepare.outputs.dry_run != 'true' &&
      needs.homebrew-bottles.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Download bottle artifacts
        uses: actions/download-artifact@v8
        with:
          name: homebrew-bottle
          path: dist/homebrew

      - name: Upload to GitHub Release
        uses: kreuzberg-dev/actions/publish-github-release@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          title: "Release ${{ needs.prepare.outputs.tag }}"
          artifacts: "dist/homebrew/ts-pack-*.bottle.tar.gz"
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}

  # ─── Publish Homebrew formula ──────────────────────────────────────
  publish-homebrew:
    name: Publish Homebrew formula
    needs: [prepare, validate-versions, check-homebrew, upload-homebrew-bottles]
    if: |
      always() &&
      needs.prepare.outputs.release_homebrew == 'true' &&
      needs.prepare.outputs.dry_run != 'true' &&
      needs.upload-homebrew-bottles.result == 'success' &&
      (needs.check-homebrew.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Download bottle artifacts
        uses: actions/download-artifact@v8
        with:
          name: homebrew-bottle
          path: dist/homebrew

      - name: Setup Git credentials for tap push
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TOKEN }}
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${GH_TOKEN}@github.com" > ~/.git-credentials
          git config --global user.name "kreuzberg-bot"
          git config --global user.email "bot@kreuzberg.dev"

      - name: Publish to Homebrew tap
        uses: kreuzberg-dev/actions/publish-homebrew@v1
        with:
          bottles-dir: dist/homebrew
          formula-name: ts-pack
          tap-repo: kreuzberg-dev/homebrew-tap
          tag: ${{ needs.prepare.outputs.tag }}
          version: ${{ needs.prepare.outputs.version }}
          github-repo: kreuzberg-dev/tree-sitter-language-pack
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TOKEN }}

  # ─── Release finalize ──────────────────────────────────────────────
  release-finalize:
    name: Finalize release
    needs:
      - prepare
      - validate-versions
      - check-cratesio
      - check-pypi
      - check-npm
      - check-npm-wasm
      - check-rubygems
      - check-maven
      - check-hex
      - upload-parser-binaries
      - upload-go-release
      - upload-c-ffi-release
      - upload-elixir-release
      - publish-crates
      - publish-pypi
      - publish-node
      - publish-wasm
      - publish-rubygems
      - publish-maven
      - publish-hex
      - publish-packagist
      - publish-nuget
      - check-packagist
      - check-nuget
      - check-homebrew
      - upload-homebrew-bottles
      - upload-cli-release
      - publish-homebrew
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          fetch-depth: 0

      - name: Setup Git credentials
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create Go module tag
        if: ${{ needs.prepare.outputs.release_go == 'true' && needs.prepare.outputs.dry_run != 'true' }}
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          GO_TAG="packages/go/v${VERSION}"
          echo "Creating Go module tag: $GO_TAG"
          git tag "$GO_TAG" || echo "Tag already exists"
          git push origin "$GO_TAG" 2>/dev/null || echo "Tag already pushed"

      - name: Publish release from draft state
        if: ${{ needs.prepare.outputs.dry_run != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          # Mark release as non-draft if it exists
          gh release edit "$TAG" --draft=false 2>/dev/null || \
            gh release create "$TAG" --title "Release $TAG" --generate-notes 2>/dev/null || \
            echo "Release already published"

      - name: Aggregate release status
        if: always()
        env:
          CHECK_CRATESIO_EXISTS: ${{ needs.check-cratesio.outputs.exists || '' }}
          CHECK_PYPI_EXISTS: ${{ needs.check-pypi.outputs.exists || '' }}
          CHECK_NPM_EXISTS: ${{ needs.check-npm.outputs.exists || '' }}
          CHECK_NPM_WASM_EXISTS: ${{ needs.check-npm-wasm.outputs.exists || '' }}
          CHECK_RUBYGEMS_EXISTS: ${{ needs.check-rubygems.outputs.exists || '' }}
          CHECK_MAVEN_EXISTS: ${{ needs.check-maven.outputs.exists || '' }}
          CHECK_HEX_EXISTS: ${{ needs.check-hex.outputs.exists || '' }}
          CHECK_PACKAGIST_EXISTS: ${{ needs.check-packagist.outputs.exists || '' }}
          CHECK_NUGET_EXISTS: ${{ needs.check-nuget.outputs.exists || '' }}
          CHECK_HOMEBREW_EXISTS: ${{ needs.check-homebrew.outputs.exists || '' }}
          RESULT_VALIDATE: ${{ needs.validate-versions.result }}
          RESULT_PUBLISH_CRATES: ${{ needs.publish-crates.result }}
          RESULT_PUBLISH_PYPI: ${{ needs.publish-pypi.result }}
          RESULT_PUBLISH_NODE: ${{ needs.publish-node.result }}
          RESULT_PUBLISH_WASM: ${{ needs.publish-wasm.result }}
          RESULT_PUBLISH_RUBYGEMS: ${{ needs.publish-rubygems.result }}
          RESULT_PUBLISH_MAVEN: ${{ needs.publish-maven.result }}
          RESULT_PUBLISH_HEX: ${{ needs.publish-hex.result }}
          RESULT_PUBLISH_PACKAGIST: ${{ needs.publish-packagist.result }}
          RESULT_PUBLISH_NUGET: ${{ needs.publish-nuget.result }}
          RESULT_UPLOAD_PARSERS: ${{ needs.upload-parser-binaries.result }}
          RESULT_UPLOAD_GO: ${{ needs.upload-go-release.result }}
          RESULT_UPLOAD_C_FFI: ${{ needs.upload-c-ffi-release.result }}
          RESULT_UPLOAD_ELIXIR: ${{ needs.upload-elixir-release.result }}
          RESULT_UPLOAD_HOMEBREW: ${{ needs.upload-homebrew-bottles.result }}
          RESULT_PUBLISH_HOMEBREW: ${{ needs.publish-homebrew.result }}
        run: |
          {
            echo "## Release Summary"
            echo ""
            echo "| Target | Status |"
            echo "|--------|--------|"

            if [[ "$RESULT_VALIDATE" != "success" ]]; then
              echo "| version-check | **FAILED** |"
            else
              echo "| version-check | passed |"
            fi

            declare -A results
            results[crates]="${RESULT_PUBLISH_CRATES}"
            results[python]="${RESULT_PUBLISH_PYPI}"
            results[node]="${RESULT_PUBLISH_NODE}"
            results[wasm]="${RESULT_PUBLISH_WASM}"
            results[ruby]="${RESULT_PUBLISH_RUBYGEMS}"
            results[maven]="${RESULT_PUBLISH_MAVEN}"
            results[hex]="${RESULT_PUBLISH_HEX}"
            results[parser-binaries]="${RESULT_UPLOAD_PARSERS}"
            results[go-ffi]="${RESULT_UPLOAD_GO}"
            results[c-ffi]="${RESULT_UPLOAD_C_FFI}"
            results[elixir-nifs]="${RESULT_UPLOAD_ELIXIR}"
            results[packagist]="${RESULT_PUBLISH_PACKAGIST}"
            results[nuget]="${RESULT_PUBLISH_NUGET}"
            results[homebrew]="${RESULT_PUBLISH_HOMEBREW}"

            declare -A checks
            checks[crates]="${CHECK_CRATESIO_EXISTS}"
            checks[python]="${CHECK_PYPI_EXISTS}"
            checks[node]="${CHECK_NPM_EXISTS}"
            checks[wasm]="${CHECK_NPM_WASM_EXISTS}"
            checks[ruby]="${CHECK_RUBYGEMS_EXISTS}"
            checks[maven]="${CHECK_MAVEN_EXISTS}"
            checks[hex]="${CHECK_HEX_EXISTS}"
            checks[packagist]="${CHECK_PACKAGIST_EXISTS}"
            checks[nuget]="${CHECK_NUGET_EXISTS}"
            checks[homebrew]="${CHECK_HOMEBREW_EXISTS}"

            for target in crates python node wasm ruby maven hex packagist nuget homebrew parser-binaries go-ffi c-ffi elixir-nifs; do
              result="${results[$target]}"
              check="${checks[$target]:-}"
              if [[ "$result" == "success" ]]; then
                echo "| $target | published |"
              elif [[ "$check" == "true" ]]; then
                echo "| $target | already exists (skipped) |"
              elif [[ "$result" == "skipped" ]]; then
                echo "| $target | skipped (not enabled) |"
              elif [[ "$result" == "failure" ]]; then
                echo "| $target | **FAILED** |"
              else
                echo "| $target | $result |"
              fi
            done

            echo ""
            echo "- **Tag**: ${{ needs.prepare.outputs.tag }}"
            echo "- **Version**: ${{ needs.prepare.outputs.version }}"
            echo "- **Dry run**: ${{ inputs.dry_run }}"
            echo "- **Force republish**: ${{ inputs.force_republish }}"
          } >> "$GITHUB_STEP_SUMMARY"
