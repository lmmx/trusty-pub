# CI Tests workflow - runs on every push
name: 0. CI Tests (Every Push)

on:
  # push:
  #   branches: [main, new-features]
  # pull_request:
  #   branches: [main]
  workflow_dispatch:
    inputs:
      branch-name:
        description: 'Branch name'
        required: false
        default: 'main'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          pip3 install flake8
          # Only check for syntax errors, report others without failing
          flake8 . --count --select=E9 --show-source --statistics || true

  unit-tests:
    name: Menu Validation Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install TA-Lib
        run: |
          cd .github/dependencies/
          sudo dpkg -i ta-lib_0.6.4_amd64.deb
          pip3 install ta-lib==0.6.4
      - name: Install dependencies
        run: |
          pip3 install -r requirements.txt
          pip3 install -r requirements-dev.txt
          pip3 install .
      - name: Configure .env.dev file for Prod
        shell: bash
        env:
          CHAT_ID_PROD : ${{secrets.CHAT_ID}}
          CHAT_ID_DEV : ${{secrets.CHAT_ID_DEV}}
          TOKEN_DEV : ${{secrets.TOKEN_DEV}}
          CHAT_IDADMIN_DEV : ${{secrets.CHAT_IDADMIN_DEV}}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          TOKEN: ${{ secrets.TOKEN }}
          chat_idADMIN: ${{ secrets.chat_idADMIN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI_PAT: ${{ secrets.CI_PAT }}
          TURSO_TOKEN: ${{ secrets.TURSO_TOKEN }}
          TDU: ${{ secrets.TDU }}
          TAT: ${{ secrets.TAT }}
          MCU: ${{ secrets.MCU }}
          MCAP: ${{ secrets.MCAP }}
          MCL: ${{ secrets.MCL }}
          MS: ${{ secrets.MS }}
          PKG: ${{ secrets.PKG }}
          REPO_URL: ${{ secrets.REPO_URL }}
          KTOKEN: ${{ secrets.KTOKEN }}
          KUSER: ${{ secrets.KUSER }}
          KPWD: ${{ secrets.KPWD }}
          KTOTP: ${{ secrets.KTOTP }}
          DB_TYPE: "local"
          DB_TICKS: ${{ secrets.DB_TICKS }}
          TBTOKEN: ${{ secrets.TBTOKEN }}
          BBTOKEN: ${{ secrets.BBTOKEN }}
          Tel_API_ID: ${{ secrets.Tel_API_ID }}
          Tel_API_Hash: ${{ secrets.Tel_API_Hash }}
          Tel_Phone_Number: ${{ secrets.Tel_Phone_Number }}
          TEL_SESSION_DATA: ${{ secrets.TEL_SESSION_DATA }}
          SUBSCRIPTION_ENABLED: ${{ secrets.SUBSCRIPTION_ENABLED }}
        run: |
          # Quote all values to handle spaces properly
          cat > .env.dev << EOF
          CHAT_ID_PROD='$CHAT_ID_PROD'
          CHAT_ID_DEV='$CHAT_ID_DEV'
          TOKEN_DEV='$TOKEN_DEV'
          CHAT_IDADMIN_DEV='$CHAT_IDADMIN_DEV'
          CHAT_ID='$CHAT_ID'
          TOKEN='$TOKEN'
          chat_idADMIN='$chat_idADMIN'
          GITHUB_TOKEN='$GITHUB_TOKEN'
          CI_PAT='$CI_PAT'
          TURSO_TOKEN='$TURSO_TOKEN'
          TDU='$TDU'
          TAT='$TAT'
          MCU='$MCU'
          MCAP='$MCAP'
          MCL='$MCL'
          MS='$MS'
          PKG='$PKG'
          REPO_URL='$REPO_URL'
          KTOKEN='$KTOKEN'
          KUSER='$KUSER'
          KPWD='$KPWD'
          KTOTP='$KTOTP'
          DB_TYPE='$DB_TYPE'
          DB_TICKS='$DB_TICKS'
          TBTOKEN='$TBTOKEN'
          BBTOKEN='$BBTOKEN'
          Tel_API_ID='$Tel_API_ID'
          Tel_API_Hash='$Tel_API_Hash'
          Tel_Phone_Number='$Tel_Phone_Number'
          TEL_SESSION_DATA='$TEL_SESSION_DATA'
          SUBSCRIPTION_ENABLED='$SUBSCRIPTION_ENABLED'
          EOF
          
          echo "Created .env.dev file with secrets (values quoted)"
          cp .env.dev /home/runner/work/PKScreener/PKScreener/pkscreener/.env.dev
      - name: Run menu validation tests
        run: python3 -m pytest test/tick_data_freshness_test.py test/bot_menu_integration_test.py test/console_menu_integration_test.py -v --tb=short
        env:
          RUNNER: "GitHub_Actions"
