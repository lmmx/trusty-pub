name: CI

# yamllint disable-line rule:truthy
on:
  push:
  pull_request: ~

jobs:
  shared-ci:
    uses: zigpy/workflows/.github/workflows/ci.yml@main
    with:
      CODE_FOLDER: zigpy_xbee
      CACHE_VERSION: 2
      MINIMUM_COVERAGE_PERCENTAGE: 100
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
