name: Version Bump Check

on:
  pull_request:
    branches: [ trunk ]
    paths:
      - 'src/**'
      - 'pyproject.toml'

defaults:
  run:
    shell: nu {0}

jobs:
  check-version-bump:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Nushell
        uses: hustcer/setup-nu@v3

      - name: Check if only version changed in pyproject.toml
        id: check_pyproject
        run: |
          git fetch origin trunk
          let diff = git diff origin/trunk -- pyproject.toml
          let src_changed = (git diff --name-only origin/trunk -- src/ | str trim | is-not-empty)

          # If only pyproject.toml changed (no src changes), check if it's just the version
          if not $src_changed and ($diff | str trim | is-not-empty) {
            let diff_lines = $diff | lines | where { |line| $line starts-with "+" or $line starts-with "-" } | where { |line| not ($line starts-with "+++") and not ($line starts-with "---") }
            let version_only = $diff_lines | all { |line| $line =~ 'version\s*=' }
            if $version_only {
              print "Only version field changed in pyproject.toml, skipping version bump check"
              $"skip=true" | save --append $env.GITHUB_OUTPUT
            } else {
              $"skip=false" | save --append $env.GITHUB_OUTPUT
            }
          } else {
            $"skip=false" | save --append $env.GITHUB_OUTPUT
          }

      - name: Get version from PR branch
        id: pr_version
        if: steps.check_pyproject.outputs.skip != 'true'
        run: |
          let version = open pyproject.toml | get project.version
          $"version=($version)" | save --append $env.GITHUB_OUTPUT

      - name: Get version from trunk
        id: trunk_version
        if: steps.check_pyproject.outputs.skip != 'true'
        run: |
          let version = git show origin/trunk:pyproject.toml | from toml | get project.version
          $"version=($version)" | save --append $env.GITHUB_OUTPUT

      - name: Check version was bumped
        if: steps.check_pyproject.outputs.skip != 'true'
        run: |
          let pr_version = "${{ steps.pr_version.outputs.version }}"
          let trunk_version = "${{ steps.trunk_version.outputs.version }}"

          print $"PR version: ($pr_version)"
          print $"Trunk version: ($trunk_version)"

          if $pr_version == $trunk_version {
            print "::error::Version has not been bumped! Please update the version in pyproject.toml"
            print $"Current version on trunk: ($trunk_version)"
            print $"Version in this PR: ($pr_version)"
            exit 1
          }

          print $"✅ Version has been bumped from ($trunk_version) to ($pr_version)"
