name: Deploy to Bioconda

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy from"
        required: true
        default: "nightly"
  push:
    branches:
      - nightly

jobs:
  bioconda-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -le {0}  # Important! Use login shell for proper conda initialization

    steps:
      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: bioconda_env
          auto-update-conda: true
          python-version: "3.12"
          channels: conda-forge,bioconda,defaults
          channel-priority: true

      - name: Prepare output directory
        run: |
          mkdir -p $GITHUB_WORKSPACE/output/noarch
          mkdir -p $GITHUB_WORKSPACE/output/linux-64
          touch $GITHUB_WORKSPACE/output/noarch/repodata.json
          conda install bioconda-utils conda-index -y
          python -m conda_index $GITHUB_WORKSPACE/output
          # Register the local output directory as a conda channel so that
          # host-side metadata finalization can resolve packages built in
          # earlier steps (e.g. pyopenms finding libopenms==3.6.0dev).
          # Without this, only the Docker container sees the local channel.
          conda config --add channels file://$GITHUB_WORKSPACE/output
          ls -l
          ls -l $GITHUB_WORKSPACE/output

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Clone Bioconda recipes repository and add our changes (e.g., version with 'dev') on top of it
        run: |
          git clone https://github.com/OpenMS/bioconda-recipes.git bioconda-recipes
          cd bioconda-recipes
          git checkout -b nightly origin/nightly
          git remote add bioconda https://github.com/bioconda/bioconda-recipes.git
          git fetch bioconda master
          git rebase bioconda/master

      - name: Lint and build OpenMS Bioconda packages
        run: |
          cd bioconda-recipes
          bioconda-utils lint --packages pyopenms openms-meta
          bioconda-utils build --docker --pkg-dir $GITHUB_WORKSPACE/output --packages openms-meta || true
          python -m conda_index $GITHUB_WORKSPACE/output

      - name: Build pyopenms package
        run: |
          cd bioconda-recipes
          bioconda-utils build --docker --mulled-test --pkg-dir $GITHUB_WORKSPACE/output --packages pyopenms || true
          python -m conda_index $GITHUB_WORKSPACE/output

      - name: Upload Conda packages
        run: |
          pip install "anaconda-client>=1.14"  # bioconda-utils pulls 1.13.x which still uses removed pkg_resources
          ls -l $GITHUB_WORKSPACE/output
          shopt -s nullglob
          pkgs=($GITHUB_WORKSPACE/output/linux-64/*.tar.bz2 $GITHUB_WORKSPACE/output/linux-64/*.conda)
          if [ ${#pkgs[@]} -gt 0 ]; then
            anaconda -v -t ${{ secrets.ANACONDA_TOKEN }} upload -u openms --no-progress --force "${pkgs[@]}"
          else
            echo "No packages found to upload!"
            exit 1
          fi
