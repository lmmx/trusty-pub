name: Generate Dev SDK
permissions:
  checks: write
  contents: write
  pull-requests: write
  statuses: write

on:
  workflow_dispatch:
    inputs:
      force:
        description: Force generation of SDKs
        type: boolean
        default: false

jobs:
  check-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure workflow is run from dev branch
        run: |
          if [[ "${GITHUB_REF_NAME}" != "dev" ]]; then
            echo "This workflow can only be run from the dev branch."
            echo "Current branch: ${GITHUB_REF_NAME}"
            exit 1
          fi
          echo "Running from dev branch: ${GITHUB_REF_NAME}"

  version-check:
    needs: check-branch
    runs-on: ubuntu-latest
    outputs:
      up_to_date: ${{ steps.compare.outputs.up_to_date }}
      local_version: ${{ steps.compare.outputs.local_version }}
      remote_version: ${{ steps.compare.outputs.remote_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: dev

      - name: Compare OpenAPI versions
        id: compare
        uses: ./.github/actions/version-check
        with:
          force: ${{ github.event.inputs.force || false }}

  compute-version:
    needs: check-branch
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Checkout dev branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: dev
          fetch-depth: 0

      - name: Install required tools
        run: |
          # Install jq for JSON parsing (yq not needed for this workflow)
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Compute beta version from latest GitHub release (Python format)
        id: ver
        run: |
          set -euo pipefail

          # Get latest stable release from GitHub (with retry)
          MAX_ATTEMPTS=5
          attempt=1
          LATEST_RELEASE=""
          
          while [ $attempt -le $MAX_ATTEMPTS ]; do
            echo "Fetching latest stable release from GitHub repository: ${{ github.repository }} (attempt $attempt/$MAX_ATTEMPTS)"
            
            RELEASE_RESPONSE=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest)
            LATEST_RELEASE=$(echo "$RELEASE_RESPONSE" | jq -r '.tag_name')
            
            echo "GitHub API response for latest release: $LATEST_RELEASE"
            
            if [[ "$LATEST_RELEASE" != "null" && -n "$LATEST_RELEASE" ]]; then
              break
            fi
            
            if [ $attempt -lt $MAX_ATTEMPTS ]; then
              echo "⚠️  No stable release found (attempt $attempt/$MAX_ATTEMPTS), retrying in 2s..."
              sleep 2
              attempt=$((attempt + 1))
            else
              echo "❌ Error: No stable releases found on GitHub after $MAX_ATTEMPTS attempts"
              exit 1
            fi
          done
          
          # Remove 'v' prefix if present (e.g., v0.0.3 -> 0.0.3)
          BASE_OFFICIAL="${LATEST_RELEASE#v}"
          echo "✅ Latest stable release from GitHub: ${BASE_OFFICIAL}"

          # Parse version components
          IFS='.' read -r major minor _ <<< "${BASE_OFFICIAL}"
          
          # Bump minor version and reset patch to 0 (0.0.3 -> 0.1.0)
          minor=$((minor + 1))
          NEW_BASE="${major}.${minor}.0"
          echo "Bumped to new minor base: ${NEW_BASE}"

          # Fetch tags to check existing betas
          git fetch --tags --quiet || true

          # Find next available beta number for this base (Python format: X.Y.Zb<n>)
          PREFIX="${NEW_BASE}b"
          
          # Helper to get tags with retry on broken pipe
          get_tags() {
            local attempt=1
            local max_attempts=5
            local output
            
            while [ $attempt -le $max_attempts ]; do
              # Capture both stdout and stderr, check for broken pipe error
              if ! output=$(git ls-remote --tags --refs origin | awk '{print $2}' | sed 's|refs/tags/||' 2>&1); then
                # Command failed, check if it's a broken pipe error
                if echo "$output" | grep -q "Broken pipe"; then
                  if [ $attempt -lt $max_attempts ]; then
                    echo "⚠️  Broken pipe detected (attempt $attempt/$max_attempts), retrying..."
                    attempt=$((attempt + 1))
                    sleep 1
                    continue
                  else
                    echo "❌ Failed to get tags after $max_attempts attempts"
                    return 1
                  fi
                else
                  # Other error, fail immediately
                  echo "❌ Error getting tags: $output"
                  return 1
                fi
              fi
              
              # Check for broken pipe error in output even if command succeeded
              if echo "$output" | grep -q "Broken pipe"; then
                if [ $attempt -lt $max_attempts ]; then
                  echo "⚠️  Broken pipe detected (attempt $attempt/$max_attempts), retrying..."
                  attempt=$((attempt + 1))
                  sleep 1
                  continue
                else
                  echo "❌ Failed to get tags after $max_attempts attempts"
                  return 1
                fi
              fi
              
              # Success - output contains tags
              echo "$output"
              return 0
            done
          }
          
          # Helper to check tag existence with/without 'v'
          tag_exists() {
            local tags
            if ! tags=$(get_tags); then
              echo "❌ Error: Failed to check tag existence"
              exit 1
            fi
            echo "$tags" | grep -qx -e "${1}" -e "v${1}" >/dev/null 2>&1
          }

          # Find next available beta number
          n=1
          while tag_exists "${PREFIX}${n}"; do
            echo "Tag already exists: ${PREFIX}${n}, trying next..."
            n=$((n+1))
          done

          FINAL="${PREFIX}${n}"
          echo "Computed dev beta version (Python format): ${FINAL}"
          echo "version=${FINAL}" >> "$GITHUB_OUTPUT"

  generate:
    needs: [version-check, compute-version]
    if: needs.version-check.outputs.up_to_date != 'true'
    uses: speakeasy-api/sdk-generation-action/.github/workflows/workflow-executor.yaml@b823adc6be7d30b25198529f99f46303bc083534
    with:
      force: ${{ github.event.inputs.force }}
      mode: pr
      set_version: ${{ needs.compute-version.outputs.version }}
    secrets:
      github_access_token: ${{ secrets.GITHUB_TOKEN }}
      pypi_token: ${{ secrets.PYPI_TOKEN }}
      speakeasy_api_key: ${{ secrets.SPEAKEASY_API_KEY }}

  skipped-summary:
    needs: [check-branch, version-check, generate]
    if: needs.generate.result == 'skipped'
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          {
            echo "## ⏭️ SDK Generation Skipped"
            echo ""
            echo "OpenAPI spec versions match - no generation needed:"
            echo "- **Local** (out.openapi.yaml): \`${{ needs.version-check.outputs.local_version }}\`"
            echo "- **Remote** (cribl-openapi-spec): \`${{ needs.version-check.outputs.remote_version }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  notify-slack-on-failure:
    needs: [check-branch, version-check, compute-version, generate]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack notification on failure
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "❌ Dev SDK Generation Failed (Python)",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "❌ Dev SDK Generation Failed (Python)"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Repository:*\n${{ github.repository }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n${{ github.ref_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Workflow:*\nGenerate Dev SDK (Python)"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Trigger:*\n${{ github.event_name }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n<${{ github.event.head_commit.url }}|${{ github.sha }}>"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author:*\n${{ github.actor }}"
                    }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Workflow Run"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
