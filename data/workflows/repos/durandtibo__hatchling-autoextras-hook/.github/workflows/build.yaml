name: Build Tests
on:
  workflow_call:
  workflow_dispatch:  # to trigger manually

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    strategy:
      max-parallel: 8
      fail-fast: false
      matrix:
        dist-type: [ "sdist", "wheel" ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify Build
        uses: durandtibo/verify-uv-build-action@v0.0.7
        with:
          package-name: hatchling-autoextras-hook
          package-dependencies: hatchling
          dist-type: ${{ matrix.dist-type }}

      - name: Run package checks
        shell: bash
        run: |
          set -euo pipefail
          echo "🔍 Running package checks..."
          python tests/package_checks.py
          echo "✅ Package checks passed"
