# Syncs language CLIs (Flutter, Go, Python, Swift, WASM, C#, Kotlin Multiplatform, React Native) with the Rust CLI.
#
# Uses a matrix strategy to run all languages in parallel.  Each language's
# prompt is assembled at runtime from:
#   sync-prompts/prompt-template.md  +  sync-prompts/langs/<lang>.toml
#
# All language changes are consolidated into a single PR (instead of one per language).
#
# To add a new language: create a TOML in sync-prompts/langs/ and add a
# matrix entry below.

name: Sync CLI Languages

on:
  repository_dispatch:
    types: [sync-cli]
  workflow_dispatch:
    inputs:
      languages:
        description: 'Languages to sync (remove what you do not want)'
        required: false
        default: '["csharp", "flutter", "golang", "kotlin-multiplatform", "python", "react-native", "swift", "wasm"]'
        type: string
      base-sha:
        description: 'Base commit SHA to diff against (leave empty for full comparison)'
        required: false
        type: string
      dry-run:
        description: 'Test mode — no PR created'
        required: false
        type: boolean
        default: false
      approve-run:
        description: 'Run ID of a previous dry-run to approve (set languages to match)'
        required: false
        type: string

concurrency:
  group: sync-cli
  cancel-in-progress: true

jobs:
  # ── Build a filtered matrix from the `languages` input ──────────
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - name: Build matrix
        id: set
        env:
          REQUESTED: ${{ inputs.languages }}
        run: |
          ALL='[
            {"lang":"csharp","runner":"ubuntu-latest","timeout":30},
            {"lang":"flutter","runner":"ubuntu-latest","timeout":30},
            {"lang":"golang","runner":"ubuntu-latest","timeout":30},
            {"lang":"kotlin-multiplatform","runner":"ubuntu-latest","timeout":45},
            {"lang":"python","runner":"ubuntu-latest","timeout":30},
            {"lang":"react-native","runner":"ubuntu-latest","timeout":30},
            {"lang":"swift","runner":"macos-latest","timeout":45},
            {"lang":"wasm","runner":"ubuntu-latest","timeout":30}
          ]'
          if [ -z "$REQUESTED" ]; then
            echo "matrix={\"include\":$(echo "$ALL" | jq -c '.')}" >> "$GITHUB_OUTPUT"
          else
            FILTERED=$(echo "$ALL" | jq -c --argjson langs "$REQUESTED" \
              '[.[] | select(.lang as $l | $langs | index($l))]')
            if [ "$FILTERED" = "[]" ]; then
              echo "::error::No valid languages in: $REQUESTED (available: csharp, flutter, golang, kotlin-multiplatform, python, react-native, swift, wasm)"
              exit 1
            fi
            echo "matrix={\"include\":$FILTERED}" >> "$GITHUB_OUTPUT"
          fi

  sync:
    name: ${{ matrix.lang }}
    needs: setup

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}

    runs-on: ${{ matrix.runner }}
    timeout-minutes: ${{ matrix.timeout }}

    permissions:
      contents: read
      id-token: write
      actions: read

    steps:
      - name: Validate inputs
        if: inputs.dry-run && inputs.approve-run != ''
        run: |
          echo "::error::Cannot use dry-run and approve-run together."
          exit 1

      - name: Checkout repository
        if: inputs.approve-run == ''
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Load per-language config from TOML ──────────────────────────
      - name: Load language config
        if: inputs.approve-run == ''
        id: config
        env:
          LANG: ${{ matrix.lang }}
        run: |
          python3 << 'PYEOF'
          import os, sys
          sys.path.insert(0, "crates/breez-sdk/bindings/examples/cli/sync-prompts")
          from generate import load_lang_config

          config = load_lang_config(os.environ["LANG"])

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              for key in ("lang_name", "lang_id", "target_dir"):
                  f.write(f"{key}={config.get(key, '')}\n")

              # Flatten allowed_tools to a single comma-separated line
              tools = config.get("allowed_tools", "")
              tools_line = ",".join(
                  part.strip()
                  for line in tools.strip().splitlines()
                  for part in line.split(",")
                  if part.strip()
              )
              f.write(f"allowed_tools={tools_line}\n")
          PYEOF

      # ── Normal / dry-run flow ───────────────────────────────────────
      - name: Compute diff info
        if: inputs.approve-run == ''
        id: diff-info
        env:
          LANG_NAME: ${{ steps.config.outputs.lang_name }}
        run: |
          DIFF_BASE="${{ inputs.base-sha || github.event.client_payload['base-sha'] }}"
          if [ -n "$DIFF_BASE" ] && [ "$DIFF_BASE" != "0000000000000000000000000000000000000000" ]; then
            if ! git cat-file -e "$DIFF_BASE" 2>/dev/null; then
              echo "::error::Provided base-sha ($DIFF_BASE) not found in repository."
              exit 1
            fi
            echo "diff_base=$DIFF_BASE" >> "$GITHUB_OUTPUT"
            DIFF_STAT=$(git diff --stat "$DIFF_BASE" HEAD -- 'crates/breez-sdk/cli/src/' 'crates/breez-sdk/cli/README.md')
            {
              echo "diff_summary<<EODIFF"
              echo "Rust CLI changes since $DIFF_BASE:"
              echo "$DIFF_STAT"
              echo "EODIFF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "diff_base=" >> "$GITHUB_OUTPUT"
            {
              echo "diff_summary<<EODIFF"
              echo "No base SHA provided — perform a full comparison of the Rust CLI against the ${LANG_NAME} CLI."
              echo "EODIFF"
            } >> "$GITHUB_OUTPUT"
          fi

      # ── Language-specific setup ─────────────────────────────────────
      - name: Set up Flutter
        if: matrix.lang == 'flutter' && inputs.approve-run == ''
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.3

      - name: Set up build environment
        if: (matrix.lang == 'swift' || matrix.lang == 'golang' || matrix.lang == 'csharp' || matrix.lang == 'kotlin-multiplatform') && inputs.approve-run == ''
        uses: ./.github/actions/setup-build
        with:
          github-token: ${{ github.token }}

      - name: Set up Go
        if: matrix.lang == 'golang' && inputs.approve-run == ''
        uses: actions/setup-go@v5
        with:
          go-version: '1.19'

      - name: Set up Node.js
        if: (matrix.lang == 'wasm' || matrix.lang == 'react-native') && inputs.approve-run == ''
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up .NET
        if: matrix.lang == 'csharp' && inputs.approve-run == ''
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Set up JDK
        if: matrix.lang == 'kotlin-multiplatform' && inputs.approve-run == ''
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── Generate prompt and run Claude ───────────────────────────────
      - name: Generate sync prompt
        if: inputs.approve-run == ''
        id: gen-prompt
        env:
          LANG: ${{ matrix.lang }}
          DIFF_SUMMARY: ${{ steps.diff-info.outputs.diff_summary }}
          DIFF_BASE: ${{ steps.diff-info.outputs.diff_base }}
        run: |
          python3 << 'PYEOF'
          import os, sys
          sys.path.insert(0, "crates/breez-sdk/bindings/examples/cli/sync-prompts")
          from generate import generate_prompt

          prompt = generate_prompt(os.environ["LANG"])

          # Resolve GitHub Actions expressions that would normally be
          # evaluated in YAML but aren't when the prompt is assembled dynamically
          replacements = {
              "${{ steps.diff-info.outputs.diff_summary }}": os.environ.get("DIFF_SUMMARY", ""),
              "${{ steps.diff-info.outputs.diff_base }}": os.environ.get("DIFF_BASE", ""),
          }
          for expr, value in replacements.items():
              prompt = prompt.replace(expr, value)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("content<<EOPROMPT_DELIM_7f3a\n")
              f.write(prompt)
              f.write("\nEOPROMPT_DELIM_7f3a\n")
          PYEOF

      - name: Sync ${{ steps.config.outputs.lang_name }} CLI
        if: inputs.approve-run == ''
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: 'github-actions[bot]'
          claude_args: >-
            --model claude-opus-4-6
            --allowed-tools
            ${{ steps.config.outputs.allowed_tools }}
          prompt: ${{ steps.gen-prompt.outputs.content }}

      # ── Create patch artifact (always, not just dry-run) ────────────
      - name: Create patch
        if: inputs.approve-run == ''
        env:
          TARGET_DIR: ${{ steps.config.outputs.target_dir }}
          LANG: ${{ matrix.lang }}
        run: |
          git add -N "$TARGET_DIR"
          git diff HEAD -- "$TARGET_DIR" > "sync-${LANG}.patch"

      - name: Upload patch artifacts
        if: inputs.approve-run == ''
        uses: actions/upload-artifact@v4
        with:
          name: sync-${{ matrix.lang }}-patch
          path: |
            sync-${{ matrix.lang }}.patch
            sync-findings.md
          retention-days: 7

      - name: Upload Claude log
        if: always() && inputs.approve-run == ''
        uses: actions/upload-artifact@v4
        with:
          name: sync-${{ matrix.lang }}-claude-log
          path: ${{ runner.temp }}/claude-execution-output.json
          retention-days: 30
          if-no-files-found: ignore

      # ── Summary ─────────────────────────────────────────────────────
      - name: Summary
        if: always() && inputs.approve-run == ''
        env:
          LANG: ${{ matrix.lang }}
          LANG_NAME: ${{ steps.config.outputs.lang_name }}
        run: |
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            echo "### Dry run — ${LANG_NAME} CLI sync" >> "$GITHUB_STEP_SUMMARY"
            if [ -f sync-findings.md ]; then
              echo "#### Findings" >> "$GITHUB_STEP_SUMMARY"
              cat sync-findings.md >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
            fi
            if [ -s "sync-${LANG}.patch" ]; then
              echo "#### Patch" >> "$GITHUB_STEP_SUMMARY"
              echo '```diff' >> "$GITHUB_STEP_SUMMARY"
              cat "sync-${LANG}.patch" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "To approve, re-run with \`approve-run\` = \`${{ github.run_id }}\`." >> "$GITHUB_STEP_SUMMARY"
            elif [ -f sync-findings.md ]; then
              echo "::warning::Changes were made but cancelled before patch capture." >> "$GITHUB_STEP_SUMMARY"
            else
              echo "No ${LANG_NAME} CLI changes were needed." >> "$GITHUB_STEP_SUMMARY"
            fi
            echo "::notice::Dry run completed — no PR created. See job summary for diff."
          else
            echo "::notice::Claude Code sync completed for ${LANG_NAME}"
          fi

  # ── Consolidate all patches into a single PR ───────────────────────
  create-pr:
    name: Create PR
    needs: [setup, sync]
    if: ${{ !inputs.dry-run && !cancelled() }}
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_CLI_PR_TOKEN || github.token }}
          fetch-depth: 1

      # ── Resolve PR reviewer ──────────────────────────────────────────
      - name: Resolve reviewer
        id: reviewer
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REVIEWER=$(gh api "repos/${{ github.repository }}/commits?path=crates/breez-sdk/cli/src/&per_page=1" \
            --jq '.[0].author.login // empty') || true
          if [ -n "$REVIEWER" ] && [[ ! "$REVIEWER" =~ \[bot\]$ ]]; then
            echo "reviewer=$REVIEWER" >> "$GITHUB_OUTPUT"
            echo "::notice::Will request review from $REVIEWER (last Rust CLI committer)"
          else
            echo "reviewer=" >> "$GITHUB_OUTPUT"
            echo "::notice::No reviewer to assign (last committer is a bot or unknown)"
          fi

      # ── Determine which languages were requested ────────────────────
      - name: Determine languages
        id: langs
        env:
          REQUESTED: ${{ inputs.languages }}
        run: |
          ALL='["csharp","flutter","golang","kotlin-multiplatform","python","react-native","swift","wasm"]'
          if [ -z "$REQUESTED" ]; then
            echo "list=$ALL" >> "$GITHUB_OUTPUT"
          else
            echo "list=$REQUESTED" >> "$GITHUB_OUTPUT"
          fi

      # ── Download patches ────────────────────────────────────────────
      - name: Download all patch artifacts
        id: download
        env:
          LANGS: ${{ steps.langs.outputs.list }}
          APPROVE_RUN: ${{ inputs.approve-run }}
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p patches
          for LANG in $(echo "$LANGS" | jq -r '.[]'); do
            ARTIFACT_NAME="sync-${LANG}-patch"
            RUN_ID="${APPROVE_RUN:-${{ github.run_id }}}"
            echo "Downloading artifact ${ARTIFACT_NAME} from run ${RUN_ID}..."
            if gh run download "$RUN_ID" --name "$ARTIFACT_NAME" --dir "patches/${LANG}" 2>/dev/null; then
              echo "::notice::Downloaded patch for ${LANG}"
            else
              echo "::warning::No patch artifact found for ${LANG} (sync job may have failed or been skipped)"
              mkdir -p "patches/${LANG}"
              touch "patches/${LANG}/sync-${LANG}.patch"
            fi
          done

      # ── Apply patches and track results ─────────────────────────────
      - name: Apply patches
        id: apply
        env:
          LANGS: ${{ steps.langs.outputs.list }}
        run: |
          UPDATED=""
          NO_CHANGES=""
          FAILED=""

          for LANG in $(echo "$LANGS" | jq -r '.[]'); do
            PATCH="patches/${LANG}/sync-${LANG}.patch"
            if [ ! -f "$PATCH" ] || [ ! -s "$PATCH" ]; then
              echo "::notice::${LANG}: no changes"
              NO_CHANGES="${NO_CHANGES}${LANG},"
              continue
            fi
            if git apply "$PATCH" 2>/dev/null; then
              echo "::notice::${LANG}: patch applied successfully"
              UPDATED="${UPDATED}${LANG},"
            else
              echo "::warning::${LANG}: patch failed to apply — target files may have changed"
              FAILED="${FAILED}${LANG},"
            fi
          done

          # Trim trailing commas
          UPDATED="${UPDATED%,}"
          NO_CHANGES="${NO_CHANGES%,}"
          FAILED="${FAILED%,}"

          echo "updated=$UPDATED" >> "$GITHUB_OUTPUT"
          echo "no_changes=$NO_CHANGES" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"

          if [ -z "$UPDATED" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No language patches to apply — skipping PR creation."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      # ── Create consolidated PR ──────────────────────────────────────
      - name: Create branch and PR
        if: steps.apply.outputs.has_changes == 'true'
        id: create-pr
        env:
          GH_TOKEN: ${{ secrets.SYNC_CLI_PR_TOKEN }}
          UPDATED: ${{ steps.apply.outputs.updated }}
          NO_CHANGES: ${{ steps.apply.outputs.no_changes }}
          FAILED: ${{ steps.apply.outputs.failed }}
          REVIEWER: ${{ steps.reviewer.outputs.reviewer }}
          APPROVE_RUN: ${{ inputs.approve-run }}
          LANGS: ${{ steps.langs.outputs.list }}
        run: |
          # Set up git identity
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          BRANCH="claude/sync-cli"
          git checkout -B "$BRANCH"

          # Stage all updated language directories
          IFS=',' read -ra UPDATED_LANGS <<< "$UPDATED"
          for LANG in "${UPDATED_LANGS[@]}"; do
            # Load the target_dir for this language from its TOML config
            TARGET_DIR=$(python3 -c "
          import sys
          sys.path.insert(0, 'crates/breez-sdk/bindings/examples/cli/sync-prompts')
          from generate import load_lang_config
          print(load_lang_config('${LANG}').get('target_dir', ''))
          ")
            if [ -n "$TARGET_DIR" ]; then
              git add "$TARGET_DIR"
            fi
          done

          # Build commit message
          UPDATED_COUNT=$(echo "$UPDATED" | tr ',' '\n' | wc -l | tr -d ' ')
          COMMIT_MSG="chore: sync ${UPDATED_COUNT} CLI language(s) with Rust CLI changes (${{ github.sha }})"
          git commit -m "$COMMIT_MSG"

          # ── Build PR body ──────────────────────────────────────────
          BODY="Automated sync of language CLIs from Rust CLI changes."
          BODY+=$'\n\n'"**Source commit:** [\`${GITHUB_SHA:0:7}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})"
          BODY+=$'\n'"**Workflow run:** [View logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"

          if [ -n "$APPROVE_RUN" ]; then
            BODY+=$'\n'"**Approved from:** [dry-run #${APPROVE_RUN}](https://github.com/${{ github.repository }}/actions/runs/${APPROVE_RUN})"
          fi

          # Language status list
          BODY+=$'\n\n'"**Language status:**"
          for LANG in $(echo "$LANGS" | jq -r '.[]'); do
            LANG_NAME=$(python3 -c "
          import sys
          sys.path.insert(0, 'crates/breez-sdk/bindings/examples/cli/sync-prompts')
          from generate import load_lang_config
          print(load_lang_config('${LANG}').get('lang_name', '${LANG}'))
          ")
            if echo ",$UPDATED," | grep -q ",${LANG},"; then
              BODY+=$'\n'"- :white_check_mark: ${LANG_NAME}"
            elif echo ",$FAILED," | grep -q ",${LANG},"; then
              BODY+=$'\n'"- :x: ${LANG_NAME} (patch failed to apply)"
            elif echo ",$NO_CHANGES," | grep -q ",${LANG},"; then
              BODY+=$'\n'"- :next_track_button: ${LANG_NAME} (no changes needed)"
            else
              BODY+=$'\n'"- :grey_question: ${LANG_NAME} (sync job did not produce a patch)"
            fi
          done

          # Aggregate sync findings from all languages
          HAS_FINDINGS=false
          FINDINGS=""
          for LANG in $(echo "$LANGS" | jq -r '.[]'); do
            FINDINGS_FILE="patches/${LANG}/sync-findings.md"
            if [ -f "$FINDINGS_FILE" ] && [ -s "$FINDINGS_FILE" ]; then
              LANG_NAME=$(python3 -c "
          import sys
          sys.path.insert(0, 'crates/breez-sdk/bindings/examples/cli/sync-prompts')
          from generate import load_lang_config
          print(load_lang_config('${LANG}').get('lang_name', '${LANG}'))
          ")
              FINDINGS+=$'\n'"### ${LANG_NAME}"$'\n'
              FINDINGS+="$(cat "$FINDINGS_FILE")"$'\n'
              HAS_FINDINGS=true
            fi
          done

          if [ "$HAS_FINDINGS" = true ]; then
            BODY+=$'\n\n'"<details>"
            BODY+=$'\n'"<summary>Sync findings</summary>"
            BODY+=$'\n'"${FINDINGS}"
            BODY+=$'\n'"</details>"
          fi

          # Warn about failures
          if [ -n "$FAILED" ]; then
            BODY+=$'\n\n'"> [!WARNING]"
            BODY+=$'\n'"> Some patches failed to apply. The target files may have changed since the sync ran."
            BODY+=$'\n'"> Failed languages: ${FAILED}"
            BODY+=$'\n'"> Consider re-running the sync for these languages."
          fi

          REVIEWER_FLAG=""
          if [ -n "$REVIEWER" ]; then
            REVIEWER_FLAG="--reviewer $REVIEWER"
          fi

          # Reuse existing open PR or create a new one
          EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING_PR" ]; then
            git push --force-with-lease -u origin HEAD
            gh pr edit "$EXISTING_PR" --body "$BODY"
            echo "::notice::Updated existing PR #${EXISTING_PR}"
            echo "action=updated" >> "$GITHUB_OUTPUT"
          else
            git push -u origin HEAD
            gh pr create --title "chore: sync CLI languages with Rust CLI changes" \
              --body "$BODY" \
              --label "CLI" \
              $REVIEWER_FLAG \
              --base main
            echo "action=created" >> "$GITHUB_OUTPUT"
          fi

      - name: Cleanup branch on failure
        if: failure() && steps.create-pr.outputs.action == 'created'
        env:
          GH_TOKEN: ${{ secrets.SYNC_CLI_PR_TOKEN }}
        run: |
          git push origin --delete "claude/sync-cli" 2>/dev/null || true

      # ── Job summary ─────────────────────────────────────────────────
      - name: Summary
        if: always()
        env:
          UPDATED: ${{ steps.apply.outputs.updated }}
          NO_CHANGES: ${{ steps.apply.outputs.no_changes }}
          FAILED: ${{ steps.apply.outputs.failed }}
          LANGS: ${{ steps.langs.outputs.list }}
        run: |
          echo "## CLI Sync Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Language | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|--------|" >> "$GITHUB_STEP_SUMMARY"

          for LANG in $(echo "$LANGS" | jq -r '.[]'); do
            if echo ",$UPDATED," | grep -q ",${LANG},"; then
              STATUS="Updated"
            elif echo ",$FAILED," | grep -q ",${LANG},"; then
              STATUS="Failed"
            elif echo ",$NO_CHANGES," | grep -q ",${LANG},"; then
              STATUS="No changes"
            else
              STATUS="No patch"
            fi
            echo "| ${LANG} | ${STATUS} |" >> "$GITHUB_STEP_SUMMARY"
          done

          if [ -n "${{ inputs.approve-run }}" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Approved from dry-run [${{ inputs.approve-run }}](https://github.com/${{ github.repository }}/actions/runs/${{ inputs.approve-run }})" >> "$GITHUB_STEP_SUMMARY"
          fi
