# Triggers the "Sync CLI Languages" workflow when Rust CLI files change on main.
#
# claude-code-action does not support push events, so this thin wrapper
# dispatches the real workflow via repository_dispatch instead.

name: Trigger Sync CLI

on:
  push:
    branches: [main]
    paths:
      - 'crates/breez-sdk/cli/src/**'
      - 'crates/breez-sdk/cli/README.md'

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch Sync CLI Languages workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/dispatches" \
            --input - <<EOF
          {
            "event_type": "sync-cli",
            "client_payload": {
              "base-sha": "${{ github.event.before }}"
            }
          }
          EOF
