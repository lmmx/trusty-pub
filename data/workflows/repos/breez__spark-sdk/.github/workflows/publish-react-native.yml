name: Publish React Native Bindings
on:
  workflow_call:
    inputs:
      repository:
        description: 'SDK repository, defaults to current repository'
        required: false
        type: string
      ref:
        description: 'Git commit, tag or branch reference'
        required: true
        type: string
      package-version:
        description: 'Version for the python package (MAJOR.MINOR.BUILD)'
        required: true
        type: string
      publish:
        description: 'Should publish to npm.'
        required: true
        type: boolean
        default: false
    secrets:
      REPO_SSH_KEY:
        description: 'SSH key to commit to the breez-sdk-spark-react-native repository'
        required: true
      RN_RELEASE_TOKEN:
        description: 'GitHub token to release to the breez-sdk-spark-react-native repository'
        required: true
      NPM_TOKEN:
        description: 'Access token for npm publish'
        required: true

jobs:
  build-language-bindings:
    name: Build language bindings
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || github.sha }}
  
      - name: Setup build
        uses: ./.github/actions/setup-build
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install rust dependencies
        run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android
          rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --version 3.5.4

      - name: Install clang-format
        run: brew install clang-format

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: packages/react-native/.nvmrc
          registry-url: 'https://registry.npmjs.org'
          scope: '@breeztech'

      - name: Install dependencies
        working-directory: packages/react-native
        run: yarn --mode=skip-build

      - name: Apply patches
        working-directory: packages/react-native
        run: npx patch-package

      - name: Build and generate native bindings
        working-directory: packages/react-native
        run: yarn ubrn:build

      - name: Generate language bindings
        working-directory: packages/react-native
        run: yarn prepare

      - name: Set cargo version
        working-directory: packages/react-native
        run: |
          HASH=$(git rev-parse HEAD)
          sed -i.bak -e 's/directory: .*/repo: https:\/\/github.com\/breez\/spark-sdk\n  rev: '"$HASH"'/' ubrn.config.yaml
          rm ubrn.config.yaml.bak

      - name: Compress Android binaries
        working-directory: packages/react-native
        run: |
          zip -9 -r android-artifacts.zip android/src/main/jniLibs
          echo "ANDROID_SHA256=$(shasum -a 256 android-artifacts.zip | cut -d' ' -f1)" >> $GITHUB_ENV

      - name: Compress iOS binaries
        working-directory: packages/react-native
        run: |
          zip -9 -r ios-artifacts.zip build
          echo "IOS_SHA256=$(shasum -a 256 ios-artifacts.zip | cut -d' ' -f1)" >> $GITHUB_ENV

      - name: Insert package checksums
        working-directory: packages/react-native
        run: |
          node -e "const pkg = require('./package.json'); pkg.checksums={android:'${{ env.ANDROID_SHA256 }}',ios:'${{ env.IOS_SHA256 }}'}; require('fs').writeFileSync('package.json',JSON.stringify(pkg,null,2)+'\n')"

      - name: Archive React Native bindings
        uses: actions/upload-artifact@v4
        with:
          name: bindings-react-native
          path: |
            packages/react-native/app.plugin.js
            packages/react-native/ubrn.config.yaml
            packages/react-native/android/generated
            packages/react-native/android/CMakeLists.txt
            packages/react-native/android/proguard-rules.pro
            packages/react-native/cpp
            packages/react-native/lib
            packages/react-native/plugin/build
            packages/react-native/scripts
            packages/react-native/src
            packages/react-native/patches
            packages/react-native/*.podspec
            packages/react-native/package.json
            packages/react-native/README.md
            packages/react-native/yarn.lock

      - name: Archive Android binaries
        uses: actions/upload-artifact@v4
        with:
          name: react-native-android-artifacts
          path: packages/react-native/android-artifacts.zip
          retention-days: 5

      - name: Archive iOS binaries
        uses: actions/upload-artifact@v4
        with:
          name: react-native-ios-artifacts
          path: packages/react-native/ios-artifacts.zip
          retention-days: 5

  build-package:
    name: Build package
    runs-on: macos-latest
    needs: build-language-bindings
    steps:
      - name: Checkout breez-sdk-spark-react-native repo
        uses: actions/checkout@v4
        with:
          repository: breez/breez-sdk-spark-react-native
          ref: main
          ssh-key: ${{ secrets.REPO_SSH_KEY }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: 'https://registry.npmjs.org'
          scope: '@breeztech'

      - name: Remove existing bindings
        run: |
          git rm android/CMakeLists.txt || true
          git rm *.podspec || true
          git rm -r android/generated || true
          git rm -r cpp || true
          git rm -r lib || true
          git rm -r plugin || true
          git rm -r scripts || true
          git rm -r src || true
          git rm -r patches || true

      - name: Download React Native bindings
        uses: actions/download-artifact@v4
        with:
          name: bindings-react-native

      - name: Set file permissions
        run: chmod +x scripts/*.sh

      - name: Set publish version
        run: npm --no-git-tag-version --allow-same-version version ${{ inputs.package-version || '0.0.2' }}

      - name: Pack for archival
        if: ${{ !inputs.publish }}
        run: yarn pack --filename breez-sdk-spark-react-native.tgz

      - name: Archive package
        if: ${{ !inputs.publish }}
        uses: actions/upload-artifact@v4
        with:
          name: react-native-${{ inputs.package-version || '0.0.2' }}
          path: breez-sdk-spark-react-native.tgz

      - name: Tag the React Native bindings
        if: ${{ inputs.publish }}
        run: |
          git config --global user.name "SDK release tagger"
          git config --global user.email "no-reply@breez.technology"
          git add .
          git commit -m "Update React Native bindings to version ${{ inputs.package-version || '0.0.1' }}"
          git push
          git tag ${{ inputs.package-version || '0.0.1' }} -m "${{ inputs.package-version || '0.0.1' }}"
          git push --tags

      - name: Install dependencies
        if: ${{ inputs.publish }}
        run: yarn --mode=skip-build

      - name: Apply patches
        if: ${{ inputs.publish }}
        run: npx patch-package

      - name: Publish package to npm
        if: ${{ inputs.publish }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish

  publish-artifacts:
    name: Publish artifacts
    if: ${{ inputs.publish }}
    runs-on: macos-latest
    needs: build-package
    steps:
      - name: Checkout breez-sdk-spark-react-native repo
        uses: actions/checkout@v4
        with:
          repository: breez/breez-sdk-spark-react-native
          ref: main
          ssh-key: ${{ secrets.REPO_SSH_KEY }}
          fetch-depth: 0

      - name: Download Android binaries
        uses: actions/download-artifact@v4
        with:
          name: react-native-android-artifacts

      - name: Download iOS binaries
        uses: actions/download-artifact@v4
        with:
          name: react-native-ios-artifacts

      - name: Release and attach binary artifact
        uses: softprops/action-gh-release@v2
        with:
          repository: breez/breez-sdk-spark-react-native
          files: |
            android-artifacts.zip
            ios-artifacts.zip
          tag_name: ${{ inputs.package-version || '0.0.1' }}
          generate_release_notes: false
          token: ${{ secrets.RN_RELEASE_TOKEN }}
          prerelease: true