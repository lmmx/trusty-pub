name: "wasm"

on:
  workflow_call:

jobs:
  wasm:
    name: "wasm32-unknown-emscripten / python ${{ matrix.platform.python-version }}"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # See: https://github.com/pyodide/pyodide/blob/main/pyodide-cross-build-environments.json
    strategy:
      matrix:
        platform:
          - python-version: "3.10"
            # pyodide: 0.22.0 - ???
            pyodide-version: "0.22.0"
            emsdk-version: "3.1.27"
            rust-toolchain: "nightly-2025-02-17"
            rustflags: >-
              -Z allow-features=let_chains
              -Z crate-attr=feature(let_chains)
              -C link-arg=-sSIDE_MODULE=2
              -C link-arg=-sWASM_BIGINT
              -C relocation-model=pic

          - python-version: "3.11"
            # pyodide: 0.25.0 - 0.25.1
            pyodide-version: "0.25.0, 0.25.1"
            emsdk-version: "3.1.46"
            rust-toolchain: "nightly-2025-02-17"
            rustflags: >-
              -Z allow-features=let_chains
              -Z crate-attr=feature(let_chains)
              -C link-arg=-sSIDE_MODULE=2
              -C link-arg=-sWASM_BIGINT
              -C relocation-model=pic

          - python-version: "3.12"
            # pyodide:
            # 0.26.0a1 - 0.26.0a4 (emscripten 3.1.52)
            # 0.26.0a5 - 0.27.7 (emscripten 3.1.58)
            pyodide-version: "0.26.0a5, 0.27.7"
            emsdk-version: "3.1.58"
            rust-toolchain: "nightly-2025-02-17"
            rustflags: >-
              -Z allow-features=let_chains
              -Z crate-attr=feature(let_chains)
              -C link-arg=-sSIDE_MODULE=2
              -C link-arg=-sWASM_BIGINT
              -C relocation-model=pic

          - python-version: "3.13"
            # pyodide:
            # 0.28.0a1 (emscripten 4.0.6)
            # 0.28.0a2 (emscripten 4.0.8)
            # 0.28.0a3 - 0.29.3 (emscripten 4.0.9)
            pyodide-version: "0.28.0a3, 0.29.3"
            emsdk-version: "4.0.9"
            rust-toolchain: "nightly-2026-03-06"
            rustflags: >-
              -Z emscripten-wasm-eh
              -C link-arg=-sSIDE_MODULE=2
              -C link-arg=-sWASM_BIGINT
              -C relocation-model=pic
              -Z link-native-libraries=no
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.platform.python-version }}
      - name: "Install Rust toolchain"
        run: |
          rustup toolchain install ${{ matrix.platform.rust-toolchain }}
          rustup target add wasm32-unknown-emscripten --toolchain ${{ matrix.platform.rust-toolchain }}
      - name: "Install Emscripten SDK"
        uses: mymindstorm/setup-emsdk@6ab9eb1bda2574c4ddb79809fc9247783eaf9021 # v14
        with:
          version: ${{ matrix.platform.emsdk-version }}
      - name: "Install uv"
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: ${{ !startsWith(github.ref, 'refs/tags/') }} # zizmor: ignore[cache-poisoning]
      - name: "Install maturin"
        run: uv pip install --group maturin --system
      - name: "Fetch cargo dependencies"
        run: cargo fetch
      - name: "Patch toml_datetime for old Rust"
        run: |
          find ~/.cargo/git/checkouts -path "*toml_datetime/src/datetime.rs" -exec sed -E -i \
          's/([A-Za-z0-9_\.]+)\.is_multiple_of\(([0-9]+)\)/(\1 % \2 == 0)/g' {} +
      - name: "Build wasm wheel"
        env:
          RUSTUP_TOOLCHAIN: ${{ matrix.platform.rust-toolchain }}
          CARGO_TARGET_WASM32_UNKNOWN_EMSCRIPTEN_RUSTFLAGS: ${{ matrix.platform.rustflags }}
        run: |
          maturin build --release \
            --target wasm32-unknown-emscripten \
            --interpreter python${{ matrix.platform.python-version }} \
            --out dist
      - name: "Test wasm wheel"
        env:
          PYODIDE_VERSIONS: ${{ matrix.platform.pyodide-version }}
        run: |
          set -euo pipefail
          set -x
          wheel_path="$(realpath "$(ls dist/*.whl | head -n1)")"
          test -f "${wheel_path}"

          mkdir -p .__tmp-pyodide-check__
          cd .__tmp-pyodide-check__
          printf '%s\n' '{"name":"wasm-pyodide-check","private":true,"type":"module"}' > package.json
          cp ../.github/scripts/test_wasm_wheel.mjs ./test_wasm_wheel.mjs

          IFS=',' read -ra raw_versions <<< "${PYODIDE_VERSIONS}"
          for raw_version in "${raw_versions[@]}"; do
            pyodide_version="$(echo "${raw_version}" | xargs)"
            pyodide_npm_version="${pyodide_version}"
            if [[ "${pyodide_npm_version}" =~ ^([0-9]+\.[0-9]+\.[0-9]+)a([0-9]+)$ ]]; then
              pyodide_npm_version="${BASH_REMATCH[1]}-alpha.${BASH_REMATCH[2]}"
            fi
            echo "Testing pyodide ${pyodide_version} (npm: ${pyodide_npm_version})"
            rm -rf node_modules package-lock.json
            npm view "pyodide@${pyodide_npm_version}" version
            npm install --no-fund --no-audit "pyodide@${pyodide_npm_version}"
          
            PYODIDE_VERSION="${pyodide_version}" \
            WHEEL_PATH="${wheel_path}" \
            node ./test_wasm_wheel.mjs
          done
      - name: "Upload wasm wheel"
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: wasm-wheels-cp${{ matrix.platform.python-version }}
          path: dist
