name: CI

permissions: { }

on:
  push:
    branches:
      - main
    tags:
      - "*"
    paths-ignore:
      - "benchmark/**"
      - "README.md"
      - "CONTRIBUTING.md"
  pull_request:
    paths-ignore:
      - "benchmark/**"
      - "README.md"
      - "CONTRIBUTING.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  cargo-fmt:
    name: "cargo fmt"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: "Install Rust nightly + rustfmt"
        run: rustup toolchain install nightly --component rustfmt
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          lookup-only: true
      - run: cargo fmt-nightly --check

  cargo-clippy:
    name: "cargo clippy"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: "Install Rust nightly + clippy"
        run: rustup toolchain install nightly --component clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          lookup-only: true
      - run: cargo clippy --all-targets

  zizmor:
    name: "zizmor"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
      - name: "Install uv"
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: ${{ !startsWith(github.ref, 'refs/tags/') }} # zizmor: ignore[cache-poisoning]
      - name: "Install zizmor"
        run: |
          uv pip install --group zizmor --system
      - name: "Run zizmor"
        run: |
          zizmor .github/

  typos:
    name: "typos"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
      - name: "Install uv"
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: ${{ !startsWith(github.ref, 'refs/tags/') }} # zizmor: ignore[cache-poisoning]
      - name: "Install typos"
        run: |
          uv pip install --group typos --system
      - name: "Run typos"
        run: |
          typos --config .typos.toml

  rumdl:
    name: "rumdl"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
      - name: "Install uv"
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: ${{ !startsWith(github.ref, 'refs/tags/') }} # zizmor: ignore[cache-poisoning]
      - name: "Install rumdl"
        run: |
          uv pip install --group rumdl --system
      - name: "Run rumdl"
        run: |
          rumdl check .

  tests-alpine:
    name: "tests / alpine / python 3.13"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: "0.2.1"
        run: |
          docker run --rm ghcr.io/astral-sh/uv:python3.14-alpine sh -c "
          uv pip install toml-rs==0.2.1 --system && \
          python -c 'import toml_rs; print(toml_rs.__version__)'
          " 2>&1 | tee /dev/stderr | grep -q "initial-exec TLS resolves to dynamic definition"
      - name: "latest"
        run: |
          mkdir -p /tmp/__build__
          cp -r py-src src Cargo.toml pyproject.toml README.md /tmp/__build__/
          
          docker run --rm \
            -v /tmp/__build__:/app \
            -w /app \
            ghcr.io/astral-sh/uv:python3.14-alpine sh -c "
            apk add --no-cache curl build-base musl-dev openssl-dev && \
            curl https://sh.rustup.rs -sSf | sh -s -- -y --default-toolchain stable && \
            . \$HOME/.cargo/env && \
            rustc --version && \
            uv pip install maturin[patchelf] -U --system && \
            maturin build --release --out /app/dist --features mimalloc && \
            uv pip install /app/dist/*.whl --system && \
            python -c 'import toml_rs; print(toml_rs.__version__)'
          "

  tests:
    uses: ./.github/workflows/tests.yml

  linux:
    needs: [
      tests,
      tests-alpine,
      cargo-fmt,
      cargo-clippy,
      zizmor,
      typos,
      rumdl,
    ]
    uses: ./.github/workflows/linux.yml

  musllinux:
    needs: [
      tests,
      tests-alpine,
      cargo-fmt,
      cargo-clippy,
      zizmor,
      typos,
      rumdl,
    ]
    uses: ./.github/workflows/musllinux.yml

  windows:
    needs: [
      tests,
      tests-alpine,
      cargo-fmt,
      cargo-clippy,
      zizmor,
      typos,
      rumdl,
    ]
    uses: ./.github/workflows/windows.yml

  macos:
    needs: [
      tests,
      tests-alpine,
      cargo-fmt,
      cargo-clippy,
      zizmor,
      typos,
      rumdl,
    ]
    uses: ./.github/workflows/macos.yml

  wasm:
    needs: [
      tests,
      tests-alpine,
      cargo-fmt,
      cargo-clippy,
      zizmor,
      typos,
      rumdl,
    ]
    uses: ./.github/workflows/wasm.yml

  build-sdist:
    name: "build sdist"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: "Build sdist"
        uses: PyO3/maturin-action@04ac600d27cdf7a9a280dadf7147097c42b757ad # v1.50.1
        with:
          command: sdist
          args: --out dist
      - name: "Upload sdist"
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: wheels-sdist
          path: dist

  release:
    name: "Release"
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
    needs: [
      linux,
      musllinux,
      windows,
      macos,
      build-sdist,
      tests,
      tests-alpine,
      cargo-clippy,
      cargo-fmt,
      zizmor,
      typos,
      rumdl,
      wasm,
    ]
    permissions:
      # Use to sign the release artifacts
      id-token: write
      # Used to upload release artifacts
      contents: write
      # Used to generate artifact attestation
      attestations: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      - name: "Generate artifact attestation"
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "wheels-*/*"
      - name: "Install uv"
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: false
      - name: "Publish to PyPI"
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: uv publish 'wheels-*/*'
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }} # zizmor: ignore[secrets-outside-env]

      - name: "Download wasm artifacts"
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: wasm-wheels-*
          merge-multiple: true
          path: wasm
      - name: "Upload wasm wheels to GitHub Release"
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release view "$tag" >/dev/null 2>&1 || \
          gh release create "$tag" --title "$tag" --notes ""
          gh release upload "$tag" wasm/*.whl --clobber
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
