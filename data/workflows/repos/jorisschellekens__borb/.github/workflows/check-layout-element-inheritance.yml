name: Check LayoutElement Inheritance

on: [push]

jobs:
  check_layout_element_inheritance:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the code
      - name: Checkout code
        uses: actions/checkout@v6

      # Step 2: Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'  # Choose your Python version

      # Step 3: Check whether the LayoutElement subclasses are properly defined
      - name: Check whether the LayoutElement subclasses are properly defined
        run: |
          python ./.github/workflows/check_layout_element_inheritance.py .
