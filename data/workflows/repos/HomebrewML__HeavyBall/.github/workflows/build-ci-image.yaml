name: Build CI image

on:
  push:
    branches: [main]
    paths:
      - ci/Dockerfile
      - pyproject.toml
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ci
          push: true
          tags: ghcr.io/homebrewml/heavyball-ci:latest
