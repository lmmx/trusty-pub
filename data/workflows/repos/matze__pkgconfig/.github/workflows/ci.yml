# badge: https://github.com/matze/pkgconfig/workflows/CI/badge.svg?branch=master

name: CI

on:
  push:
    branches: [ master ]
    paths:
    - '**.py'
    - '**.pc'
    - '**.yml'
    - '**.toml'
    - '**.cfg'
    - '**.ini'
  pull_request:
    branches: [ master ]
    paths:
    - '**.py'
    - '**.pc'
    - '**.yml'
    - '**.toml'
    - '**.cfg'
    - '**.ini'

jobs:
  linux:

    strategy:
      fail-fast: true
      matrix:
        include:
            - os: ubuntu-22.04
              python-version: '3.9'
              toxenv: py39
            - os: ubuntu-22.04
              python-version: '3.10'
              toxenv: py310
            - os: ubuntu-22.04
              python-version: '3.11'
              toxenv: py311
            - os: ubuntu-24.04
              python-version: '3.12'
              toxenv: py312
            - os: ubuntu-24.04
              python-version: '3.13'
              toxenv: py313
            - os: ubuntu-24.04
              python-version: '3.14'
              toxenv: py314

    env:
      TOXENV: ${{ matrix.toxenv }}

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install Linux packages
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config
    - name: Install Python requirements
      run: |
        python -m pip install --upgrade pip
        python -m pip install poetry
        poetry --version
        poetry install
    - name: run tox env
      run: poetry run tox -c pyproject.toml --skip-missing-interpreters

  macOS:

    needs: linux
    strategy:
      fail-fast: true
      matrix:
        include:
            - os: macos-15
              python-version: '3.13'
              toxenv: py313

    env:
      TOXENV: ${{ matrix.toxenv }}

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install macOS packages
      run: |
        brew install pkgconf || brew upgrade pkgconf
    - name: Install Python requirements
      run: |
        python -m pip install --upgrade pip
        python -m pip install poetry
        poetry --version
        poetry install
    - name: run tox env
      run: poetry run tox -c pyproject.toml --skip-missing-interpreters
