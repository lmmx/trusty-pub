name: build

on: [push, pull_request, workflow_dispatch]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false # run all tests anyway
      matrix:
        include:
          # Python 3.10 && Pytest 7
          - toxenv: py310-pytest7-supported-xdist
            python: "3.10"

          # Latest Python & Pytest
          - toxenv: py314-pytest_latest-supported-xdist
            python: 3.14

          # QA
          - toxenv: qa
            python: "3.10"
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: 'pip'
          cache-dependency-path: |
            setup.py
            tox.ini

      - name: Install requirements
        run: |
          pip install -U tox

      - name: Test
        env:
          TOXENV: ${{ matrix.toxenv }}
        run: tox

  deploy:
    name: Deploy
    environment: Deployment
    needs: test
    runs-on: ubuntu-22.04
    if: github.ref=='refs/heads/main' && github.event_name!='pull_request'

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Check release
        id: check_release
        run: |
          python -m pip install autopub[github] twine wheel
          autopub check

      - name: Publish
        if: ${{ steps.check_release.outputs.autopub_release=='true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TWINE_USERNAME: "__token__"
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
        run: |
          autopub deploy
