name: Publish to PyPI [Production]
on:
    release:
        types: [published]

permissions:
    contents: read

jobs:
    publish:
        name: Publish
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/main'
        steps:
            #----------------------------------------------
            #       check-out repo and set-up python
            #----------------------------------------------
            - name: Check out repository
              uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 # v2
            - name: Set up python
              id: setup-python
              uses: actions/setup-python@e9aba2c848f5ebd159c070c61ea2c4e2b122355e # v2
              with:
                  python-version: 3.9
            #----------------------------------------------
            #  -----  install & configure poetry  -----
            #----------------------------------------------
            - name: Install Poetry
              uses: snok/install-poetry@76e04a911780d5b312d89783f7b1cd627778900a # v1
              with:
                  version: "2.2.1"
                  virtualenvs-create: true
                  virtualenvs-in-project: true
                  installer-parallel: true
            #----------------------------------------------
            #       load cached venv if cache exists
            #----------------------------------------------
            - name: Load cached venv
              id: cached-poetry-dependencies
              uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
              with:
                  path: .venv
                  key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ github.event.repository.name }}-${{ hashFiles('**/poetry.lock') }}
            #----------------------------------------------
            # install dependencies if cache does not exist
            #----------------------------------------------
            - name: Install dependencies
              if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
              run: poetry install --no-interaction --no-root
            #------------------------------------------------------------------------------------------------
            # Here we use version-increment to fetch the latest tagged version (we won't increment it though)
            #------------------------------------------------------------------------------------------------
            - name: Get next version
              uses: reecetech/version-increment@ddbbe72b7f76a996076fabfdce21a16384e8644a # 2022.2.4
              id: version
              with:
                  scheme: semver
                  increment: patch
            #-----------------------------------------------------------------------------
            # Tell poetry to use the `current-version` that was found by the previous step
            #-----------------------------------------------------------------------------
            - name: Update pyproject.toml
              run: poetry version ${{ steps.version.outputs.current-version }}
            #----------------------------------------------
            # Attempt push to test-pypi
            #----------------------------------------------
            - name: Build and publish to pypi
              uses: JRubics/poetry-publish@969e8c47dd31083377ab78c536425bbc1b9698f0 # v1.10
              with:
                  pypi_token: ${{ secrets.SQLALCHEMY_PROD_PYPI_TOKEN }}