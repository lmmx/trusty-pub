name: Upload Python Package

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  release-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install build tools
        run: |
          uv sync --locked --all-extras --dev

      - name: Build release distributions
        run: |
          uv run python -m build

      - name: Smoke test (wheel)
        run: |
          tmpdir="$(mktemp -d)"
          cp tests/smoke_test.py "$tmpdir/"
          cd "$tmpdir"
          uv run --isolated --no-project --with "$GITHUB_WORKSPACE/dist/"*.whl smoke_test.py

      - name: Smoke test (source distribution)
        run: |
          tmpdir="$(mktemp -d)"
          cp tests/smoke_test.py "$tmpdir/"
          cd "$tmpdir"
          uv run --isolated --no-project --with "$GITHUB_WORKSPACE/dist/"*.tar.gz smoke_test.py

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

  pypi-publish:
    runs-on: ubuntu-latest
    needs:
      - release-build
    permissions:
      id-token: write
    environment:
      name: release

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
