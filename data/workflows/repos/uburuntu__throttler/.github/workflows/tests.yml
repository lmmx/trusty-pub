name: Python Tests

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-2022]
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12', '3.13', '3.14']

    env:
      OS: ${{ matrix.os }}
      PYTHON: ${{ matrix.python-version }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: |
          uv sync --locked --all-extras --dev

      - name: Lint with ruff
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Test with pytest
        run: |
          uv run pytest -vl --cov=./ --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          env_vars: OS,PYTHON
          flags: unittests

  package-smoke:
    name: Package Smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          allow-prereleases: true

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: |
          uv sync --locked --all-extras --dev

      - name: Build distributions
        run: |
          uv run python -m build

      - name: Smoke test (wheel)
        run: |
          tmpdir="$(mktemp -d)"
          cp tests/smoke_test.py "$tmpdir/"
          cd "$tmpdir"
          uv run --isolated --no-project --with "$GITHUB_WORKSPACE/dist/"*.whl smoke_test.py

      - name: Smoke test (source distribution)
        run: |
          tmpdir="$(mktemp -d)"
          cp tests/smoke_test.py "$tmpdir/"
          cd "$tmpdir"
          uv run --isolated --no-project --with "$GITHUB_WORKSPACE/dist/"*.tar.gz smoke_test.py
