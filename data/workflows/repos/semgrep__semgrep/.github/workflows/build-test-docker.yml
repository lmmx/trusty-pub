# AUTOGENERATED FROM build-test-docker.jsonnet DO NOT MODIFY
jobs:
  build-test-docker:
    outputs:
      digest: ${{ steps.build-semgrep-cli-docker-image.outputs.digest }}
    permissions:
      contents: read
      id-token: write
    runs-on: depot-ubuntu-24.04-8
    steps:
      - name: Configure git safedir properly
        run: git config --global --add safe.directory $(pwd)
      - name: Make checkout speedy
        run: git config --global fetch.parallel 50
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.sha }}
          submodules: true
      - uses: depot/setup-action@15c09a5f77a0840ad4bce955686522a257853461
      - id: semgrep-cli-prepare-metadata
        name: Set tags and labels
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          flavor: |
            latest=false
            prefix=
            suffix=
          images: ""
          tags: |
            type=ref,event=pr,prefix=pr-
            type=ref,event=branch
            type=raw,value=sha-${{ inputs.ref != '' && inputs.ref || github.sha }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - id: build-semgrep-cli-docker-image
        name: 'Build Build Core: Build docker image in Depot'
        uses: depot/build-push-action@fe21fca271114de9237a9b1129b9ef38c77a1c21
        with:
          build-args: |
            VCS_REF_HEAD_NAME=${{ github.head_ref || github.ref_name }}
            VCS_REF_HEAD_REVISION=${{ inputs.ref != '' && inputs.ref || github.sha }}
          buildx-fallback: false
          context: .
          file: Dockerfile
          labels: ${{ steps.semgrep-cli-prepare-metadata.outputs.labels }}
          load: true
          platforms: linux/amd64,linux/arm64
          push: false
          tags: ${{ steps.semgrep-cli-prepare-metadata.outputs.tags }}
          target: semgrep-cli
      - env:
          ENV_VARS: ""
        name: Make env file for docker run
        run: echo "${ENV_VARS}" > /tmp/docker-env-file.env
      - env:
          IMAGE: sha-${{ inputs.ref != '' && inputs.ref || github.sha }}
        id: run-docker-image
        name: Run docker image
        run: docker run --env-file /tmp/docker-env-file.env --name run_step ${IMAGE}
name: build-test-docker
on:
  workflow_call:
    inputs:
      ref:
        default: ""
        description: Git ref to checkout. Defaults to github.sha
        required: false
        type: string
    outputs:
      digest:
        description: Digest of the built Docker image
        value: ${{ jobs.build-test-docker.outputs.digest }}
  workflow_dispatch:
    inputs:
      ref:
        default: ""
        description: Git ref to checkout. Defaults to github.sha
        required: false
        type: string
