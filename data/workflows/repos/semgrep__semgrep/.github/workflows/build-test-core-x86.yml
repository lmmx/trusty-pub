# AUTOGENERATED FROM build-test-core-x86.jsonnet DO NOT MODIFY
jobs:
  job:
    container: alpine:3.23
    env:
      HOME: /root
    runs-on: ubuntu-latest
    steps:
      - name: setup alpine
        run: apk add --no-cache git git-lfs bash curl build-base make bubblewrap rsync
      - name: Configure git safedir properly
        run: git config --global --add safe.directory $(pwd)
      - name: Make checkout speedy
        run: git config --global fetch.parallel 50
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: true
      - uses: semgrep/setup-ocaml@ce6a88f72f48e02a172c93eb93177b21659e7032
        with:
          cache-prefix: v5
          ocaml-compiler: ocaml-variants.5.3.0+options,ocaml-option-flambda
          opam-pin: false
          save-opam-post-run: true
      - name: Install dependencies
        run: opam exec -- make install-deps
      - name: Build semgrep-core
        run: opam exec -- make
      - name: Test semgrep-core
        run: opam exec -- make test
      - name: Make artifact for bin/semgrep-core
        run: |
          mkdir artifacts
          cp -LR bin/semgrep-core artifacts/
          tar czf artifacts.tgz artifacts
          # so that we can untar later and not get a message
          # about existing artifacts/ directory
          rm -rf artifacts
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: semgrep-core-x86-artifact
          path: artifacts.tgz
name: build-test-core-x86
on:
  workflow_call: null
  workflow_dispatch: null
