# Publish to PyPI when a tag v* is pushed (e.g. after merging release/X.Y.Z into master).
# Requires: GitHub secret PYPI_API_TOKEN (PyPI API token), or configure Trusted Publishing on PyPI.

name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    # Manual run: use "Run workflow" and set ref to tag (e.g. v3.14.7) to publish that version.

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
