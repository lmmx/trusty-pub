name: Compliance Check

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  compliance:
    name: Leo Compliance Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install Comp-LEO SDK
        run: |
          pip install comp-leo
      
      - name: Run compliance checks
        id: compliance
        run: |
          comp-leo check programs/ \
            --policy aleo-baseline \
            --threshold 75 \
            --fail-on-critical \
            --output compliance-report.json
        continue-on-error: true
      
      - name: Upload report
        uses: actions/upload-artifact@v3
        with:
          name: compliance-report
          path: compliance-report.json
      
      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('compliance-report.json', 'utf8'));
            
            const body = `## 🔍 Compliance Check Results
            
            **Status:** ${report.passed ? '✅ PASSED' : '❌ FAILED'}
            **Score:** ${report.score}/${report.threshold}
            **Policy Pack:** ${report.policy_pack}
            
            ### Summary
            - 🔴 Critical: ${report.critical_count}
            - ⚠️ High: ${report.high_count}
            - ℹ️ Medium: ${report.medium_count}
            - 💬 Low: ${report.low_count}
            
            ${report.violations.length > 0 ? '### Top Violations\n' + report.violations.slice(0, 3).map(v => 
              `- **${v.rule_name}** (${v.severity})\n  \`${v.file_path}:${v.line_number}\`\n  ${v.message}`
            ).join('\n\n') : '✨ No violations found!'}
            
            ---
            📊 [View full report](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
      
      - name: Fail if compliance check failed
        if: steps.compliance.outcome == 'failure'
        run: exit 1
