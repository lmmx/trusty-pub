name: Lint code

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.14"
    - name: Install
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black
    - name: Lint
      run: |
        black --check *.py
        flake8
