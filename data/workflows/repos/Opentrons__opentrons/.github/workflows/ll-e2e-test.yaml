# Labware Library E2E Tests using Playwright

name: "LL E2E Tests"

on:
  pull_request:
    paths:
      - 'labware-library/**'
      - 'shared-data/**'
      - 'components/**'
      - 'package.json'
      - '.github/workflows/ll-test-build-deploy.yaml'
      - '.github/actions/js/setup/action.yml'
      - '.github/actions/git/resolve-tag/action.yml'
      - '.github/actions/environment/complex-variables/action.yml'
      - 'scripts/static-deploy/**'
      - 'e2e-testing/tests/ll/**'
      - '.github/workflows/ll-e2e-test.yaml'
      - 'e2e-testing/fixtures/**'
      - 'e2e-testing/uv.lock'
      - 'e2e-testing/pyproject.toml'
      - 'e2e-testing/conftest.py'
      - 'e2e-testing/pytest.ini'
      - 'e2e-testing/eyes.py'
      - 'e2e-testing/Makefile'
      - 'e2e-testing/automation/base_page.py'
      - 'e2e-testing/automation/ll_pages/**'
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  CI: "true"

jobs:
  e2e-test-local:
    name: "E2E tests against local build"
    runs-on: "ubuntu-24.04"
    timeout-minutes: 15
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Need full history for git version script

      - name: "Setup JS Environment"
        uses: ./.github/actions/js/setup

      - name: "Setup UV for E2E tests"
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          cache-dependency-glob: |
              e2e-testing/uv.lock
              e2e-testing/pyproject.toml

      - name: "Install E2E test dependencies"
        working-directory: e2e-testing
        run: make setup

      - name: "Install Playwright browser"
        working-directory: e2e-testing
        run: make test-setup

      - name: "Run E2E tests against local build"
        working-directory: e2e-testing
        run: make test-ll-local

      - name: "Upload test results"
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-results-local
          path: |
            e2e-testing/test-results/
          retention-days: 7
          if-no-files-found: warn
