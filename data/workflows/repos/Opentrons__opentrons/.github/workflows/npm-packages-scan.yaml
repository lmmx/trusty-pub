name: Weekly Security Audit

on:
  schedule:
    # every monday at 7:00 EDT (summer), 6:00 EST (winter) | 12:00 UTC
    - cron: '0 12 * * 1'

  workflow_dispatch: {}

permissions:
  contents: read
  # Needed for uploading SARIF to GitHub Code Scanning
  security-events: write

jobs:
  # JOB 1: Run the scanners, upload SARIF, and upload artifacts
  run-scanners:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'yarn'

      # ensure yarn version is 1.x
      - name: Show Yarn version
        run: |
          corepack disable || true
          yarn --version

      # 1) Run yarn audit (JSONL)
      - name: Run yarn audit (JSON)
        run: |
          yarn audit --json > yarn-audit.json || true

      # 2) Run OSV-Scanner via Docker and save JSON results
      - name: Run OSV-Scanner (JSON)
        run: |
          docker run --rm \
            -v "$PWD":/src \
            ghcr.io/google/osv-scanner:v2.3.0-amd64 \
            scan source /src \
              --recursive \
              --format=json \
              --output=/src/osv-results.json || true

      # 3) Run OSV-Scanner again to produce SARIF for GitHub Code Scanning
      - name: Run OSV-Scanner (SARIF)
        run: |
          docker run --rm \
            -v "$PWD":/src \
            ghcr.io/google/osv-scanner:v2.3.0-amd64 \
            scan source /src \
              --recursive \
              --format=sarif \
              --output=/src/osv-results.sarif || true

      # Upload SARIF to GitHub Code Scanning
      - name: Upload OSV SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: osv-results.sarif

      # Upload results so the next job can access them
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-results
          path: |
            yarn-audit.json
            osv-results.json

  # JOB 2: Download results and notify Slack (summary only)
  notify:
    needs: run-scanners
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: security-results

      - name: Notify Slack (summary)
        if: always()
        run: |
          set -euo pipefail

          # --- yarn audit summary (severity counts) ---
          # count by severity: critical, high, moderate, low, info
          if [ -s yarn-audit.json ]; then
            YARN_COUNTS=$(jq -s -r '
              map(select(.type=="auditAdvisory") | .data.advisory.severity)
              | reduce .[] as $s ({"info":0,"low":0,"moderate":0,"high":0,"critical":0}; .[$s] += 1)
              | "yarn audit: critical=\(.critical) high=\(.high) moderate=\(.moderate) low=\(.low) info=\(.info)"
            ' yarn-audit.json 2>/dev/null || true)

            read -r YARN_CRIT YARN_HIGH < <(jq -s -r '
              map(select(.type=="auditAdvisory") | .data.advisory.severity)
              | reduce .[] as $s ({"high":0,"critical":0};
                  if $s=="high" then .high+=1
                  elif $s=="critical" then .critical+=1
                  else . end)
              | "\(.critical) \(.high)"
            ' yarn-audit.json 2>/dev/null || echo "0 0")
          else
            YARN_COUNTS="yarn audit: (no data)"
            YARN_CRIT=0
            YARN_HIGH=0
          fi

          # --- OSV summary ---
          # OSV JSON often doesn't include a consistent severity field.
          # So we summarize: total vulnerability entries and affected package entries.
          if [ -s osv-results.json ]; then
            OSV_VULN_COUNT=$(jq -r '
              (.results // [])
              | map((.packages // []) | map((.vulnerabilities // []) | length) | add)
              | add
            ' osv-results.json 2>/dev/null || echo "0")

            OSV_PKG_ENTRIES=$(jq -r '
              (.results // [])
              | map((.packages // []) | length)
              | add
            ' osv-results.json 2>/dev/null || echo "0")

            OSV_SUMMARY="osv-scanner: vulnerabilities=${OSV_VULN_COUNT} package-entries=${OSV_PKG_ENTRIES}"
          else
            OSV_VULN_COUNT=0
            OSV_SUMMARY="osv-scanner: (no data)"
          fi

          # --- Overall status ---
          if [ "${YARN_CRIT:-0}" -eq 0 ] && [ "${YARN_HIGH:-0}" -eq 0 ] && [ "${OSV_VULN_COUNT:-0}" -eq 0 ]; then
            HEADER="✅ Weekly Security Audit: OK"
          else
            HEADER="🚨 Weekly Security Audit: Findings"
          fi

          RUN_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

          MESSAGE="$HEADER
          $YARN_COUNTS
          $OSV_SUMMARY
          run: $RUN_URL"

          # Slack Incoming Webhook expects { "text": "..." }
          PAYLOAD=$(jq -n --arg text "$MESSAGE" '{text:$text}')

          curl -H "Content-Type: application/json" \
            -X POST \
            -d "$PAYLOAD" \
            "$SLACK_WEBHOOK_URL"
