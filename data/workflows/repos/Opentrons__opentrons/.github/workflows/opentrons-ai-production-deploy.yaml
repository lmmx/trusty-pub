name: 'OpentronsAI production deployment'

on:
  push:
    tags:
      - 'ai-client@*'
      - 'ai-server@*'

env:
  CI: true

jobs:
  deploy-client:
    if: startsWith(github.ref, 'refs/tags/ai-client@')
    # if there is a deployment (this workflow) in progress for the ai-client@ tag, cancel it
    concurrency:
      group: ${{ github.workflow }}-ai-client@
      cancel-in-progress: true
    runs-on: 'ubuntu-24.04'
    permissions:
      id-token: write
      contents: read
    name: 'OpentronsAI client prod deploy'
    timeout-minutes: 10
    steps:
      - uses: 'actions/checkout@v6'
      - uses: ./.github/actions/js/setup
      - name: 'build'
        env:
          OT_AI_CLIENT_MIXPANEL_ID: ${{ secrets.OT_AI_CLIENT_MIXPANEL_ID }}
        run: |
          make -C opentrons-ai-client build-production
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.PROD_AI_ROLE_ARN }}
          aws-region: ${{ secrets.PROD_AI_REGION }}
      - name: 'deploy client to prod'
        run: |
          make -C opentrons-ai-client prod-deploy

  deploy-server:
    if: startsWith(github.ref, 'refs/tags/ai-server@')
    # if there is a deployment (this workflow) in progress for the ai-server@ tag, cancel it
    concurrency:
      group: ${{ github.workflow }}-ai-server@
      cancel-in-progress: true
    runs-on: 'ubuntu-latest'
    permissions:
      id-token: write
      contents: read
    name: 'OpentronsAI server prod deploy'
    timeout-minutes: 10
    steps:
      - name: Extract Version
        id: extract_version
        run: |
          TAG_REF=${{ github.ref }}
          SERVER_VERSION=${TAG_REF#refs/tags/ai-server@}
          echo "SERVER_VERSION=$SERVER_VERSION" >> "$GITHUB_OUTPUT"
      - name: Checkout opentrons repo
        uses: 'actions/checkout@v6'
      - name: Setup UV
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "./opentrons-ai-server/uv.lock"
      - name: Setup
        id: install
        working-directory: ./opentrons-ai-server
        run: make setup
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.PROD_AI_ROLE_ARN }}
          aws-region: ${{ secrets.PROD_AI_REGION }}
      - name: 'deploy api to prod'
        working-directory: ./opentrons-ai-server
        run: |
          make deploy ENV=prod TAG=${{ steps.extract_version.outputs.SERVER_VERSION }}

  # Notification jobs for tagged builds
  notify-success:
    name: 'Notify Build Success'
    runs-on: 'ubuntu-latest'
    needs: [deploy-client, deploy-server]
    if: always() && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && (needs.deploy-client.result == 'success' || needs.deploy-server.result == 'success')
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: 'Send success alert'
        uses: ./.github/actions/simple-build-alert
        with:
          status: 'success'
          workflow_name: 'OpentronsAI production deployment'
          webhook_url: ${{ secrets.OT_APP_RELEASE_SLACK_NOTIFICATION_WEBHOOK_URL }}

  notify-failure:
    name: 'Notify Build Failure'
    runs-on: 'ubuntu-latest'
    needs: [deploy-client, deploy-server]
    if: always() && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && (needs.deploy-client.result == 'failure' || needs.deploy-server.result == 'failure')
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: 'Determine failed jobs'
        id: failed-jobs
        shell: bash
        run: |
          failed_jobs=()
          if [[ "${{ needs.deploy-client.result }}" == "failure" ]]; then
            failed_jobs+=("deploy-client")
          fi
          if [[ "${{ needs.deploy-server.result }}" == "failure" ]]; then
            failed_jobs+=("deploy-server")
          fi

          IFS=','
          echo "failed_jobs=${failed_jobs[*]}" >> $GITHUB_OUTPUT

      - name: 'Send failure alert'
        uses: ./.github/actions/simple-build-alert
        with:
          status: 'failure'
          workflow_name: 'OpentronsAI production deployment'
          failed_jobs: ${{ steps.failed-jobs.outputs.failed_jobs }}
          webhook_url: ${{ secrets.OT_APP_RELEASE_SLACK_NOTIFICATION_WEBHOOK_URL }}

  notify-cancelled:
    name: 'Notify Build Cancelled'
    runs-on: 'ubuntu-latest'
    needs: [deploy-client, deploy-server]
    if: always() && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && (needs.deploy-client.result == 'cancelled' || needs.deploy-server.result == 'cancelled')
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: 'Send cancelled alert'
        uses: ./.github/actions/simple-build-alert
        with:
          status: 'cancelled'
          workflow_name: 'OpentronsAI production deployment'
          webhook_url: ${{ secrets.OT_APP_RELEASE_SLACK_NOTIFICATION_WEBHOOK_URL }}
