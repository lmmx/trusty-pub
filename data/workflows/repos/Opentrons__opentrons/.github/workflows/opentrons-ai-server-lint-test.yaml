# This workflow runs lint on pull requests that touch anything in the opentrons-ai-server directory

name: 'Opentrons ai-server lint'

on:
  pull_request:
    paths:
      - 'opentrons-ai-server/**'
      - '.github/workflows/opentrons-ai-server-lint-test.yaml'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  lint:
    name: 'ai-server lint'
    timeout-minutes: 5
    runs-on: 'ubuntu-latest'
    steps:
      - name: Checkout opentrons repo
        uses: 'actions/checkout@v6'

      - name: Setup UV
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "./opentrons-ai-server/uv.lock"
      - name: Setup
        id: install
        working-directory: ./opentrons-ai-server
        run: make setup
      - name: ruff
        if: always() && steps.install.outcome == 'success' || steps.install.outcome == 'skipped'
        working-directory: ./opentrons-ai-server
        run: make ruff-check
      - name: mypy
        if: always() && steps.install.outcome == 'success' || steps.install.outcome == 'skipped'
        working-directory: ./opentrons-ai-server
        run: make mypy
      - name: unit tests
        if: always() && steps.install.outcome == 'success' || steps.install.outcome == 'skipped'
        working-directory: ./opentrons-ai-server
        run: make unit-test
