name: Publish PyPI package
on:
  push:
    tags:
      - v*.*.*

jobs:
  push_to_pypi:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5
      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.2"
      - name: Run uv build
        run:  uv build
      - name: Run uv publish
        run: UV_PUBLISH_TOKEN=${{ secrets.PYPI_TOKEN }} uv publish
