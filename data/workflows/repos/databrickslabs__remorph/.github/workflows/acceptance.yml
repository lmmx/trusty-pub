name: acceptance

on:
  pull_request:
    types: [ opened, synchronize ]
  merge_group:
    types: [ checks_requested ]
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    environment: tool
    runs-on:
      group: larger-runners
      labels: larger
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Install Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          cache: 'pip'
          cache-dependency-path: '**/pyproject.toml'
          python-version: '3.10'

      - name: Install hatch
        # see here for more details https://github.com/pypa/hatch/issues/2193
        run: pip install hatch==1.14.2 "virtualenv<21"

      - name: Install MSSQL ODBC Driver
        run: |
          chmod +x $GITHUB_WORKSPACE/.github/scripts/setup_mssql_odbc.sh
          $GITHUB_WORKSPACE/.github/scripts/setup_mssql_odbc.sh

      # TODO: Migrate tests to use Databricks clusters instead of Spark local mode
      - name: Setup spark
        run: |
          chmod +x $GITHUB_WORKSPACE/.github/scripts/setup_spark_remote.sh
          $GITHUB_WORKSPACE/.github/scripts/setup_spark_remote.sh

      - name: Run integration tests
        uses: databrickslabs/sandbox/acceptance@3313d06ce86227537b3f37f5974f7eecb2a8e59a  # acceptance/v0.4.4
        with:
          vault_uri: ${{ secrets.VAULT_URI }}
          directory: ${{ github.workspace }}
          timeout: 2h
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          TEST_ENV: 'ACCEPTANCE'
