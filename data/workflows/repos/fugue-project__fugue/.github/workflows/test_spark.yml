# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Spark Tests

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '**.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test_combinations:
    name: Test Spark ${{ matrix.spark-version }} Pandas ${{ matrix.pandas-version }} Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
        spark-version: ["3.4.0","3.5.8","4.1.1"]
        pandas-version: ["2.2.0", "2.3.3"]

    steps:
    - name: Clone repo
      uses: actions/checkout@v5

    - name: Setup uv ${{ matrix.python-version }}
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: false
        cache-dependency-glob: "pyproject.toml"
        python-version: ${{ matrix.python-version }}

    - name: Update Spark
      if: matrix.spark-version != 'latest'
      run: uv add "pyspark==${{ matrix.spark-version }}"

    - name: Update Pandas
      if: matrix.pandas-version != 'latest'
      run: uv add "pandas==${{ matrix.pandas-version }}"

    - name: Install dependencies
      run: |
        make devenv upgrade=1

    - name: Test
      run: make testspark

  test_connect:
    name: Spark Connect
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
        spark-version: ["3.4.0","3.5.8","4.1.1"]
        pandas-version: ["2.3.3"]

    steps:
    - name: Clone repo
      uses: actions/checkout@v5

    - name: Setup uv ${{ matrix.python-version }}
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: false
        cache-dependency-glob: "pyproject.toml"
        python-version: ${{ matrix.python-version }}

    - name: Set Spark==3.5.8
      run: uv add "pyspark==3.5.8"

    - name: Update Pandas
      if: matrix.pandas-version != 'latest'
      run: uv add "pandas==${{ matrix.pandas-version }}"

    - name: Install dependencies
      run: |
        make devenv upgrade=1

    - name: Test
      run: |
        make sparkconnect
        make testsparkconnect
