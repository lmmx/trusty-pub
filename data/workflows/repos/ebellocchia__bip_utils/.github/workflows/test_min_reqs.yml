# This workflow will test that the minimum requirements for each supported Python version work correctly

name: Test Minimum Requirements

on:
  push:
    branches: [ "master" ]
    paths-ignore:
      - README.md
      - tox.ini
      - 'benchmark/**'
      - 'docs/**'
      - 'examples/**'
      - 'libs_wheels/**'
      - 'readme/**'
  pull_request:
    branches: [ "master" ]
    paths-ignore:
      - README.md
      - tox.ini
      - 'benchmark/**'
      - 'docs/**'
      - 'examples/**'
      - 'libs_wheels/**'
      - 'readme/**'
  workflow_dispatch:

jobs:
  test_min_reqs_py37:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.7
      uses: actions/setup-python@v5
      with:
        python-version: "3.7"
    - name: Install minimum dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt
        pip install cbor2==5.1.2
        pip install coincurve==15.0.1
        pip install crcmod==1.7
        pip install ecdsa==0.17
        pip install ed25519-blake2b-fork==1.4.2
        pip install pycryptodome==3.15
        pip install pynacl==1.5
        pip install py-sr25519-bindings==0.1.3
        pip install pytoniq-core-fork==0.1.47
        pip install typing_extensions
    - name: Run tests
      run: |
        pytest

  test_min_reqs_py38:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
