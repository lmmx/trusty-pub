name: Python Checks

on:
  workflow_call:

jobs:
  check_python:
    name: Check Python library
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version-file: "src/python/.python-version"

      - name: Install the project
        run: uv sync --frozen --all-extras --dev
        working-directory: ./src/python

      - uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: ./src/python
          # CVE-2025-69872: diskcache pickle deserialization - transitive dep via mcp-proxy-for-aws
          # No fix available yet. Limited risk: requires attacker write access to cache directory.
          # CVE-2025-69196: fastmcp OAuth token audience binding - transitive dep via mcp-proxy-for-aws
          # mcp-proxy-for-aws pins fastmcp<2.14.1, blocking the fix. Waiting for upstream update.
          # CVE-2026-4539: pygments ReDoS in AdlLexer - no fix available yet. Low risk: local access only.
          ignore-vulns: |
            CVE-2025-69872
            CVE-2025-69196
            CVE-2026-4539

      - name: Build
        run: uv build
        working-directory: ./src/python

      - name: Run ruff format check
        run: uv run --frozen ruff check .
        working-directory: ./src/python

      - name: Run pyright
        run: uv run --frozen pyright
        working-directory: ./src/python

      - name: Run pytest
        run: uv run --frozen pytest
        working-directory: ./src/python

  check_python_chatbot:
    name: Check Python chatbot
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version-file: "src/python/.python-version"

      - name: Install the project
        run: uv sync --frozen --all-extras --dev
        working-directory: ./src/python

      - name: Build
        run: uv build
        working-directory: ./src/python

      - name: Check chatbot dependencies
        run: uv pip install -r requirements.txt --system
        working-directory: ./examples/chatbots/python

  check_python_e2e_tests:
    name: Check Python E2E tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version-file: "src/python/.python-version"

      - name: Install the project
        run: uv sync --frozen --all-extras --dev
        working-directory: ./src/python

      - name: Build
        run: uv build
        working-directory: ./src/python

      - name: Check E2E tests dependencies
        run: uv pip install -r requirements.txt --system
        working-directory: ./e2e_tests/python
