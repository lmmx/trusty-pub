name: Build and test package

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - '.github/workflows/**'

jobs:
  build_and_test:
    name: Test on Python ${{ matrix.python }}, ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15-intel, macos-26]
        python: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        exclude:
          # macOS arm64 images only start at Python 3.11
          - os: macos-26
            python: "3.9"
          - os: macos-26
            python: "3.10"
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Install tox and any other packages
        run: pip install tox

      - name: Run tox
        # Run tox using the version of Python in `PATH`
        run: tox -e py
