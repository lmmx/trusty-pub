name: Run tests
on:
  workflow_dispatch:
  pull_request:
    branches:
      - "main"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Lint with ruff
        run: uvx ruff check --output-format=github .

  tests:
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest"]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        include:
          - os: "ubuntu-latest"
            python-version: "pypy3.10"
          - os: "ubuntu-latest"
            python-version: "graalpy"
          - os: "macos-latest"
            python-version: "3.12"
          - os: "windows-latest"
            python-version: "3.12"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: "Install lxml dev dependencies"
        if: ${{ startsWith(matrix.python-version, 'graalpy') && runner.os == 'Linux' }}
        run: sudo apt-get install libxml2-dev libxslt-dev python3-dev

      - name: "Install dependencies"
        run: |
          uv sync --frozen --all-extras
          uv run python -c "import nltk; nltk.download('punkt'); nltk.download('punkt_tab')"

      - run: uv run pytest tests --cov=sumy --cov-report=xml
        env:
          CI: 1
          PYTHONDONTWRITEBYTECODE: 1

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
