name: "CodeQL"

on:
  pull_request:
    branches: [ main ]

jobs:
  analyze:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language: [ "python" ]

    steps:
    - uses: actions/checkout@v6

    - uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}

    - uses: github/codeql-action/autobuild@v4
    - uses: github/codeql-action/analyze@v4
