name: Release to PyPI
on:
  push:
    tags: ["*"]
jobs:
  build-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Build wheel
        run: uv build
      - name: Publish package
        run: uv publish
