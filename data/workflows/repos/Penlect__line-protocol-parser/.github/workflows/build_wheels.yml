# Taken from: https://github.com/pypa/cibuildwheel/blob/main/examples/github-deploy.yml

name: Build and upload to PyPI

# Build on every branch push, tag push, pull request, and published release:
on:
  push:
  pull_request:
  release:
    types:
      - published

env:
  CIBW_BUILD_VERBOSITY: 3
  CIBW_TEST_COMMAND: "python -m unittest discover -v {project}/tests"
  CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-*"

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # macos-15-intel is an Intel runner, macos-14 is Apple Silicon
        os: [ubuntu-latest, ubuntu-24.04-arm, windows-latest, macos-15-intel, macos-14]

    steps:
      - uses: actions/checkout@v5

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.3.1

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Build sdist
        run: pipx run build --sdist

      - name: Verify tracked files unchanged
        run: |
          git update-index -q --refresh
          git diff --exit-code
          git diff --cached --exit-code

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  upload_pypi:
    needs: [build_wheels, build_sdist]
    environment: pypi
    permissions:
      id-token: write
    runs-on: ubuntu-24.04
    # upload to PyPI on every tag starting with 'v'
    # if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    # alternatively, to publish when a GitHub Release is created, use the following rule:
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - uses: actions/checkout@v5

      - name: Verify tag matches line_protocol_parser.__version__
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          text = Path("line_protocol_parser/__init__.py").read_text(
              encoding="utf-8"
          )
          match = re.search(
              r"^__version__ = '([^']+)'$", text, flags=re.MULTILINE
          )
          if not match:
              raise SystemExit(
                  "Could not find __version__ in "
                  "line_protocol_parser/__init__.py"
              )
          package_version = match.group(1)
          tag = os.environ["GITHUB_REF_NAME"]
          if tag.startswith("v"):
              tag = tag[1:]
          if package_version != tag:
              raise SystemExit(
                  f"Version mismatch: tag={os.environ['GITHUB_REF_NAME']} "
                  f"but line_protocol_parser.__version__={package_version}"
              )
          print(f"Version check OK: {package_version}")
          PY

      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - uses: pypa/gh-action-pypi-publish@v1.13.0
        with:
          verbose: true
          skip-existing: true
