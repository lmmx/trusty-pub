name: Manual Windows Tests

on:
  workflow_dispatch:
    inputs:
      python-version:
        description: Python version to use
        required: true
        default: "3.11"
        type: choice
        options:
          - "3.10"
          - "3.11"
          - "3.12"

jobs:
  windows-tests:
    name: Windows tests (Python ${{ inputs.python-version }})
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Print environment details
        run: |
          python --version
          pip --version
          python -c "import platform, sys, numpy; print('platform:', platform.platform()); print('python:', sys.version.replace('\n', ' ')); print('numpy:', numpy.__version__)"

      - name: Run full test suite
        run: pytest -q
