name: "public/tidy3d-extras/python-client-integration-tests"

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release Tag (v2.10.0, v2.10.0rc1)'
        required: false
        type: string
        default: ''
      test_type:
        description: 'Test type: basic (smoke tests) or full (all platforms)'
        required: false
        type: choice
        options:
          - basic
          - full
        default: 'basic'

  workflow_call:
    inputs:
      release_tag:
        description: 'Release Tag (v2.10.0, v2.10.0rc1)'
        required: false
        type: string
        default: ''
      test_type:
        description: 'Test type: basic (smoke tests) or full (all platforms)'
        required: false
        type: string
        default: 'basic'
    outputs:
      workflow_success:
        description: 'Overall integration test workflow success status'
        value: ${{ jobs.integration-tests-basic.result == 'success' || jobs.integration-tests-full.result == 'success' }}

permissions:
  contents: read

jobs:
  integration-tests-basic:
    name: python-${{ matrix.python-version }}-${{ matrix.name }}
    if: ${{ (github.event.inputs.test_type || inputs.test_type || 'basic') == 'basic' }}
    runs-on: ${{ matrix.runs-on }}
    container: ${{ matrix.container }}
    permissions:
      contents: read
    concurrency:
      group: tidy3d-extras-integration-${{ github.event.pull_request.number || github.sha }}-${{ matrix.name }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runs-on: ubuntu-latest
            python-version: '3.10'
          - name: macos-arm64
            runs-on: macos-latest
            python-version: '3.10'
          - name: windows-x64-3.10
            runs-on: windows-latest
            python-version: '3.10'
          - name: windows-x64-3.13
            runs-on: windows-latest
            python-version: '3.13'
    defaults:
      run:
        shell: bash
    env:
      PIP_ONLY_BINARY: gdstk
      MPLBACKEND: agg
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || inputs.release_tag }}

    steps:
    - name: checkout-head
      if: ${{ !env.RELEASE_TAG }}
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 1
        submodules: false
        persist-credentials: false
        lfs: true

    - name: checkout-tag
      if: ${{ env.RELEASE_TAG }}
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: refs/tags/${{ env.RELEASE_TAG }}
        fetch-depth: 1
        submodules: false
        persist-credentials: false
        lfs: true

    - name: set-python-${{ matrix.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: install-uv
      run: python -m pip install --upgrade uv

    - name: configure-aws-credentials
      uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502  # v4.0.2
      with:
        aws-access-key-id: ${{ secrets.AWS_CODEARTIFACT_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_CODEARTIFACT_ACCESS_SECRET }}
        aws-region: us-east-1

    - name: configure-codeartifact-authentication
      run: |
        set -e
        echo "Getting CodeArtifact token..."
        CODEARTIFACT_AUTH_TOKEN=$(aws codeartifact get-authorization-token \
          --domain flexcompute \
          --domain-owner 625554095313 \
          --query authorizationToken \
          --output text)

        echo "UV_INDEX_CODEARTIFACT_USERNAME=aws" >> "$GITHUB_ENV"
        echo "UV_INDEX_CODEARTIFACT_PASSWORD=$CODEARTIFACT_AUTH_TOKEN" >> "$GITHUB_ENV"
        echo "✅ CodeArtifact authentication configured for uv"

    - name: install-project
      shell: bash
      run: |
        uv --version
        python --version
        uv sync --frozen --extra dev --extra extras
        PROJECT_PYTHON=$(uv run --frozen python -c "import sys; print(sys.executable)")
        uv pip install --python "$PROJECT_PYTHON" --upgrade wheel setuptools
        uv pip install --python "$PROJECT_PYTHON" gdstk --only-binary gdstk

    - name: verify-extras-installation
      run: |
        export SIMCLOUD_APIKEY=${{ secrets.TIDY3D_API_KEY }}
        uv run --frozen tidy3d configure --apikey ${{ secrets.TIDY3D_API_KEY }}
        uv run --frozen python -c "import tidy3d; print(f'tidy3d version: {tidy3d.__version__}')"
        uv run --frozen python -c "import tidy3d_extras; print(f'tidy3d-extras version: {tidy3d_extras.__version__}')"
        cd tests/
        uv run --frozen pytest _test_tidy3d_extras

    - name: run-doctests
      run: |
        export SIMCLOUD_APIKEY=${{ secrets.TIDY3D_API_KEY }}
        uv run --frozen tidy3d configure --apikey ${{ secrets.TIDY3D_API_KEY }}
        uv run --frozen pytest -rF --tb=short tidy3d

    - name: run-tests-coverage
      env:
        PYTHONUNBUFFERED: "1"
      run: |
        export SIMCLOUD_APIKEY=${{ secrets.TIDY3D_API_KEY }}
        uv run --frozen tidy3d configure --apikey ${{ secrets.TIDY3D_API_KEY }}
        uv run --frozen pytest --cov=tidy3d -rF --tb=short tests/_test_data/_test_datasets_no_vtk.py
        uv run --frozen pytest --cov=tidy3d -rF --tb=short tests
        uv run --frozen coverage report -m
        TOTAL_COVERAGE=$(uv run --frozen coverage report --format=total)
        echo "total=$TOTAL_COVERAGE" >> "$GITHUB_ENV"
        echo "### Total coverage: ${TOTAL_COVERAGE}%"

  integration-tests-full:
    name: python-${{ matrix.python-version }}-${{ matrix.name }}
    if: ${{ (github.event.inputs.test_type || inputs.test_type || 'basic') == 'full' }}
    runs-on: ${{ matrix.runs-on }}
    permissions:
      contents: read
    concurrency:
      group: tidy3d-extras-integration-${{ github.event.pull_request.number || github.sha }}-${{ matrix.name }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        include: # TODO finish container setup with Casey
          - name: linux-x86_64-3.10
            runs-on: ubuntu-latest
            python-version: '3.10'
          - name: linux-x86_64-3.13
            runs-on: ubuntu-latest
            python-version: '3.13'
          - name: macos-arm64-3.10
            runs-on: macos-latest
            python-version: '3.10'
          - name: macos-arm64-3.13
            runs-on: macos-latest
            python-version: '3.13'
          - name: windows-x64-3.10
            runs-on: windows-latest
            python-version: '3.10'
          - name: windows-x64-3.13
            runs-on: windows-latest
            python-version: '3.13'
    defaults:
      run:
        shell: bash
    env:
      PIP_ONLY_BINARY: gdstk
      MPLBACKEND: agg
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || inputs.release_tag }}

    steps:
    - name: checkout-head
      if: ${{ !env.RELEASE_TAG }}
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 1
        submodules: false
        persist-credentials: false
        lfs: true

    - name: checkout-tag
      if: ${{ env.RELEASE_TAG }}
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: refs/tags/${{ env.RELEASE_TAG }}
        fetch-depth: 1
        submodules: false
        persist-credentials: false
        lfs: true

    - name: set-python-${{ matrix.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: install-uv
      run: python -m pip install --upgrade uv

    - name: configure-aws-credentials
      uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502  # v4.0.2
      with:
        aws-access-key-id: ${{ secrets.AWS_CODEARTIFACT_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_CODEARTIFACT_ACCESS_SECRET }}
        aws-region: us-east-1

    - name: configure-codeartifact-authentication
      run: |
        set -e
        echo "Getting CodeArtifact token..."
        CODEARTIFACT_AUTH_TOKEN=$(aws codeartifact get-authorization-token \
          --domain flexcompute \
          --domain-owner 625554095313 \
