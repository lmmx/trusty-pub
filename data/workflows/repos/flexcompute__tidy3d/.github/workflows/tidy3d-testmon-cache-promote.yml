name: "public/tidy3d/promote-testmon-cache"

on: # zizmor: ignore[dangerous-triggers]
  workflow_run:
    workflows:
      - "public/tidy3d/python-client-tests"
    types:
      - completed
    branches:
      - "gh-readonly-queue/develop/**"
  workflow_call:
    inputs:
      source_event:
        description: "Event from the caller workflow."
        required: true
        type: string
      source_run_id:
        description: "Run id for artifact downloads."
        required: true
        type: string
      allow_empty_candidates:
        description: "Allow zero cache candidate artifacts."
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      source_event:
        description: "Source event name for validation."
        required: false
        type: string
        default: merge_group
      source_run_id:
        description: "Run id for artifact downloads."
        required: true
        type: string
      allow_empty_candidates:
        description: "Allow zero cache candidate artifacts."
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  actions: read

jobs:
  discover-cache-candidates:
    if: >-
      github.event_name != 'workflow_run' ||
      (
        github.event.workflow_run.event == 'merge_group' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_repository.full_name == github.repository
      )
    runs-on: ubuntu-latest
    outputs:
      candidates: ${{ steps.build-candidates.outputs.candidates }}
      source_run_id: ${{ steps.resolve-caller-context.outputs.source_run_id }}
    steps:
      - name: resolve-caller-context
        id: resolve-caller-context
        env:
          INPUT_SOURCE_EVENT: ${{ inputs.source_event }}
          INPUT_SOURCE_RUN_ID: ${{ inputs.source_run_id }}
          WORKFLOW_RUN_EVENT: ${{ github.event.workflow_run.event }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail
          source_event="${INPUT_SOURCE_EVENT:-}"
          source_run_id="${INPUT_SOURCE_RUN_ID:-}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_run" ]]; then
            source_event="${WORKFLOW_RUN_EVENT:-}"
            source_run_id="${WORKFLOW_RUN_ID:-}"
          fi

          echo "source_event=$source_event"
          echo "source_run_id=$source_run_id"
          if [[ "$source_event" != "merge_group" ]]; then
            echo "::error::Expected source_event 'merge_group', got '$source_event'."
            exit 1
          fi
          if ! [[ "$source_run_id" =~ ^[0-9]+$ ]]; then
            echo "::error::source_run_id must be numeric."
            exit 1
          fi
          echo "source_run_id=$source_run_id" >> "$GITHUB_OUTPUT"

      - name: download-cache-candidate-artifacts-source-run
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.resolve-caller-context.outputs.source_run_id }}
          pattern: testmon-cache-candidate-*
          path: cache-candidates
          merge-multiple: false

      - name: build-cache-candidate-matrix
        id: build-candidates
        env:
          ALLOW_EMPTY_CANDIDATES: ${{ inputs.allow_empty_candidates }}
          SOURCE_RUN_ID: ${{ steps.resolve-caller-context.outputs.source_run_id }}
        run: |
          set -euo pipefail
          mapfile -t metadata_files < <(find cache-candidates -type f -name metadata.json | sort)
          if [[ "${#metadata_files[@]}" -eq 0 ]]; then
            if [[ "$ALLOW_EMPTY_CANDIDATES" == "true" ]]; then
              echo "::warning::No cache candidate metadata found; continuing because allow_empty_candidates=true."
              echo "candidates=[]" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::error::No cache candidate metadata artifacts found."
            echo "::error::Expected artifacts from source_run_id=$SOURCE_RUN_ID."
            exit 1
          fi

          candidate_rows=()
          for metadata_file in "${metadata_files[@]}"; do
            artifact_name=$(basename "$(dirname "$metadata_file")")
            cache_key=$(jq -r '.cache_key // empty' "$metadata_file")
            job_class=$(jq -r '.job_class // empty' "$metadata_file")
            runner_os=$(jq -r '.runner_os // empty' "$metadata_file")
            platform=$(jq -r '.platform // empty' "$metadata_file")
            if [[ -z "$cache_key" ]]; then
              echo "::warning::Skipping ${artifact_name}; metadata missing cache_key."
              continue
            fi

            runner_spec_json=""
            runner_family=""
            case "$job_class" in
              local)
                if [[ "$runner_os" != "Linux" ]]; then
                  echo "::warning::Skipping ${artifact_name}; unsupported local runner_os '$runner_os'."
                  continue
                fi
                runner_spec_json='["slurm-runner","4xcpu","container=ghcr.io/astral-sh/uv:debian"]'
                runner_family="local-self-hosted-linux"
                ;;
              remote)
                case "$platform" in
                  ubuntu-latest|macos-latest|windows-latest)
                    runner_spec_json=$(jq -cn --arg platform "$platform" '$platform')
                    runner_family="$platform"
                    ;;
                  *)
                    echo "::warning::Skipping ${artifact_name}; unsupported remote platform '$platform'."
                    continue
                    ;;
                esac
                ;;
              *)
                echo "::warning::Skipping ${artifact_name}; unsupported job_class '$job_class'."
                continue
                ;;
            esac

            candidate_rows+=("$(jq -cn \
              --arg artifact_name "$artifact_name" \
              --arg cache_key "$cache_key" \
              --arg runner_spec_json "$runner_spec_json" \
              --arg runner_family "$runner_family" \
              '{artifact_name: $artifact_name, cache_key: $cache_key, runner_spec_json: $runner_spec_json, runner_family: $runner_family}')")
          done

          if [[ "${#candidate_rows[@]}" -eq 0 ]]; then
            if [[ "$ALLOW_EMPTY_CANDIDATES" == "true" ]]; then
              echo "::warning::All cache candidates were filtered; continuing because allow_empty_candidates=true."
              echo "candidates=[]" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::error::No valid cache candidates after metadata validation."
            exit 1
          fi

          candidates_json=$(printf '%s\n' "${candidate_rows[@]}" | jq -sc '.')
          echo "candidates=${candidates_json}" >> "$GITHUB_OUTPUT"
          echo "Prepared ${#candidate_rows[@]} cache candidates for promotion."

  promote-testmon-cache:
    needs: discover-cache-candidates
    if: needs.discover-cache-candidates.result == 'success' && needs.discover-cache-candidates.outputs.candidates != '' && needs.discover-cache-candidates.outputs.candidates != '[]'
    runs-on: ${{ fromJson(matrix.candidate.runner_spec_json) }}
    permissions:
      contents: read
      actions: write
    strategy:
      fail-fast: false
      matrix:
        candidate: ${{ fromJson(needs.discover-cache-candidates.outputs.candidates || '[]') }}
    steps:
      - name: download-cache-candidate
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ needs.discover-cache-candidates.outputs.source_run_id }}
          name: ${{ matrix.candidate.artifact_name }}
          path: cache-candidate

      - name: validate-cache-candidate
        shell: bash
        env:
          EXPECTED_CACHE_KEY: ${{ matrix.candidate.cache_key }}
          ARTIFACT_NAME: ${{ matrix.candidate.artifact_name }}
        run: |
          set -euo pipefail
          test -f cache-candidate/metadata.json
          test -f cache-candidate/.testmondata
          actual_cache_key=$(jq -r '.cache_key // empty' cache-candidate/metadata.json)
          if [[ -z "$actual_cache_key" ]]; then
            echo "::error::Missing cache_key in metadata for $ARTIFACT_NAME."
            exit 1
          fi
          if [[ "$actual_cache_key" != "$EXPECTED_CACHE_KEY" ]]; then
            echo "::error::Metadata cache_key mismatch for $ARTIFACT_NAME."
            echo "::error::Expected: $EXPECTED_CACHE_KEY"
            echo "::error::Actual:   $actual_cache_key"
            exit 1
          fi

      - name: stage-testmon-cache-unix
        if: runner.os != 'Windows'
        run: cp cache-candidate/.testmondata .testmondata

      - name: stage-testmon-cache-windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item -Path "cache-candidate/.testmondata" -Destination ".testmondata" -Force

      - name: lookup-existing-cache
        id: cache-lookup
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: .testmondata
          key: ${{ matrix.candidate.cache_key }}
          lookup-only: true

      - name: save-promoted-testmon-cache
        if: steps.cache-lookup.outputs.cache-hit != 'true'
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: .testmondata
          key: ${{ matrix.candidate.cache_key }}

      - name: report-existing-cache
        if: steps.cache-lookup.outputs.cache-hit == 'true'
        env:
          CACHE_KEY: ${{ matrix.candidate.cache_key }}
        run: echo "Cache already present for key '$CACHE_KEY'; skipping save."

      - name: verify-promoted-cache-lookup
        id: verify-cache-lookup
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: .testmondata
          key: ${{ matrix.candidate.cache_key }}
          lookup-only: true

      - name: enforce-promoted-cache-availability
        if: steps.verify-cache-lookup.outputs.cache-hit != 'true'
        shell: bash
        env:
          CACHE_KEY: ${{ matrix.candidate.cache_key }}
          RUNNER_FAMILY: ${{ matrix.candidate.runner_family }}
          CACHE_HIT: ${{ steps.verify-cache-lookup.outputs.cache-hit }}
          CACHE_MATCHED_KEY: ${{ steps.verify-cache-lookup.outputs.cache-matched-key }}
        run: |
          echo "::error::Promoted cache is not restorable on runner family '$RUNNER_FAMILY'."
          echo "::error::cache_key=$CACHE_KEY"
          echo "::error::cache_hit=$CACHE_HIT"
          echo "::error::cache_matched_key=$CACHE_MATCHED_KEY"
          exit 1
