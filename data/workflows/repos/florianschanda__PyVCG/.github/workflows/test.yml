name: PyVCG CI Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        py-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install CVC5
        run: |
          wget -q https://github.com/cvc5/cvc5/releases/download/cvc5-1.3.2/cvc5-Linux-x86_64-static.zip
          unzip cvc5-Linux-x86_64-static.zip
          sudo cp cvc5-Linux-x86_64-static/bin/cvc5 /usr/local/bin
      - name: Set up Python ${{ matrix.py-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.py-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Test
        run: |
          coverage run --branch --rcfile=coverage.cfg -m unittest discover -s tests -v
          coverage report --rcfile=coverage.cfg --fail-under=100
