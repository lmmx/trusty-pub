name: "windows"

on:
  workflow_call:

jobs:
  windows:
    name: "windows-latest / ${{ matrix.platform.target }}"
    runs-on: windows-latest
    strategy:
      matrix:
        platform:
          - {
            target: x64,
            interpreter: "3.10 3.11 3.12 3.13 3.13t 3.14 3.14t pypy3.11"
          }
          - {
            target: x86,
            interpreter: "3.10 3.11 3.12 3.13 3.13t 3.14 3.14t"
          }
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.x
          architecture: ${{ matrix.platform.target }}
      - name: "Build wheels"
        uses: PyO3/maturin-action@04ac600d27cdf7a9a280dadf7147097c42b757ad # v1.50.1
        with:
          target: ${{ matrix.platform.target }}
          rust-toolchain: nightly
          args: >
            --release --out dist 
            --interpreter ${{ matrix.platform.interpreter }}
            --features mimalloc
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }} # zizmor: ignore[cache-poisoning]
      - name: "Upload wheels"
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: dist
