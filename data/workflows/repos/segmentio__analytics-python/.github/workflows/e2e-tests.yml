# E2E Tests for analytics-python
# Copy this file to: analytics-python/.github/workflows/e2e-tests.yml
#
# This workflow:
# 1. Checks out the SDK and sdk-e2e-tests repos
# 2. Installs the SDK and e2e-cli dependencies
# 3. Runs the e2e test suite

name: E2E Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      e2e_tests_ref:
        description: 'Branch or ref of sdk-e2e-tests to use'
        required: false
        default: 'main'

jobs:
  e2e-tests:
    # Skip on fork PRs where repo secrets aren't available
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout SDK
        uses: actions/checkout@v4
        with:
          path: sdk

      - name: Checkout sdk-e2e-tests
        uses: actions/checkout@v4
        with:
          repository: segmentio/sdk-e2e-tests
          ref: ${{ inputs.e2e_tests_ref || 'main' }}
          token: ${{ secrets.E2E_TESTS_TOKEN }}
          path: sdk-e2e-tests

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python SDK
        working-directory: sdk
        run: pip install -e .

      - name: Install e2e-cli dependencies
        working-directory: sdk/e2e-cli
        run: pip install -e .

      - name: Run E2E tests
        working-directory: sdk-e2e-tests
        run: |
          ./scripts/run-tests.sh \
            --sdk-dir "${{ github.workspace }}/sdk/e2e-cli" \
            --cli "e2e-cli"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: sdk-e2e-tests/test-results/
          if-no-files-found: ignore
