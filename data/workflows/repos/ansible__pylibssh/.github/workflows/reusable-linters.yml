---

name: ♲ 🚨

on:  # yamllint disable-line rule:truthy
  workflow_call:
    inputs:
      cache-key-files:
        description: Dependency files cache
        required: true
        type: string

env:
  TOX_VERSION: tox

jobs:
  linters:
    name: >-
      ${{ matrix.toxenv }}/${{ matrix.python-version }}@${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    timeout-minutes: 2

    strategy:
      fail-fast: false
      matrix:
        python-version:
        - 3.11
        os:
        - ubuntu-latest
        toxenv:
        - lint
        - build-docs
        - make-changelog

    defaults:
      run:
        shell: bash -eEuxo pipefail {0}

    env:
      PY_COLORS: 1
      TOX_PARALLEL_NO_SPINNER: 1
      TOXENV: ${{ matrix.toxenv }}

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5.3.0
      with:
        python-version: ${{ matrix.python-version }}
    - name: Set up pip cache
      uses: re-actors/cache-python-deps@release/v1
      with:
        cache-key-for-dependency-files: >-
          ${{ inputs.cache-key-files }}
    - name: Install tox
      run: >-
        python -m
        pip install
        --user
        "${TOX_VERSION}"
    - name: Log installed dists
      run: python -m pip freeze --all
    - name: Initialize tox envs
      run: |
        python -m tox --parallel auto --parallel-live --notest
    - name: Initialize pre-commit envs if needed
      run: >-
        test -d .tox/lint
        && .tox/lint/bin/python -m pre_commit install-hooks
        || :
    - name: Test with tox
      run: python -m tox --parallel auto --parallel-live

...
