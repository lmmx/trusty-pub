name: test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v21
      - run: nix profile add .#direnv
      - run: |
          direnv allow
          direnv export gha >> "$GITHUB_ENV"
      - run: |
          pip install -r requirements/test.txt
          tox
