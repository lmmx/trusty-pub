name: Bokeh-CI

# Standard testing for faster feedback on common configurations
# Runs unit tests on latest Python across all platforms, everything else on Linux only

on:
  push:
    branches:
      - main
      - branch-*
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    shell: bash -l {0}

env:
  CHROME_VER: "141.0.7390.54"
  CHROME_REV: "chromium_3265"

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history to get proper build version

      - name: Build Bokeh and Bokeh.js
        uses: ./.github/workflows/composite/build

  codebase:
    needs: build
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        # Run codebase checks on all platforms
        os: [ubuntu-24.04, macos-latest, windows-latest]

    steps:
      - name: Configure line endings in git
        if: runner.os == 'Windows'
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v6

      - name: Prepare Environment
        uses: ./.github/workflows/composite/test-setup
        with:
          test-env: '3.11'
          source-tree: 'keep'

      - name: List installed software
        uses: ./.github/workflows/composite/list-software

      - name: Run codebase checks
        run: pytest --color=yes tests/codebase

      - name: MyPy
        if: success() || failure()
        run: mypy --version && mypy

  examples:
    needs: build
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        # Examples: Linux only (Chrome/Chromium dependency)
        python-version: ['3.14']

    steps:
      - uses: actions/checkout@v6

      - name: Prepare Environment
        uses: ./.github/workflows/composite/test-setup
        with:
          test-env: ${{ matrix.python-version }}
          source-tree: 'delete'

      - name: Ensure Python version
        run: if [[ ! "$(python --version | cut -d' ' -f2)" == "${{ matrix.python-version }}"* ]]; then exit 1; fi

      - name: Install chromium
        uses: ./.github/workflows/composite/install-chromium

      - name: List installed software
        uses: ./.github/workflows/composite/list-software
        with:
          include-chromium: 'true'

      - name: Start chrome headless
        working-directory: ./bokehjs
        run: node make test:spawn:headless

      - name: Run tests
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: pytest -s -v --color=yes --tb line tests/test_examples.py

      - name: Collect results
        if: always()
        env:
          DST: "examples-report"
        run: |
          mkdir -p ${DST}
          cp --parents examples-report.html $(cat .images-list) ${DST}

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: examples-report
          path: examples-report

  unit-test:
    needs: build
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        # Unit tests: Latest Python (3.14) on all platforms
        os: [ubuntu-24.04, macos-latest, windows-latest]
        python-version: ['3.14']
    env:
      OS: ${{ matrix.os }}
      PYTHON: ${{ matrix.python-version }}

    steps:
      - uses: actions/checkout@v6

      - name: Prepare Environment
        uses: ./.github/workflows/composite/test-setup
        with:
          test-env: ${{ matrix.python-version }}
          source-tree: 'delete'

      - name: Ensure Python version
        run: if [[ ! "$(python --version | cut -d' ' -f2)" == "${{ matrix.python-version }}"* ]]; then exit 1; fi

      - name: List installed software
        uses: ./.github/workflows/composite/list-software

      - name: Run unit tests
        uses: ./.github/workflows/composite/run-unit-tests

  minimal-deps:
    needs: build
    runs-on: ubuntu-24.04

    env:
      OS: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Prepare Environment
        uses: ./.github/workflows/composite/test-setup
        with:
          test-env: 'minimal-deps'
          source-tree: 'delete'

      - name: List installed software
        uses: ./.github/workflows/composite/list-software

      - name: Run dependency tests
        uses: ./.github/workflows/composite/run-deps-tests
        with:
          dep-type: 'minimal'

  core-deps:
    needs: build
    runs-on: ubuntu-24.04

    env:
      OS: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Prepare Environment
        uses: ./.github/workflows/composite/test-setup
        with:
          test-env: 'core'
          source-tree: 'delete'

      - name: List installed software
        uses: ./.github/workflows/composite/list-software

      - name: Run dependency tests
        uses: ./.github/workflows/composite/run-deps-tests
        with:
          dep-type: 'core'

  documentation:
    needs: build
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        # Documentation: Linux only
        python-version: ['3.14']

    steps:
      - uses: actions/checkout@v6

      - name: Prepare Environment
        uses: ./.github/workflows/composite/test-setup
        with:
          test-env: ${{ matrix.python-version }}
          source-tree: 'delete'

      - name: Ensure Python version
        run: if [[ ! "$(python --version | cut -d' ' -f2)" == "${{ matrix.python-version }}"* ]]; then exit 1; fi

      - name: List installed software
        uses: ./.github/workflows/composite/list-software

      - name: Build docs
        run: bash scripts/ci/build_docs.sh

      - name: Upload docs
        uses: actions/upload-artifact@v6
        with:
          name: docs-html
          path: docs/bokeh/docs-html.tgz
