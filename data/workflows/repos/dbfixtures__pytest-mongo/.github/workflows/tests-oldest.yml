name: Run oldest pytest tests

on:
  workflow_call:
    inputs:
      python-versions:
        description: 'Supported python versions'
        default: '["3.10", "3.11", "3.12", "3.13", "3.14"]'
        required: false
        type: string
      mongo:
        description: 'MongoDB version'
        required: true
        type: number
      os:
        description: 'Operating system to run tests on'
        default: 'ubuntu-latest'
        required: false
        type: string
    secrets:
      codecov_token:
        description: 'Codecov token'
        required: false

jobs:
  tests:
    runs-on: ${{ inputs.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}
    env:
      OS: ${{ inputs.os }}
      PYTHON: ${{ matrix.python-version }}
      MONGODB: ${{ inputs.mongo }}
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install MongoDB
      uses: ankane/setup-mongodb@v1
      with:
        mongodb-version: ${{ inputs.mongo }}
    - name: Set up Pipenv on python ${{ matrix.python-version }}
      uses: fizyk/actions-reuse/.github/actions/pipenv-setup@v4.4.1
      with:
        python-version: ${{ matrix.python-version }}
        cache: false
        allow-prereleases: true
        editable: true
    - name: Install oldest supported versions
      uses: fizyk/actions-reuse/.github/actions/pipenv-run@v4.4.1
      with:
        command: pip install -r oldest/requirements.txt
    - name: Run tests without xdist
      id: run_serial_tests
      uses: fizyk/actions-reuse/.github/actions/pipenv-run@v4.4.1
      with:
        command: python -m coverage run -m pytest -c pyproject.oldest.toml -p no:xdist
        env: '{"COVERAGE_PROCESS_START": ".coveragerc", "COVERAGE_FILE": ".coverage.serial"}'
    - name: Combine and export serial coverage
      if: ${{ always() && (steps.run_serial_tests.conclusion == 'success' || steps.run_serial_tests.conclusion == 'failure') }}
      uses: fizyk/actions-reuse/.github/actions/coverage-combine-export@v4.4.3
      with:
        data-file: .coverage.serial
        output-file: coverage.xml
    - name: Run xdist test
      id: run_xdist_tests
      uses: fizyk/actions-reuse/.github/actions/pipenv-run@v4.4.1
      with:
        command: python -m coverage run -m pytest -n auto --dist loadgroup -c pyproject.oldest.toml --max-worker-restart=0
        env: '{"COVERAGE_PROCESS_START": ".coveragerc", "COVERAGE_FILE": ".coverage.xdist"}'
    - name: Combine and export xdist coverage
      if: ${{ always() && (steps.run_xdist_tests.conclusion == 'success' || steps.run_xdist_tests.conclusion == 'failure') }}
      uses: fizyk/actions-reuse/.github/actions/coverage-combine-export@v4.4.3
      with:
        data-file: .coverage.xdist
        output-file: coverage-xdist.xml
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5.5.2
      with:
        token: ${{ secrets.codecov_token }}
        flags: linux
        env_vars: OS,PYTHON,MONGODB
        files: ./coverage.xml,./coverage-xdist.xml
        fail_ci_if_error: false
