name: Test

on:
  push:
    branches:
    - dev
    - release-v3
    - test-*
  pull_request: {}
  merge_group: {}

jobs:
  test-ubuntu-24-04:
    name: Ubuntu 24.04 ${{ matrix.name }}
    runs-on: ubuntu-24.04${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - name: x64
            runner:
          - name: Arm64
            runner: -arm
      fail-fast: false
    steps:
    - uses: actions/checkout@v6

    - uses: conda-incubator/setup-miniconda@v3
      with:
        auto-update-conda: true
        conda-remove-defaults: true

    - name: Aptitude - Update Package Lists
      run: sudo apt-get update
      timeout-minutes: 5
    - name: Aptitude - Install Toolchain
      run: sudo apt-get -y install {gcc,g++}-{9,10,11,12,13,14,mingw-w64-x86-64} {clang,lld}-{14,15,16,17,18,19,20} ninja-build
      timeout-minutes: 10

    - name: Conda - Create Environment
      run: conda create -y --name cuda-env
      timeout-minutes: 5
    - name: Conda - Install CUDA Toolchain
      run: |
        conda install -y --name cuda-env -c conda-forge cuda-minimal-build
        rm -f "$CONDA/envs/cuda-env/bin/ld"
      timeout-minutes: 10

    - name: Build (GCC 9)
      run: tests/scripts/build-linux-gcc.sh 9
    - name: Build (GCC 10)
      run: tests/scripts/build-linux-gcc.sh 10
    - name: Build (GCC 11)
      run: tests/scripts/build-linux-gcc.sh 11
    - name: Build (GCC 12)
      run: tests/scripts/build-linux-gcc.sh 12
    - name: Build (GCC 13)
      run: tests/scripts/build-linux-gcc.sh 13
    - name: Build (GCC 14)
      run: tests/scripts/build-linux-gcc.sh 14

    - name: Build (Clang 14)
      run: tests/scripts/build-linux-clang.sh 14
    - name: Build (Clang 15)
      run: tests/scripts/build-linux-clang.sh 15
    - name: Build (Clang 16)
      run: tests/scripts/build-linux-clang.sh 16
    - name: Build (Clang 17)
      run: tests/scripts/build-linux-clang.sh 17
    - name: Build (Clang 18)
      run: tests/scripts/build-linux-clang.sh 18
    - name: Build (Clang 19)
      run: tests/scripts/build-linux-clang.sh 19
    - name: Build (Clang 20)
      run: tests/scripts/build-linux-clang.sh 20

    - name: Build (MinGW-w64 GCC)
      run: tests/scripts/build-linux-mingw-w64-gcc.sh

    - name: Run (GCC 9)
      run: cd tests/build-linux-gcc-9 && ctest --output-on-failure
    - name: Run (GCC 10)
      run: cd tests/build-linux-gcc-10 && ctest --output-on-failure
    - name: Run (GCC 11)
      run: cd tests/build-linux-gcc-11 && ctest --output-on-failure
    - name: Run (GCC 12)
      run: cd tests/build-linux-gcc-12 && ctest --output-on-failure
    - name: Run (GCC 13)
      run: cd tests/build-linux-gcc-13 && ctest --output-on-failure
    - name: Run (GCC 14)
      run: cd tests/build-linux-gcc-14 && ctest --output-on-failure

    - name: Run (Clang 14)
      run: cd tests/build-linux-clang-14 && ctest --output-on-failure
    - name: Run (Clang 15)
      run: cd tests/build-linux-clang-15 && ctest --output-on-failure
    - name: Run (Clang 16)
      run: cd tests/build-linux-clang-16 && ctest --output-on-failure
    - name: Run (Clang 17)
      run: cd tests/build-linux-clang-17 && ctest --output-on-failure
    - name: Run (Clang 18)
      run: cd tests/build-linux-clang-18 && ctest --output-on-failure
    - name: Run (Clang 19)
      run: cd tests/build-linux-clang-19 && ctest --output-on-failure
    - name: Run (Clang 20)
      run: cd tests/build-linux-clang-20 && ctest --output-on-failure

  test-ubuntu-22-04:
    name: Ubuntu 22.04 ${{ matrix.name }}
    runs-on: ubuntu-22.04${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - name: x64
            runner:
          - name: Arm64
            runner: -arm
      fail-fast: false
    steps:
    - uses: actions/checkout@v6

    - uses: conda-incubator/setup-miniconda@v3
      with:
        auto-update-conda: true
        conda-remove-defaults: true

    - name: Aptitude - Update Package Lists
      run: sudo apt-get update
      timeout-minutes: 5
    - name: Aptitude - Install Toolchain
      run: sudo apt-get -y install {gcc,g++}-{9,10,11,12,mingw-w64-x86-64} {clang,lld}-{11,12,13,14,15} ninja-build
      timeout-minutes: 10

    - name: Conda - Create Environment
      run: conda create -y --name cuda-env
      timeout-minutes: 5
    - name: Conda - Install CUDA Toolchain
      run: |
        conda install -y --name cuda-env -c conda-forge cuda-minimal-build
        rm -f "$CONDA/envs/cuda-env/bin/ld"
      timeout-minutes: 10

    - name: Build (GCC 9)
      run: tests/scripts/build-linux-gcc.sh 9
    - name: Build (GCC 10)
      run: tests/scripts/build-linux-gcc.sh 10
    - name: Build (GCC 11)
      run: tests/scripts/build-linux-gcc.sh 11
    - name: Build (GCC 12)
      run: tests/scripts/build-linux-gcc.sh 12

    - name: Build (Clang 11)
      run: tests/scripts/build-linux-clang.sh 11
    - name: Build (Clang 12)
      run: tests/scripts/build-linux-clang.sh 12
    - name: Build (Clang 13)
      run: tests/scripts/build-linux-clang.sh 13
    - name: Build (Clang 14)
      run: tests/scripts/build-linux-clang.sh 14
    - name: Build (Clang 15)
      run: tests/scripts/build-linux-clang.sh 15

    - name: Build (MinGW-w64 GCC)
      run: tests/scripts/build-linux-mingw-w64-gcc.sh

    - name: Run (GCC 9)
      run: cd tests/build-linux-gcc-9 && ctest --output-on-failure
    - name: Run (GCC 10)
      run: cd tests/build-linux-gcc-10 && ctest --output-on-failure
    - name: Run (GCC 11)
      run: cd tests/build-linux-gcc-11 && ctest --output-on-failure
    - name: Run (GCC 12)
      run: cd tests/build-linux-gcc-12 && ctest --output-on-failure

    - name: Run (Clang 11)
      run: cd tests/build-linux-clang-11 && ctest --output-on-failure
    - name: Run (Clang 12)
      run: cd tests/build-linux-clang-12 && ctest --output-on-failure
    - name: Run (Clang 13)
      run: cd tests/build-linux-clang-13 && ctest --output-on-failure
    - name: Run (Clang 14)
      run: cd tests/build-linux-clang-14 && ctest --output-on-failure
    - name: Run (Clang 15)
      run: cd tests/build-linux-clang-15 && ctest --output-on-failure

  test-windows-x64-a:
    name: Windows Server ${{ matrix.os }} x64 with VS ${{ matrix.vsyear }} (A)
    runs-on: windows-${{ matrix.os }}${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: 2022
            runner:
            vsyear: 2022
            vspath: 2022
          - os: 2025
            runner:
            vsyear: 2022
            vspath: 2022
          - os: 2025
            runner: -vs2026
            vsyear: 2026
            vspath: 18
      fail-fast: false
    env:
      VSPATH: C:\Program Files\Microsoft Visual Studio\${{ matrix.vspath }}\Enterprise
    steps:
    - uses: actions/checkout@v6

    - uses: conda-incubator/setup-miniconda@v3
      with:
        auto-update-conda: true
        conda-remove-defaults: true

    - name: Conda - Create Environment
      run: conda create -y --name cuda-env
      timeout-minutes: 5
    - name: Conda - Install CUDA Toolchain
      run: conda install -y --name cuda-env -c conda-forge cuda-minimal-build
      timeout-minutes: 10

    - name: Build (VS ${{ matrix.vsyear }} x64 Native)
      run: tests/scripts/build-windows-vs.ps1 ${{ matrix.vsyear }} x64

    - name: Run (VS ${{ matrix.vsyear }} x64 Native)
      run: tests/scripts/run-windows-vs.ps1 ${{ matrix.vsyear }} x64

  test-windows-x64-b:
    name: Windows Server ${{ matrix.os }} x64 with VS ${{ matrix.vsyear }} (B)
    runs-on: windows-${{ matrix.os }}${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: 2022
            runner:
            vsyear: 2022
            vspath: 2022
          - os: 2025
            runner:
            vsyear: 2022
            vspath: 2022
          - os: 2025
            runner: -vs2026
            vsyear: 2026
            vspath: 18
      fail-fast: false
    env:
      VSPATH: C:\Program Files\Microsoft Visual Studio\${{ matrix.vspath }}\Enterprise
    steps:
    - uses: actions/checkout@v6

    - name: Build (VS ${{ matrix.vsyear }} x86)
      run: tests/scripts/build-windows-vs.ps1 ${{ matrix.vsyear }} x64_x86

    - name: Build (VS ${{ matrix.vsyear }} Arm64)
      run: tests/scripts/build-windows-vs.ps1 ${{ matrix.vsyear }} x64_arm64

    - name: Build (Clang-CL)
      run: tests/scripts/build-windows-vs-clang-cl.ps1 ${{ matrix.vsyear }}

    - name: Run (VS ${{ matrix.vsyear }} x86)
      run: tests/scripts/run-windows-vs.ps1 ${{ matrix.vsyear }} x64_x86

    - name: Run (Clang-CL)
      run: tests/scripts/run-windows-vs-clang-cl.ps1 ${{ matrix.vsyear }}

  test-windows-11-arm64:
    name: Windows 11 Arm64 with VS ${{ matrix.vsyear }}
    runs-on: windows-11-arm
    strategy:
      matrix:
        include:
          - vsyear: 2022
            vspath: 2022
    env:
      VSPATH: C:\Program Files\Microsoft Visual Studio\${{ matrix.vspath }}\Enterprise
    steps:
    - uses: actions/checkout@v6

    - name: Build (VS ${{ matrix.vsyear }} Arm64 Native)
      run: tests/scripts/build-windows-vs.ps1 ${{ matrix.vsyear }} arm64

    - name: Build (VS ${{ matrix.vsyear }} x64)
      run: tests/scripts/build-windows-vs.ps1 ${{ matrix.vsyear }} arm64_x64

    - name: Build (VS ${{ matrix.vsyear }} x86)
      run: tests/scripts/build-windows-vs.ps1 ${{ matrix.vsyear }} arm64_x86

    - name: Run (VS ${{ matrix.vsyear }} Arm64 Native)
      run: tests/scripts/run-windows-vs.ps1 ${{ matrix.vsyear }} arm64

    - name: Run (VS ${{ matrix.vsyear }} x64)
      run: tests/scripts/run-windows-vs.ps1 ${{ matrix.vsyear }} arm64_x64

    - name: Run (VS ${{ matrix.vsyear }} x86)
      run: tests/scripts/run-windows-vs.ps1 ${{ matrix.vsyear }} arm64_x86

  test-macos:
    name: macOS ${{ matrix.name }}
    runs-on: macos-${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - name: 26 Arm64
            runner: 26
          - name: 15 Arm64
            runner: 15
          - name: 15 x64
            runner: 15-intel
          - name: 14 Arm64
            runner: 14
      fail-fast: false
    steps:
    - uses: actions/checkout@v6

    - name: Homebrew - Install Toolchain
      run: brew install --force-bottle llvm lld mingw-w64
      timeout-minutes: 10

    - name: Build (Apple Clang)
      run: tests/scripts/build-macos-appleclang.sh

    - name: Build (GCC)
      run: tests/scripts/build-macos-gcc.sh

    - name: Build (Clang)
      run: tests/scripts/build-macos-clang.sh

    - name: Build (MinGW-w64 GCC)
      run: tests/scripts/build-macos-mingw-w64-gcc.sh

    - name: Run (Apple Clang)
      run: cd tests/build-macos-appleclang && ctest --output-on-failure

    - name: Run (GCC)
      run: cd tests/build-macos-gcc && ctest --output-on-failure

    - name: Run (Clang)
      run: cd tests/build-macos-clang && ctest --output-on-failure
