name: Test Suite

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'merge_group' }}

on:
  push:
    branches: ["dev"]
  pull_request:
  merge_group:

jobs:
  test-nosoftdeps:
    name: Core deps | Python ${{ matrix.python-version }} (split ${{ matrix.group }}/3)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.14"]
        group: [1, 2, 3]
      fail-fast: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Print Python info
        run: |
          which python
          python --version

      - name: Install graphviz
        run: sudo apt-get update && sudo apt-get install graphviz libgraphviz-dev -y

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install .[tests]

      - name: Print installed packages
        run: pip freeze

      - name: Run tests
        run: pytest --splits 3 --group ${{ matrix.group }} --splitting-algorithm duration_based_chunks --verbose --junitxml=test-results.xml

  test-fulldep:
    name: Optional deps | Python ${{ matrix.python-version }} (split ${{ matrix.group }}/3)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.14"]
        group: [1, 2, 3]
      fail-fast: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Print Python info
        run: |
          which python
          python --version

      - name: Install graphviz
        run: sudo apt-get update && sudo apt-get install graphviz libgraphviz-dev -y

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install .[all,tests]

      - name: Print installed packages
        run: pip freeze

      - name: Run tests
        run: pytest --splits 3 --group ${{ matrix.group }} --splitting-algorithm duration_based_chunks --cov=pgmpy --cov-report term --verbose --junitxml=test-results.xml

      - name: Rename coverage file
        run: mv .coverage .coverage.${{ matrix.group }}

      - name: Upload coverage data
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.python-version }}-${{ matrix.group }}
          path: .coverage.${{ matrix.group }}
          include-hidden-files: true

  merge-coverage:
    name: Merge coverage | Python ${{ matrix.python-version }}
    needs: test-fulldep
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.14"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install coverage
        run: pip install coverage

      - name: Download coverage artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-${{ matrix.python-version }}-*
          merge-multiple: true

      - name: Combine coverage
        run: |
          coverage combine
          coverage report
          coverage xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
