name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g., v0.24.0)"
        required: true
      commit:
        description: "Commit (e.g., 92b44e1)"
        required: true

permissions:
  contents: read

jobs:
  release:
    permissions:
      contents: write
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - run: |
          set -x -e
          COMMIT=$(git rev-parse --quiet --verify ${GITHUB_EVENT_INPUTS_COMMIT})
          if [[ "$(git tag -l ${GITHUB_EVENT_INPUTS_VERSION})" == "${GITHUB_EVENT_INPUTS_VERSION}" ]]; then
            echo "${GITHUB_EVENT_INPUTS_VERSION} already released"
            exit 1
          fi
          VERSION=${GITHUB_EVENT_INPUTS_VERSION}

          docker pull tfsigio/candidate:${VERSION:1}
          docker create -it --name storage tfsigio/candidate:${VERSION:1} bash
          docker cp storage:/wheelhouse .
          docker cp storage:/wheelhouse.sha256 .
          docker cp storage:/wheelhouse.commit .
          docker cp storage:/wheelhouse.version .

          sha256sum wheelhouse/*.whl | sort -u | diff wheelhouse.sha256 -
          mv wheelhouse dist

          if [[ "${COMMIT}" != "$(cat wheelhouse.commit)" ]]; then
            echo "${COMMIT} != $(cat wheelhouse.commit)"
            exit 1
          fi
          if [[ "${VERSION}" != "v$(cat wheelhouse.version)" ]]; then
            echo "${VERSION} != v$(cat wheelhouse.version)"
            exit 1
          fi

          python3 tools/release/note_take.py ${VERSION}

          echo "::set-output name=tag::${VERSION}"
          echo "::set-output name=name::TensorFlow I/O ${VERSION:1}"
          echo "::set-output name=commit::${COMMIT}"
        id: info
        env:
          GITHUB_EVENT_INPUTS_COMMIT: ${{ github.event.inputs.commit }}
          GITHUB_EVENT_INPUTS_VERSION: ${{ github.event.inputs.version }}
      - run: |
          set -x -e
          echo ${STEPS_INFO_OUTPUTS_TAG}
          echo ${STEPS_INFO_OUTPUTS_NAME}
          echo ${STEPS_INFO_OUTPUTS_COMMIT}
          cat CURRENT.md
        env:
          STEPS_INFO_OUTPUTS_TAG: ${{ steps.info.outputs.tag }}
          STEPS_INFO_OUTPUTS_NAME: ${{ steps.info.outputs.name }}
          STEPS_INFO_OUTPUTS_COMMIT: ${{ steps.info.outputs.commit }}
      - uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          body_path: CURRENT.md
          name: ${{ steps.info.outputs.name }}
          tag_name: ${{ steps.info.outputs.tag }}
          target_commitish: ${{ steps.info.outputs.commit }}
          draft: true
      - uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # master
        with:
          user: __token__
          password: ${{ secrets.TEST_PYPI_TOKEN }}
          repository_url: https://test.pypi.org/legacy/
      #- uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # master
      #  with:
      #    user: __token__
      #    password: ${{ secrets.PYPI_TOKEN }}
          
