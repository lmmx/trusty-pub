name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  commit-lint:
    if: ${{ github.event_name == 'pull_request' }}
    uses: ./.github/workflows/commitlint.yml

  lint:
    uses: ./.github/workflows/lint-packages.yml

  test:
    uses: ./.github/workflows/test-packages.yml

  check-versions:
    uses: ./.github/workflows/check-version-availability.yml
