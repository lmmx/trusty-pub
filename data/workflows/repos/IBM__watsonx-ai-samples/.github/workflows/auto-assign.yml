name: Auto Assign New Issues

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  assign:
    runs-on: ubuntu-latest

    steps:
      - name: Debug event context
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            console.log(`🚀 event: ${context.eventName}`);
            console.log(`🔢 issue_number: ${context.issue.number}`);
            console.log(`📋 repo: ${context.repo.owner}/${context.repo.repo}`);

      - name: Assign
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const assignees = [
              'Rafal-Chrzanowski-IBM',
              'DorotaDR'
            ];

            const response = await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              assignees
            });

            console.log(`👷‍♂️ API status: ${response.status}`);
            console.log(`📑 Response data: ${JSON.stringify(response.data)}`);